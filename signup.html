<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Taste Mate - 회원가입</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f6; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background: #27ae60; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Taste Mate 회원가입</h2>
        <form id="signupForm">
            <input type="text" name="nickname" placeholder="닉네임" required>
            <input type="email" name="email" placeholder="이메일" required>
            <input type="password" name="password" placeholder="비밀번호" required>
            <button type="submit">가입하기</button>
        </form>
        <p style="margin-top:20px; font-size:14px; color:#666;">이미 계정이 있나요? <a href="/login" style="color:#2ecc71; font-weight:bold; text-decoration:none;">로그인</a></p>
    </div>

    <script>
        document.getElementById('signupForm').onsubmit = async (e) => {
            e.preventDefault();
            try {
                const res = await fetch('/api/signup', { method: 'POST', body: new FormData(e.target) });
                const data = await res.json();
                
                if (res.ok) {
                    alert("회원가입이 완료되었습니다! 로그인 페이지로 이동합니다.");
                    window.location.href = data.redirect;
                } else {
                    // 중복 이메일 등의 에러 메시지 출력
                    alert(data.detail || "회원가입에 실패했습니다.");
                }
            } catch (err) {
                alert("서버 통신 오류가 발생했습니다.");
            }
        };
    </script>
</body>
</html>

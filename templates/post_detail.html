<!doctype html>
<html lang="ko">
    <head>
    <script>
        // ngrok iframe 탈출 - 경고 페이지 없이 직접 접속
        if (window.top !== window.self) {
            window.top.location.href = window.self.location.href;
        }
    </script>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>상세보기</title>
        <style>
            body {
                margin: 0;
                font-family: 'Noto Sans KR', sans-serif;
                background: #fff;
            }
            .header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 16px 32px;
                background: rgba(255, 255, 255, 0.85);
                box-shadow: 0 2px 16px rgba(220, 38, 38, 0.1);
            }
            .header-logo {
                font-size: 1.5rem;
                font-weight: bold;
                color: #dc2626;
                text-decoration: none;
            }
            .login-btn {
                padding: 8px 20px;
                background: #dc2626;
                color: #fff;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                font-weight: bold;
            }
            .container {
                max-width: 600px;
                margin: 40px auto;
                padding: 32px 24px;
                border-radius: 12px;
                background: #fff8f8;
                box-shadow: 0 2px 16px rgba(220, 38, 38, 0.08);
            }
            .post-title {
                font-size: 2rem;
                font-weight: 900;
                color: #dc2626;
                margin-bottom: 12px;
            }
            .post-content {
                color: #222;
                margin-bottom: 18px;
                white-space: pre-line;
                line-height: 1.6;
            }
            .comment-section {
                margin-top: 32px;
            }
            .comment-title {
                font-size: 1.1rem;
                font-weight: 700;
                color: #b91c1c;
                margin-bottom: 8px;
            }
            .comment-list {
                list-style: none;
                padding: 0;
                margin-bottom: 16px;
            }
            .comment-list li {
                background: #fff;
                border-radius: 6px;
                padding: 10px 14px;
                margin-bottom: 8px;
                border: 1px solid #ffe5e5;
            }
            .comment-form textarea {
                width: 100%;
                min-height: 60px;
                border-radius: 6px;
                border: 1.5px solid #ffe5e5;
                padding: 8px;
                margin-bottom: 8px;
                box-sizing: border-box;
            }
            .comment-form button {
                background: #dc2626;
                color: #fff;
                border: none;
                border-radius: 6px;
                padding: 8px 18px;
                font-weight: 700;
                cursor: pointer;
            }
        
            /* ===== 반응형 (태블릿/모바일) ===== */
            @media (max-width: 900px) {
                .header {
                    flex-direction: column;
                    padding: 10px 16px;
                    gap: 8px;
                    position: sticky;
                }
                .header-left { width: 100%; justify-content: space-between; }
                .header-center { width: 100%; }
                .header-right { width: 100%; justify-content: flex-end; }
                .menu-bar { display: none; }
                .header-logo { font-size: 1.3rem; }
                .login-btn { padding: 8px 10px; font-size: 0.8rem; }
                .current-location { padding: 6px 8px; font-size: 0.78rem; }
                .nickname-avatar { width: 32px; height: 32px; font-size: 0.85rem; }
                .container, .write-container, .community-wrap {
                    padding: 16px;
                    margin: 10px auto;
                }
                .post-card, .board-card {
                    padding: 14px 12px;
                }
                table { font-size: 0.85rem; }
                th, td { padding: 8px 6px; }
            }
            @media (max-width: 480px) {
                .header { padding: 8px 10px; }
                .header-logo { font-size: 1.1rem; }
                .search-box input { font-size: 0.85rem; }
                body { font-size: 0.95rem; }
                h1 { font-size: 1.4rem; }
                h2 { font-size: 1.2rem; }
                .btn, button[type=submit] { width: 100%; }
            }

        
            /* ===== 햄버거 메뉴 ===== */
            .hamburger-btn {
                display: none;
                background: none;
                border: none;
                font-size: 1.6rem;
                cursor: pointer;
                padding: 4px 8px;
                border-radius: 8px;
                color: #dc2626;
                line-height: 1;
            }
            .hamburger-btn:hover { background: #fff1f1; }
            .mobile-nav {
                display: none;
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.4);
                z-index: 2000;
            }
            .mobile-nav.open { display: block; }
            .mobile-nav-panel {
                position: absolute;
                top: 0; left: 0;
                width: 260px;
                height: 100%;
                max-height: 100vh;
                background: #fff;
                box-shadow: 4px 0 20px rgba(0,0,0,0.15);
                padding: 0;
                display: flex;
                flex-direction: column;
                box-sizing: border-box;
            }
            .mobile-nav-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 20px 20px 16px 20px;
                border-bottom: 1px solid #f1f1f1;
                flex-shrink: 0;
            }
            .mobile-nav-logo {
                font-size: 1.4rem;
                font-weight: 900;
                color: #dc2626;
                text-decoration: none;
            }
            .mobile-nav-close {
                background: none;
                border: none;
                font-size: 1.6rem;
                cursor: pointer;
                color: #666;
                padding: 4px;
            }
            .mobile-nav-links {
                padding: 16px 0;
                display: flex;
                flex-direction: column;
                flex: 1;
                overflow-y: auto;
            }
            .mobile-nav-links a, .mobile-nav-links button {
                display: block;
                padding: 14px 24px;
                font-size: 1rem;
                font-weight: 600;
                color: #333;
                text-decoration: none;
                background: none;
                border: none;
                text-align: left;
                cursor: pointer;
                transition: background 0.15s;
            }
            .mobile-nav-links a:hover, .mobile-nav-links button:hover {
                background: #fff1f1;
                color: #dc2626;
            }
            .mobile-nav-divider {
                height: 1px;
                background: #f1f1f1;
                margin: 8px 0;
            }

            @media (max-width: 900px) {
                .hamburger-btn { display: block; }
                .menu-bar, nav.menu-bar { display: none !important; }
            }

        </style>
    </head>
    <body>
        <script>
            // 환경설정에서 카카오맵 API키를 window에 노출 (템플릿 상단에 추가)
            window.KAKAO_MAP_APP_KEY =
                "{{ settings.KAKAO_JAVAS_API_KEY if settings and settings.KAKAO_JAVAS_API_KEY else '' }}";
        </script>
        <header class="header">
            <div class="header-left">
                <button class="hamburger-btn" id="hamburgerBtn" onclick="openMobileNav()">☰</button>
                <a href="/main" class="header-logo">TasteMate</a>
            </div>
            <div class="header-right">
                <button id="headerLoginBtn" class="login-btn" onclick="location.href = '/login'">로그인</button>
            </div>
        </header>

        <div class="container">
            <div id="post-title" class="post-title">게시글 불러오는 중...</div>
            <div style="font-size: 0.95rem; color: #666; margin-bottom: 20px; font-weight: bold" id="post-date"></div>
            <div id="post-content" class="post-content"></div>
            <div id="post-image-area"></div>
            <div id="post-action-btns" style="display: flex; gap: 8px; margin-bottom: 18px"></div>

            <div style="margin-bottom: 18px">
                <button
                    id="likeBtn"
                    style="background: none; border: none; font-size: 1.3rem; cursor: pointer; color: #dc2626"
                >
                    <span id="likeIcon">♡</span> <span id="likeCount">0</span>
                </button>
            </div>

            <div class="comment-section">
                <div class="comment-title">💬 댓글</div>
                <ul id="comment-list" class="comment-list"></ul>
                <form id="commentForm" class="comment-form">
                    <textarea name="content" placeholder="댓글을 입력하세요" required></textarea>
                    <button type="submit">댓글 등록</button>
                </form>
            </div>
        </div>

        <script>
            // 🚨 1. 로그인 상태에 따라 상단 버튼 변경
            document.addEventListener('DOMContentLoaded', () => {
                const nickname = localStorage.getItem('nickname');
                const loginBtn = document.getElementById('headerLoginBtn');
                if (nickname && loginBtn) {
                    loginBtn.textContent = `${nickname}님 (로그아웃)`;
                    loginBtn.style.background = '#2c3e50'; // 로그아웃 느낌으로 색상 변경
                    loginBtn.onclick = () => {
                        localStorage.removeItem('user_id');
                        localStorage.removeItem('nickname');
                        location.reload(); // 로그아웃 시 새로고침
                    };
                }
            });

            // 2. 게시글 상세 및 댓글 불러오기
            const pathParts = window.location.pathname.split('/');
            const postId = pathParts[pathParts.length - 1];

            async function loadPostDetail() {
                try {
                    const res = await fetch(`/api/posts/detail/${postId}`);
                    if (!res.ok) throw new Error('게시글이 없습니다.');
                    const data = await res.json();
                    document.getElementById('post-title').innerText = data.title;
                    document.getElementById('post-content').innerText = data.content;
                    document.getElementById('post-date').innerText =
                        `작성자: ${data.author} | 카테고리: ${data.category} | 작성일: ${data.date}`;
                    // 이미지 표시
                    const imgArea = document.getElementById('post-image-area');
                    imgArea.innerHTML = '';
                    if (data.image_url) {
                        imgArea.innerHTML = `<img src="${data.image_url}" alt="게시글 이미지" style="max-width:100%;margin-bottom:18px;border-radius:8px;box-shadow:0 2px 12px rgba(220,38,38,0.13);" />`;
                    }

                    // 지도 및 장소 정보 표시
                    if (data.lat && data.lon && data.place_name) {
                        const kakaoAppKey = window.KAKAO_MAP_APP_KEY || '404ef7ad32359a5bae46369ef85f2012';
                        imgArea.innerHTML += `
                            <div style="margin-bottom:18px;">
                                <div id="map-area" style="width:100%;height:220px;min-height:220px;border-radius:8px;margin-bottom:8px;background:#f5f5f5;"></div>
                                <div style="background:#fff; border-radius:8px; padding:12px; box-shadow:0 2px 8px rgba(220,38,38,0.07);">
                                    <b style="font-size:1.1rem;color:#dc2626;">${data.place_name}</b><br>
                                    ${data.place_address ? '주소: ' + data.place_address + '<br>' : ''}
                                    ${data.place_phone ? '전화번호: ' + data.place_phone + '<br>' : ''}
                                    ${data.place_category ? '카테고리: ' + data.place_category + '<br>' : ''}
                                    <div style="margin-top:8px;">
                                        <a href="https://map.kakao.com/?q=${encodeURIComponent(data.place_name)}&lat=${data.lat}&lng=${data.lon}" target="_blank" style="background:#f39c12;color:#fff;padding:6px 16px;border-radius:6px;text-decoration:none;font-weight:600;margin-right:6px;">카카오맵 상세보기</a>
                                        <a href="https://map.naver.com/v5/search/${encodeURIComponent(data.place_name)}" target="_blank" style="background:#2db400;color:#fff;padding:6px 16px;border-radius:6px;text-decoration:none;font-weight:600;">네이버맵 상세보기</a>
                                    </div>
                                </div>
                            </div>
                        `;
                        // KakaoMap JS SDK 동적 로드 및 지도 표시
                        function loadKakaoMapScript(callback) {
                            if (window.kakao && window.kakao.maps) {
                                callback();
                                return;
                            }
                            // SDK 중복 로드 방지
                            if (document.getElementById('kakaoMapScript')) {
                                callback();
                                return;
                            }
                            const script = document.createElement('script');
                            script.id = 'kakaoMapScript';
                            script.src = `https://dapi.kakao.com/v2/maps/sdk.js?autoload=false&appkey=${kakaoAppKey}&libraries=services`;
                            script.onload = callback;
                            script.onerror = function () {
                                const mapContainer = document.getElementById('map-area');
                                if (mapContainer)
                                    mapContainer.innerHTML =
                                        '<div style="color:#b91c1c; padding:12px;">지도 API 로드 실패 (appkey 확인 필요)</div>';
                            };
                            document.head.appendChild(script);
                        }
                        loadKakaoMapScript(() => {
                            kakao.maps.load(function () {
                                const mapContainer = document.getElementById('map-area');
                                if (!mapContainer) {
                                    console.warn('map-area div가 존재하지 않습니다.');
                                    return;
                                }
                                try {
                                    const lat = parseFloat(data.lat);
                                    const lon = parseFloat(data.lon);
                                    if (isNaN(lat) || isNaN(lon)) {
                                        mapContainer.innerHTML =
                                            '<div style="color:#b91c1c; padding:12px;">좌표 정보가 올바르지 않습니다.</div>';
                                        return;
                                    }
                                    const mapOption = {
                                        center: new kakao.maps.LatLng(lat, lon),
                                        level: 4,
                                    };
                                    const map = new kakao.maps.Map(mapContainer, mapOption);
                                    const marker = new kakao.maps.Marker({
                                        position: new kakao.maps.LatLng(lat, lon),
                                    });
                                    marker.setMap(map);
                                } catch (err) {
                                    mapContainer.innerHTML =
                                        '<div style="color:#b91c1c; padding:12px;">지도를 표시할 수 없습니다.</div>';
                                    console.error('지도 오류:', err);
                                }
                            });
                        });
                    }

                    // ...existing code...
                    // 수정/삭제 버튼 노출 제어
                    const userNickname = localStorage.getItem('nickname');
                    const actionBtns = document.getElementById('post-action-btns');
                    if (userNickname && userNickname === data.author) {
                        actionBtns.innerHTML = `
                            <button id="editBtn" style="padding:6px 16px; border-radius:6px; border:1.5px solid #dc2626; background:#fff; color:#dc2626; font-weight:700; cursor:pointer;">수정</button>
                            <button id="deleteBtn" style="padding:6px 16px; border-radius:6px; border:1.5px solid #dc2626; background:#dc2626; color:#fff; font-weight:700; cursor:pointer;">삭제</button>
                        `;
                        document.getElementById('editBtn').onclick = () => {
                            window.location.href = `/write?edit=${postId}`;
                        };
                        document.getElementById('deleteBtn').onclick = async () => {
                            if (!confirm('정말 삭제하시겠습니까?')) return;
                            const userId = localStorage.getItem('user_id');
                            const res = await fetch(`/api/posts/${postId}/delete`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ user_id: userId }),
                            });
                            if (res.ok) {
                                alert('삭제되었습니다.');
                                window.location.href = '/main';
                            } else {
                                alert('삭제 권한이 없습니다.');
                            }
                        };
                    } else {
                        actionBtns.innerHTML = '';
                    }
                    // 좋아요 개수 불러오기
                    let liked = false;
                    async function fetchLikeCount() {
                        try {
                            const userId = localStorage.getItem('user_id');
                            const res = await fetch(`/api/posts/${postId}`);
                            if (!res.ok) return;
                            const data = await res.json();
                            let likeCount = 0;
                            if (Array.isArray(data) && data.length > 0) {
                                likeCount = data[0].like_count || 0;
                            } else if (data.like_count !== undefined) {
                                likeCount = data.like_count;
                            }
                            document.getElementById('likeCount').innerText = likeCount;
                            // 좋아요 상태 확인
                            if (userId) {
                                const checkRes = await fetch(`/api/posts/${postId}/is_liked?user_id=${userId}`);
                                if (checkRes.ok) {
                                    const checkData = await checkRes.json();
                                    liked = checkData.liked;
                                } else {
                                    liked = false;
                                }
                            } else {
                                liked = false;
                            }
                            document.getElementById('likeIcon').innerText = liked ? '❤️' : '♡';
                        } catch {}
                    }

                    fetchLikeCount();
                    const commentsHtml = data.comments
                        .map(
                            (c) => `
                        <li>
                            <div style="font-size: 0.85rem; color: #dc2626; font-weight: bold; margin-bottom: 4px;">👤 ${c.author} <span style="color:#aaa; font-weight:normal;">| ${c.date}</span></div>
                            <div>${c.content}</div>
                        </li>
                    `,
                        )
                        .join('');
                    document.getElementById('comment-list').innerHTML =
                        commentsHtml || '<li style="text-align:center; color:#888;">첫 댓글을 남겨보세요!</li>';
                } catch (err) {
                    document.getElementById('post-title').innerText = '데이터를 불러올 수 없습니다.';
                }
            }

            // 좋아요 버튼 클릭 이벤트
            document.getElementById('likeBtn').onclick = async () => {
                const userId = localStorage.getItem('user_id');
                if (!userId) {
                    alert('로그인이 필요합니다!');
                    sessionStorage.setItem('return_url', window.location.pathname);
                    window.location.href = '/login';
                    return;
                }
                const formData = new FormData();
                formData.append('user_id', userId);
                const res = await fetch(`/api/posts/${postId}/like`, { method: 'POST', body: formData });
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('likeCount').innerText = data.like_count;
                    liked = data.liked;
                    document.getElementById('likeIcon').innerText = liked ? '❤️' : '♡';
                } else {
                    alert('좋아요 처리에 실패했습니다.');
                }
            };

            // 3. 댓글 등록 로직
            document.getElementById('commentForm').onsubmit = async (e) => {
                e.preventDefault();
                const userId = localStorage.getItem('user_id');
                if (!userId) {
                    alert('로그인이 필요합니다.');
                    sessionStorage.setItem('return_url', window.location.pathname);
                    window.location.href = '/login';
                    return;
                }

                const formData = new FormData(e.target);
                formData.append('post_id', postId);
                formData.append('user_id', userId);

                const res = await fetch('/api/comments', { method: 'POST', body: formData });
                if (res.ok) {
                    document.querySelector('textarea[name="content"]').value = '';
                    loadPostDetail();
                } else {
                    alert('댓글 등록에 실패했습니다.');
                }
            };

            loadPostDetail();
        </script>
    
    <!-- 모바일 햄버거 메뉴 -->

                <a href="/main" class="mobile-nav-logo">🍽️ TasteMate</a>
                <button class="mobile-nav-close" onclick="closeMobileNav()">✕</button>
            </div>
            <div class="mobile-nav-links">
                <a href="/main">🏠 홈</a>
                <a href="/aichat">🤖 AI 맛집추천</a>
                <a href="/community">🧑‍🤝‍🧑 커뮤니티</a>
                <div class="mobile-nav-divider"></div>
                <a href="/SOLO">🍚 혼밥</a>
                <a href="/DATE">💑 데이트</a>
                <a href="/WORK">🍻 회식</a>
                <a href="/ETC">🧩 기타</a>
                <div class="mobile-nav-divider"></div>
                <a href="/game/pinball">🎯 핀볼</a>
                <a href="/game/ladder">🪜 사다리타기</a>
                <a href="/game/random_amount">🎰 룰렛 게임</a>
                <a href="/game/worldcup">🏆 음식 월드컵</a>
                <a href="/game/calculator">🧮 계산기</a>
                <div class="mobile-nav-divider"></div>
                <a href="/about">ℹ️ 회사소개</a>
            </div>
        </div>
    </div>

        <script>
            function openMobileNav() {
                document.getElementById('mobileNav').classList.add('open');
                document.body.style.overflow = 'hidden';
            }
            function closeMobileNav() {
                document.getElementById('mobileNav').classList.remove('open');
                document.body.style.overflow = '';
            }
            function closeMobileNavOutside(e) {
                if (e.target === document.getElementById('mobileNav')) closeMobileNav();
            }
        </script>

</body>
</html>

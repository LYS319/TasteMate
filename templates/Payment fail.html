<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결제 실패 — TasteMate</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'맑은 고딕',sans-serif; background:#FFF0F0;
         display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .card { background:#fff; border-radius:24px; padding:48px 40px;
          text-align:center; box-shadow:0 8px 40px rgba(220,38,38,0.10); max-width:420px; width:90%; }
  .icon { font-size:64px; margin-bottom:20px; }
  h1 { font-size:22px; color:#1F2937; margin-bottom:8px; }
  .sub { font-size:14px; color:#6B7280; margin-bottom:28px; line-height:1.6; }
  .error-msg { background:#FEE2E2; color:#991B1B; font-size:13px;
               padding:12px 16px; border-radius:10px; margin-bottom:24px; }
  .btn { display:block; background:#2563EB; color:#fff; text-decoration:none;
         padding:14px; border-radius:14px; font-size:15px; font-weight:700;
         margin-bottom:12px; cursor:pointer; border:none; width:100%; }
  .btn-gray { background:#F3F4F6; color:#374151; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">😢</div>
  <h1>결제에 실패했어요</h1>
  <p class="sub">결제 중 문제가 발생했습니다.<br>다시 시도해 주세요.</p>
  <div class="error-msg" id="error-msg">오류 정보를 불러오는 중...</div>
  <button class="btn" onclick="history.back()">↩ 다시 시도하기</button>
  <a href="/main" class="btn btn-gray">홈으로 돌아가기</a>
</div>
<script>
  const params = new URLSearchParams(location.search);
  const msg = params.get('message') || '알 수 없는 오류가 발생했습니다.';
  const code = params.get('code') || '';
  document.getElementById('error-msg').textContent = code ? `[${code}] ${msg}` : msg;
</script>
</body>
</html>

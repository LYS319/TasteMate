<!doctype html>
<html lang="ko">
    <head>
    <script>
        // ngrok iframe 탈출 - 경고 페이지 없이 직접 접속
        if (window.top !== window.self) {
            window.top.location.href = window.self.location.href;
        }
    </script>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>테이스트메이트 회원가입</title>
        <style>
            .menu-toggle-btn {
                background: none;
                border: none;
                font-size: 2.1rem;
                margin-left: 8px;
                cursor: pointer;
                border-radius: 8px;
                padding: 4px 12px;
                transition: background 0.18s;
            }
            .menu-toggle-btn:hover {
                background: #ffe5e5;
            }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            body {
                margin: 0;
                font-family: 'Noto Sans KR', sans-serif;
                background: #fff;
            }
            .header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 16px 32px;
                background: rgba(255, 255, 255, 0.85);
                box-shadow: 0 2px 16px rgba(220, 38, 38, 0.1);
                backdrop-filter: blur(12px);
            }
            .header-left {
                display: flex;
                align-items: center;
                gap: 24px;
            }
            .header-logo {
                display: flex;
                align-items: center;
                gap: 18px;
                font-size: 1.5rem;
                font-weight: bold;
                color: #dc2626;
                text-decoration: none;
                transition: transform 0.2s;
            }
            .header-logo:hover {
                transform: scale(1.05);
            }
            .header-right {
                display: flex;
                align-items: center;
                gap: 18px;
            }
            .current-location {
                font-size: 1rem;
                color: #dc2626;
                background: #fff5f5;
                border: 1px solid #ffe5e5;
                border-radius: 4px;
                padding: 6px 16px;
                margin-left: 4px;
                font-weight: 600;
            }
            .login-btn {
                padding: 8px 20px;
                background: #dc2626;
                color: #fff;
                border: none;
                border-radius: 4px;
                font-size: 1rem;
                cursor: pointer;
                transition: background 0.2s;
            }
            .login-btn:hover {
                background: #b91c1c;
            }
            .nav-emoji-btn {
                background: none;
                border: none;
                font-size: 1.7rem;
                margin: 0 2px;
                cursor: pointer;
                border-radius: 8px;
                padding: 4px 10px;
                transition: background 0.18s;
            }
            .nav-emoji-btn:hover,
            .nav-emoji-btn.active {
                background: #ffe5e5;
            }
            .signup-main {
                max-width: 420px;
                margin: 80px auto 0 auto;
                padding: 0 16px;
            }
            .signup-title {
                font-size: 2rem;
                font-weight: 900;
                color: #dc2626;
                margin-bottom: 32px;
                letter-spacing: 1px;
                text-align: center;
            }
            .signup-form {
                display: flex;
                flex-direction: column;
                gap: 18px;
            }
            .signup-form label {
                font-size: 1.08rem;
                font-weight: 600;
                color: #b91c1c;
                margin-bottom: 6px;
            }
            .signup-form input {
                font-size: 1.08rem;
                padding: 10px 14px;
                border: 1.5px solid #ffe5e5;
                border-radius: 6px;
                background: #fff8f8;
                width: 100%;
                box-sizing: border-box;
            }
            .signup-btn-main {
                padding: 16px 0;
                background: #dc2626;
                color: #fff;
                border: none;
                border-radius: 8px;
                font-size: 1.25rem;
                font-weight: 800;
                cursor: pointer;
                margin-top: 10px;
                transition: background 0.2s;
            }
            .signup-btn-main:hover {
                background: #b91c1c;
            }
            .cancel-btn {
                padding: 14px 0;
                background: #fff;
                color: #dc2626;
                border: 1.5px solid #dc2626;
                border-radius: 8px;
                font-size: 1.15rem;
                font-weight: 800;
                cursor: pointer;
                width: 100%;
                box-sizing: border-box;
            }
            .signup-extra {
                margin-top: 18px;
                text-align: center;
                color: #b91c1c;
                font-size: 1rem;
            }
            .signup-extra a {
                color: #dc2626;
                text-decoration: underline;
                margin-left: 8px;
            }
        
            /* ===== 반응형 (태블릿/모바일) ===== */
            @media (max-width: 600px) {
                .container, .login-main, .signup-main, .mypage-container {
                    margin: 20px auto;
                    padding: 20px 14px;
                    border-radius: 10px;
                }
                .header { padding: 12px 16px; }
                .header-logo { font-size: 1.2rem; }
                input, select, textarea { font-size: 1rem !important; }
                .back-btn, .login-btn-main, .signup-btn-main { font-size: 1rem; padding: 13px 0; }
                .tab-btn { padding: 8px 16px; font-size: 0.95rem; }
            }

        
            .mobile-nav { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 2000; }
            .mobile-nav.open { display: block; }
            .mobile-nav-panel { position: absolute; top: 0; left: 0; width: 260px; height: 100%; background: #fff; box-shadow: 4px 0 20px rgba(0,0,0,0.15); display: flex; flex-direction: column; }
            .mobile-nav-header { display: flex; align-items: center; justify-content: space-between; padding: 20px; border-bottom: 1px solid #f1f1f1; }
            .mobile-nav-logo { font-size: 1.4rem; font-weight: 900; color: #dc2626; text-decoration: none; }
            .mobile-nav-close { background: none; border: none; font-size: 1.6rem; cursor: pointer; color: #666; }
            .mobile-nav-links { padding: 16px 0; display: flex; flex-direction: column; flex: 1; overflow-y: auto; }
            .mobile-nav-links a { display: block; padding: 14px 24px; font-size: 1rem; font-weight: 600; color: #333; text-decoration: none; transition: background 0.15s; }
            .mobile-nav-links a:hover { background: #fff1f1; color: #dc2626; }
            .mobile-nav-divider { height: 1px; background: #f1f1f1; margin: 8px 0; }
        </style>
        <script>
        </script>
    </head>
    <body>
        <header class="header">
            <div class="header-left">
                <button class="menu-toggle-btn" onclick="openMobileNav()">☰</button>
                <a href="/main" class="header-logo">TasteMate</a>
            </div>
            <div class="header-right">
                <button class="login-btn" onclick="location.href = '/login'">로그인</button>
                <span class="current-location">📍 현재 위치</span>
            </div>
        </header>
        <main class="signup-main">
            <div class="signup-title">회원가입</div>

            <form id="signupForm" class="signup-form">
                <div>
                    <label for="nickname">닉네임</label>
                    <input type="text" id="nickname" name="nickname" placeholder="닉네임을 입력하세요" required />
                </div>
                <div>
                    <label for="email">이메일 (아이디)</label>
                    <input type="email" id="email" name="email" placeholder="이메일을 입력하세요" required />
                </div>
                <div>
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required />
                </div>
                <button type="submit" class="signup-btn-main">회원가입</button>
                <button type="button" class="cancel-btn" onclick="location.href = '/login'">취소</button>
            </form>

            <div class="signup-extra">
                이미 계정이 있으신가요?
                <a href="/login">로그인</a>
            </div>
        </main>

        <script>
            // 🚨 백엔드로 데이터 전송
            document.getElementById('signupForm').onsubmit = async (e) => {
                e.preventDefault();
                try {
                    const res = await fetch('/api/signup', { method: 'POST', body: new FormData(e.target) });
                    const data = await res.json();

                    if (res.ok) {
                        alert('회원가입이 완료되었습니다! 로그인 페이지로 이동합니다.');
                        window.location.href = data.redirect;
                    } else {
                        alert(data.detail || '회원가입에 실패했습니다.');
                    }
                } catch (err) {
                    alert('서버 통신 오류가 발생했습니다.');
                }
            };
        </script>
    
        <div class="mobile-nav" id="mobileNav" onclick="closeMobileNavOutside(event)">
            <div class="mobile-nav-panel">
                <div class="mobile-nav-header">
                    <a href="/main" class="mobile-nav-logo">🍽️ TasteMate</a>
                    <button class="mobile-nav-close" onclick="closeMobileNav()">✕</button>
                </div>
                <div class="mobile-nav-links">
                    <a href="/main">🏠 홈</a>
                    <a href="/aichat">🤖 AI 맛집추천</a>
                    <a href="/community">🧑‍🤝‍🧑 커뮤니티</a>
                    <div class="mobile-nav-divider"></div>
                    <a href="/SOLO">🍚 혼밥</a>
                    <a href="/DATE">💑 데이트</a>
                    <a href="/WORK">🍻 회식</a>
                    <a href="/ETC">🧩 기타</a>
                    <div class="mobile-nav-divider"></div>
                    <a href="/game/pinball">🎯 핀볼</a>
                    <a href="/game/ladder">🪜 사다리타기</a>
                    <a href="/game/random_amount">🎰 룰렛 게임</a>
                    <a href="/game/worldcup">🏆 음식 월드컵</a>
                    <a href="/game/calculator">🧮 계산기</a>
                    <div class="mobile-nav-divider"></div>
                    <a href="/about">ℹ️ 회사소개</a>
                </div>
            </div>
        </div>
        <script>
            function openMobileNav()  { document.getElementById('mobileNav').classList.add('open'); document.body.style.overflow='hidden'; }
            function closeMobileNav() { document.getElementById('mobileNav').classList.remove('open'); document.body.style.overflow=''; }
            function closeMobileNavOutside(e) { if(e.target===document.getElementById('mobileNav')) closeMobileNav(); }
        </script>
</body>
</html>

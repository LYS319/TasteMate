<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>회원가입 - TasteMate</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js" defer></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-left">
                <button class="menu-toggle-btn" onclick="toggleMenu()">☰</button>
                <a href="/main" class="header-logo">TasteMate</a>
            </div>
            <div class="header-right" id="headerRightArea"></div>
        </div>
    </header>

    <main style="padding-top: 120px;">
        <div class="container" style="max-width: 450px;">
            <div class="main-title" style="margin-bottom: 20px;">✍️ 회원가입</div>
            <form id="signupForm" style="display: flex; flex-direction: column; gap: 12px; background: #fff; padding: 25px; border-radius: 18px; border: 1.5px solid var(--border-red); box-shadow: 0 4px 12px var(--shadow-soft);">
                <input type="text" name="nickname" placeholder="사용할 닉네임" required style="padding: 14px; border-radius: 8px; border: 1px solid #ddd;">
                <input type="email" name="email" placeholder="이메일 계정" required style="padding: 14px; border-radius: 8px; border: 1px solid #ddd;">
                <input type="password" name="password" placeholder="비밀번호 (6자 이상)" required style="padding: 14px; border-radius: 8px; border: 1px solid #ddd;">
                <button type="submit" class="main-btn" style="padding: 15px;">가입 완료</button>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('signupForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/signup', { method: 'POST', body: new FormData(e.target) });
            if (res.ok) {
                alert("회원가입 성공! 로그인해주세요.");
                window.location.href = "/login"; // 🌟 가입 후 로그인 이동
            } else { alert("가입 실패: 이미 존재하거나 잘못된 정보입니다."); }
        };
    </script>
</body>
</html>

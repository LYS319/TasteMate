<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>테이스트메이트 - 사다리타기 Pro</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
            rel="stylesheet"
        />

        <style>
            :root {
                --primary-color: #dc2626;
                --primary-hover: #b91c1c;
                --bg-gradient: linear-gradient(135deg, #fdfdfd 0%, #f1f1f1 100%);
                --glass-bg: rgba(255, 255, 255, 0.85);
            }

            body {
                margin: 0;
                font-family: 'Noto Sans KR', sans-serif;
                background: var(--bg-gradient);
                color: #333;
                min-height: 100vh;
            }

            /* ===== Header (공통 스타일) ===== */
            .header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 16px 32px;
                background: var(--glass-bg);
                box-shadow: 0 2px 16px rgba(220, 38, 38, 0.1);
                backdrop-filter: blur(12px);
                position: sticky;
                top: 0;
                z-index: 2000;
                box-sizing: border-box;
                width: 100%;
            }
            .header-left {
                display: flex;
                align-items: center;
                gap: 24px;
            }
            .header-logo {
                font-size: 1.5rem;
                font-weight: 900;
                color: var(--primary-color);
                text-decoration: none;
            }
            .menu-bar {
                display: flex;
                gap: 18px;
                margin-left: 24px;
            }
            .menu-item {
                font-size: 1.1rem;
                font-weight: 700;
                color: var(--primary-color);
                text-decoration: none;
                padding: 8px 18px;
                border-radius: 8px;
            }
            .menu-item:hover {
                background: #fff5f5;
            }

            .game-dropdown {
                position: relative;
                cursor: pointer;
            }
            .dropdown-content {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                background: #fff;
                min-width: 140px;
                box-shadow: 0 4px 16px rgba(220, 38, 38, 0.13);
                border-radius: 12px;
                padding: 12px 0;
                flex-direction: column;
                z-index: 3000;
            }
            .game-dropdown:hover .dropdown-content {
                display: flex;
            }
            .dropdown-content a {
                color: var(--primary-color);
                padding: 10px 24px;
                text-decoration: none;
                font-weight: 600;
            }
            .dropdown-content a:hover {
                background: #ffe5e5;
            }

            .login-btn {
                padding: 8px 16px;
                background: var(--primary-color);
                color: #fff;
                border: none;
                border-radius: 6px;
                font-weight: bold;
                cursor: pointer;
            }

            /* ===== Layout & Containers ===== */
            .game-main {
                padding: 40px 10px;
            }
            .main-layout-container {
                display: flex;
                justify-content: center;
                align-items: flex-start;
                gap: 20px;
                max-width: 1200px;
                margin: 0 auto;
            }

            .game-container {
                flex: 1;
                max-width: 800px;
                text-align: center;
                background: white;
                padding: 40px;
                border-radius: 32px;
                border: 2px solid var(--primary-color);
                box-shadow: 0 16px 64px rgba(220, 38, 38, 0.15);
            }

            /* ===== Setup Box ===== */
            .setup-title {
                font-weight: 900;
                font-size: 2rem;
                color: var(--primary-color);
                margin-top: 0;
                margin-bottom: 10px;
            }
            .setup-desc {
                color: #666;
                margin-bottom: 25px;
                font-size: 1rem;
            }

            input {
                padding: 10px;
                border-radius: 10px;
                border: 1px solid #ddd;
                margin: 4px;
                text-align: center;
                font-family: inherit;
            }
            input:focus {
                border-color: var(--primary-color);
                outline: none;
            }

            .action-btn {
                background: var(--primary-color);
                color: white;
                border: none;
                padding: 12px 28px;
                border-radius: 12px;
                font-size: 1rem;
                font-weight: 900;
                cursor: pointer;
                transition: 0.2s;
                margin: 5px;
            }
            .action-btn:hover {
                transform: scale(1.05);
                background: var(--primary-hover);
            }

            /* ===== Game Canvas & Results ===== */
            canvas {
                background: #fff;
                border-radius: 20px;
                cursor: pointer;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
                margin: 20px auto;
                border: 6px solid #2d2d3a;
                display: block;
            }

            .winner-banner {
                background: var(--primary-color);
                color: white;
                padding: 8px 20px;
                border-radius: 12px;
                font-size: 1.2rem;
                font-weight: 900;
                display: inline-block;
                margin-bottom: 15px;
            }
            table.ladder-result-table {
                margin-top: 25px;
                width: 100%;
                border-collapse: separate;
                border-spacing: 0;
                border-radius: 15px;
                overflow: hidden;
                border: 1px solid #eee;
                background: #fff;
            }
            .ladder-result-table th {
                background: var(--primary-color);
                color: white;
                padding: 15px;
                font-weight: 800;
            }
            .ladder-result-table td {
                padding: 12px;
                border-bottom: 1px solid #eee;
                background: #fff;
                text-align: center;
            }
            .ladder-result-table tr.current-row {
                background: #fff5f5 !important;
                font-weight: bold;
                color: var(--primary-color);
            }
        </style>
    </head>

    <body>
        <header class="header">
            <div class="header-left">
                <a href="/main" class="header-logo">TasteMate</a>
                <nav class="menu-bar">
                    <a class="menu-item" href="/aichat">AI추천</a>
                    <a class="menu-item" href="/community">커뮤니티</a>
                    <div class="menu-item game-dropdown">
                        <span>게임 ▾</span>
                        <div class="dropdown-content">
                            <a href="/game/pinball">핀볼</a>
                            <a href="/game/ladder">사다리타기</a>
                            <a href="/game/random_amount">룰렛 게임</a>
                            <a href="/game/worldcup">음식 월드컵</a>
                            <a href="/game/calculator">계산기</a>
                        </div>
                    </div>
                </nav>
            </div>
            <button class="login-btn">로그인</button>
        </header>

        <main class="game-main">
            <div class="main-layout-container">
                <div class="game-container">
                    <div id="setupView">
                        <h2 class="setup-title">🍻 사다리타기</h2>
                        <p class="setup-desc">인원수를 설정하고 미식 운명을 확인하세요!</p>

                        <div style="margin-bottom: 20px">
                            인원수: <input type="number" id="count" value="4" min="2" max="10" style="width: 60px" />
                            <button class="action-btn" onclick="initInputs()">창 생성</button>
                        </div>

                        <div id="inputs" style="max-height: 300px; overflow-y: auto; margin-bottom: 20px"></div>

                        <button id="startBtn" class="action-btn" style="display: none" onclick="createLadder()">
                            🏁 사다리 만들기
                        </button>
                    </div>

                    <div id="gameView" style="display: none">
                        <div class="winner-banner" id="resultText">🕹️ 이름을 클릭하여 시작하세요!</div>
                        <canvas id="canvas"></canvas>
                        <br />
                        <button
                            class="action-btn"
                            style="background: #666; font-size: 0.9rem"
                            onclick="location.reload()"
                        >
                            처음부터 다시
                        </button>
                        <div id="resultHistoryContainer" style="max-width: 600px; margin: 30px auto 0">
                            <h3 style="color: var(--primary-color); margin-bottom: 10px">실행 결과 기록</h3>
                            <table class="ladder-result-table">
                                <thead>
                                    <tr>
                                        <th>순번</th>
                                        <th>이름</th>
                                        <th>결과</th>
                                    </tr>
                                </thead>
                                <tbody id="resultHistory"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <script>
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const resultTextDiv = document.getElementById('resultText');
            let members = [],
                results = [],
                bridges = [];
            const colWidth = 140,
                rowHeight = 400,
                padding = 80;
            let isDrawing = false;
            const pathColors = ['#dc2626', '#2563eb', '#059669', '#d97706', '#7c3aed', '#db2777'];
            let resultHistoryArr = [];

            function initInputs() {
                const n = document.getElementById('count').value;
                const container = document.getElementById('inputs');
                container.innerHTML = '';
                for (let i = 0; i < n; i++) {
                    container.innerHTML += `
                        <div style="display: flex; justify-content: center; gap: 5px; margin-bottom: 5px;">
                            <input type="text" class="name-in" placeholder="이름 ${i + 1}" value="사람${i + 1}" style="width: 100px;">
                            <input type="text" class="val-in" placeholder="벌칙 ${i + 1}" value="${i === 0 ? '당첨' : '통과'}" style="width: 100px;">
                        </div>`;
                }
                document.getElementById('startBtn').style.display = 'inline-block';
            }

            function createLadder() {
                members = Array.from(document.querySelectorAll('.name-in')).map((i) => i.value || '미정');
                results = Array.from(document.querySelectorAll('.val-in')).map((i) => i.value || '꽝');

                canvas.width = (members.length - 1) * colWidth + padding * 2;
                canvas.height = rowHeight + 150;

                document.getElementById('setupView').style.display = 'none';
                document.getElementById('gameView').style.display = 'block';

                bridges = [];
                for (let i = 0; i < members.length - 1; i++) {
                    let lastY = 0;
                    for (let j = 0; j < 5; j++) {
                        let y = 100 + Math.random() * (rowHeight - 60);
                        if (Math.abs(y - lastY) > 30) {
                            bridges.push({ col: i, y: y });
                            lastY = y;
                        }
                    }
                }
                bridges.sort((a, b) => a.y - b.y);
                drawBase();
            }

            function drawBase() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = '#ddd';
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';

                members.forEach((name, i) => {
                    const x = padding + i * colWidth;
                    ctx.beginPath();
                    ctx.moveTo(x, 70);
                    ctx.lineTo(x, rowHeight + 70);
                    ctx.stroke();

                    ctx.fillStyle = '#333';
                    ctx.font = 'bold 16px Noto Sans KR';
                    ctx.textAlign = 'center';
                    ctx.fillText(name, x, 50);

                    ctx.fillStyle = '#666';
                    ctx.fillText(results[i], x, rowHeight + 110);
                });

                bridges.forEach((b) => {
                    const x = padding + b.col * colWidth;
                    ctx.beginPath();
                    ctx.moveTo(x, b.y);
                    ctx.lineTo(x + colWidth, b.y);
                    ctx.stroke();
                });
            }

            canvas.onclick = function (e) {
                if (isDrawing) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const x = (e.clientX - rect.left) * scaleX;
                for (let i = 0; i < members.length; i++) {
                    const lineX = padding + i * colWidth;
                    if (Math.abs(x - lineX) < 40) {
                        startAnimation(i, pathColors[i % pathColors.length]);
                        break;
                    }
                }
            };

            async function startAnimation(startCol, color) {
                isDrawing = true;
                resultTextDiv.innerText = `🏃 ${members[startCol]}님 이동 중...`;
                let currentCol = startCol;
                let currentY = 70;
                ctx.strokeStyle = color;
                ctx.lineWidth = 6;
                while (currentY < rowHeight + 70) {
                    let nextY = rowHeight + 70;
                    let targetBridge = null;
                    for (let b of bridges) {
                        if (b.y > currentY && (b.col === currentCol || b.col === currentCol - 1)) {
                            nextY = b.y;
                            targetBridge = b;
                            break;
                        }
                    }
                    await animateLine(
                        padding + currentCol * colWidth,
                        currentY,
                        padding + currentCol * colWidth,
                        nextY,
                    );
                    currentY = nextY;
                    if (targetBridge) {
                        let nextCol = targetBridge.col === currentCol ? currentCol + 1 : currentCol - 1;
                        await animateLine(
                            padding + currentCol * colWidth,
                            currentY,
                            padding + nextCol * colWidth,
                            currentY,
                        );
                        currentCol = nextCol;
                    }
                }
                // 결과 누적 기록 (이름, 결과만 테이블에 추가)
                resultHistoryArr.push({
                    name: members[startCol],
                    result: results[currentCol],
                });
                updateResultHistory();
                resultTextDiv.innerHTML = `📢 결과: ${members[startCol]} → [ ${results[currentCol]} ]`;
                isDrawing = false;
            }

            function updateResultHistory() {
                const tbody = document.getElementById('resultHistory');
                tbody.innerHTML = '';
                resultHistoryArr.forEach((item, idx) => {
                    const tr = document.createElement('tr');
                    if (idx === resultHistoryArr.length - 1) tr.className = 'current-row';
                    tr.innerHTML = `<td>${idx + 1}</td><td>${item.name}</td><td>${item.result}</td>`;
                    tbody.appendChild(tr);
                });
            }

            function animateLine(x1, y1, x2, y2) {
                return new Promise((resolve) => {
                    let start = null;
                    const duration = 150;
                    function step(now) {
                        if (!start) start = now;
                        const t = Math.min((now - start) / duration, 1);
                        ctx.beginPath();
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(x1 + (x2 - x1) * t, y1 + (y2 - y1) * t);
                        ctx.stroke();
                        if (t < 1) requestAnimationFrame(step);
                        else resolve();
                    }
                    requestAnimationFrame(step);
                });
            }
        </script>
    </body>
</html>

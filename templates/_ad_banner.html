{# =============================================
   광고 배너 공통 템플릿
   사용법: {% include '_ad_banner.html' %}
   - 데스크탑(≥1200px): 좌/우 세로 배너 (160x600)
   - 모바일(<900px): 헤더 아래 가로 배너 (55px)
============================================= #}

<style>
    .side-ad {
        position: fixed;
        top: 150px;
        width: 160px;
        height: 600px;
        background: #f4f4f4;
        border: 1px solid #ddd;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #999;
        font-weight: bold;
        z-index: 500;
        border-radius: 10px;
        font-size: 0.85rem;
        text-align: center;
        padding: 8px;
        box-sizing: border-box;
    }
    .ad-left  { left: 20px; }
    .ad-right { right: 20px; }

    .mobile-top-ad {
        display: none;
        position: fixed;
        top: 100px;
        left: 0;
        right: 0;
        height: 55px;
        background: #f4f4f4;
        border-bottom: 1px solid #ddd;
        align-items: center;
        justify-content: center;
        color: #999;
        font-weight: bold;
        font-size: 0.9rem;
        z-index: 499;
    }

    @media (max-width: 1200px) {
        .side-ad { display: none; }
    }
    @media (max-width: 900px) {
        .mobile-top-ad { display: flex; }
    }
</style>

<div class="side-ad ad-left">광고 영역 (좌)</div>
<div class="side-ad ad-right">광고 영역 (우)</div>
<div class="mobile-top-ad" id="mobileTopAd">📢 광고 영역 (모바일)</div>

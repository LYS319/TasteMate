<!doctype html>
<html lang="ko">
    <head>
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                const dropdown = document.querySelector('.game-dropdown');
                const content = dropdown?.querySelector('.dropdown-content');
                let dropdownTimer = null;
                if (dropdown && content) {
                    dropdown.addEventListener('mouseenter', () => {
                        clearTimeout(dropdownTimer);
                        content.style.display = 'block';
                    });
                    dropdown.addEventListener('mouseleave', () => {
                        dropdownTimer = setTimeout(() => {
                            content.style.display = 'none';
                        }, 120);
                    });
                    content.addEventListener('mouseenter', () => {
                        clearTimeout(dropdownTimer);
                        content.style.display = 'block';
                    });
                    content.addEventListener('mouseleave', () => {
                        dropdownTimer = setTimeout(() => {
                            content.style.display = 'none';
                        }, 120);
                    });
                }
            });
        </script>
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                var overlay = document.getElementById('panelOverlay');
                if (overlay) {
                    overlay.addEventListener('click', function () {
                        if (typeof togglePanel === 'function') togglePanel();
                    });
                }
            });
            if (window.top !== window.self) {
                window.top.location.href = window.self.location.href;
            }
        </script>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>테이스트메이트 - 1인당 계산기</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="/static/css/header.css" />
        <style>
            :root {
                --primary-color: #dc2626;
                --primary-hover: #b91c1c;
                --bg-gradient: linear-gradient(135deg, #fdfdfd 0%, #f1f1f1 100%);
                --glass-bg: rgba(255, 255, 255, 0.85);
            }
            body {
                margin: 0;
                font-family: 'Noto Sans KR', sans-serif;
                background: var(--bg-gradient);
                color: #333;
                min-height: 100vh;
            }

            .game-main {
                padding: 160px 10px 60px;
            }
            .main-layout-container {
                display: flex;
                justify-content: center;
                align-items: flex-start;
                max-width: 1200px;
                margin: 0 auto;
            }
            .calc-container {
                flex: 1;
                max-width: 500px;
                text-align: center;
                background: white;
                padding: 40px;
                border-radius: 32px;
                border: 2px solid var(--primary-color);
                box-shadow: 0 16px 64px rgba(220, 38, 38, 0.15);
            }
            .setup-title {
                font-weight: 900;
                font-size: 2rem;
                color: var(--primary-color);
                margin-top: 0;
                margin-bottom: 10px;
            }
            .setup-desc {
                color: #666;
                margin-bottom: 25px;
                font-size: 1rem;
            }
            .form-group {
                text-align: left;
                margin-bottom: 20px;
            }
            .form-label {
                font-weight: 800;
                color: #444;
                margin-bottom: 8px;
                display: block;
                padding-left: 5px;
            }
            input {
                padding: 14px;
                border-radius: 12px;
                border: 1px solid #ddd;
                width: 100%;
                box-sizing: border-box;
                text-align: center;
                font-family: inherit;
                font-size: 1.1rem;
            }
            input:focus {
                border-color: var(--primary-color);
                outline: none;
                box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.05);
            }
            .action-btn {
                background: var(--primary-color);
                color: white;
                border: none;
                padding: 15px 40px;
                border-radius: 12px;
                font-size: 1.1rem;
                font-weight: 900;
                cursor: pointer;
                transition: 0.2s;
                width: 100%;
                margin-top: 10px;
            }
            .action-btn:hover {
                transform: scale(1.02);
                background: var(--primary-hover);
            }
            .result-banner {
                background: #fff5f5;
                color: var(--primary-color);
                padding: 20px;
                border-radius: 15px;
                font-size: 1.2rem;
                font-weight: 900;
                margin-top: 25px;
                display: none;
                flex-direction: column;
                gap: 8px;
                border: 1px solid #ffebeb;
                animation: fadeIn 0.4s ease;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .side-ad {
                position: fixed;
                top: 150px;
                width: 160px;
                height: 600px;
                background: #f4f4f4;
                border: 1px solid #ddd;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #999;
                font-weight: bold;
                z-index: 500;
                border-radius: 10px;
                font-size: 0.85rem;
                text-align: center;
                padding: 8px;
                box-sizing: border-box;
            }
            .ad-left {
                left: 20px;
            }
            .ad-right {
                right: 20px;
            }
            .mobile-top-ad {
                display: none;
                position: fixed;
                top: 100px;
                left: 0;
                right: 0;
                height: 55px;
                background: #f4f4f4;
                border-bottom: 1px solid #ddd;
                align-items: center;
                justify-content: center;
                color: #999;
                font-weight: bold;
                font-size: 0.9rem;
                z-index: 499;
            }
            @media (max-width: 1200px) {
                .side-ad {
                    display: none;
                }
            }
            @media (max-width: 900px) {
                .mobile-top-ad {
                    display: flex;
                }
                .game-main {
                    padding-top: 80px !important;
                }
            }
        </style>
    </head>
    <body>
        <header class="header">
            <div class="header-left">
                <a href="/main" class="header-logo">TasteMate</a>
                <nav class="menu-bar">
                    <a class="menu-item" href="/about">회사소개</a>
                    <a class="menu-item" href="/aichat">AI추천</a>
                    <a class="menu-item" href="/community">커뮤니티</a>
                    <div class="menu-item game-dropdown">
                        <span>게임 ▾</span>
                        <div class="dropdown-content">
                            <a href="/game/pinball">핀볼</a>
                            <a href="/game/ladder">사다리타기</a>
                            <a href="/game/random_amount">룰렛 게임</a>
                            <a href="/game/worldcup">음식 월드컵</a>
                            <a href="/game/calculator">계산기</a>
                        </div>
                    </div>
                </nav>
            </div>
            <div class="header-center"></div>
            <div class="header-right" id="headerRightArea">
                <button class="login-btn" onclick="location.href = '/login'">로그인</button>
                <button
                    class="login-btn"
                    style="background: #fff; color: #dc2626; border: 1.5px solid #dc2626"
                    onclick="location.href = '/signup'"
                >
                    회원가입
                </button>
            </div>
        </header>

        <main class="game-main">
            <div class="side-ad ad-left">광고 영역 (좌)</div>
            <div class="side-ad ad-right">광고 영역 (우)</div>
            <div class="mobile-top-ad">📢 광고 영역 (모바일)</div>
            <div class="main-layout-container">
                <div class="calc-container">
                    <h2 class="setup-title">🧮 1인당 계산기</h2>
                    <p class="setup-desc">정확하고 공평한 정산을 도와드립니다.</p>
                    <form
                        onsubmit="
                            event.preventDefault();
                            calculateAmount();
                        "
                    >
                        <div class="form-group">
                            <label class="form-label">👥 인원수</label>
                            <input id="calcPeople" type="number" min="1" placeholder="몇 명인가요?" />
                        </div>
                        <div class="form-group">
                            <label class="form-label">💰 총 금액</label>
                            <input id="calcAmount" type="text" placeholder="금액을 입력하세요" />
                        </div>
                        <button class="action-btn" type="submit">정산하기</button>
                    </form>
                    <div id="calcResult" class="result-banner"></div>
                    <button
                        class="action-btn"
                        style="background: #666; font-size: 0.9rem; margin-top: 20px"
                        onclick="location.reload()"
                    >
                        초기화
                    </button>
                </div>
            </div>
        </main>

        <script>
            function logout() {
                localStorage.clear();
                alert('안전하게 로그아웃 되었습니다.');
                window.location.href = '/main';
            }
            function getGPSLocation() {
                const locSpan = document.getElementById('gps-location');
                if (!locSpan) return;
                if (navigator.geolocation) {
                    locSpan.innerText = '📍 위치 찾는 중...';
                    navigator.geolocation.getCurrentPosition(
                        async (pos) => {
                            try {
                                const res = await fetch(
                                    `/api/reverse-geocode?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`,
                                );
                                const data = await res.json();
                                locSpan.innerText = `📍 ${data.address.city || data.address.province || '위치 확인됨'}`;
                            } catch (e) {
                                locSpan.innerText = '📍 위치 확인됨';
                            }
                        },
                        () => {
                            locSpan.innerText = '📍 위치 거부됨';
                        },
                    );
                }
            }
            const calcAmountInput = document.getElementById('calcAmount');
            calcAmountInput.addEventListener('input', function () {
                let value = calcAmountInput.value.replace(/[^0-9]/g, '');
                calcAmountInput.value = value ? Number(value).toLocaleString() : '';
            });
            function calculateAmount() {
                const people = parseInt(document.getElementById('calcPeople').value);
                const amount = parseInt(document.getElementById('calcAmount').value.replace(/,/g, ''));
                const resultDiv = document.getElementById('calcResult');
                if (!people || !amount || people < 1 || amount < 0) {
                    resultDiv.style.display = 'flex';
                    resultDiv.innerHTML = '❗ 입력값이 올바르지 않습니다.';
                    return;
                }
                const perPerson = Math.floor(amount / people / 100) * 100;
                const remain = amount - perPerson * people;
                resultDiv.style.display = 'flex';
                resultDiv.innerHTML = `<div style="font-size: 1.4rem;">💸 1인당 <b>${perPerson.toLocaleString()}원</b></div><div style="font-size: 0.95rem; color: #666; margin-top: 5px;">🪙 남는 금액 <b>${remain.toLocaleString()}원</b></div>`;
            }
            document.addEventListener('DOMContentLoaded', () => {
                const nickname = localStorage.getItem('nickname');
                const isAdmin = localStorage.getItem('is_admin');
                const headerRightArea = document.getElementById('headerRightArea');
                if (nickname && headerRightArea) {
                    let adminButton =
                        isAdmin == '1'
                            ? `<button class="login-btn" onclick="location.href='/admin'" style="background: #2c3e50; margin-left:8px;">⚙️ 관리자</button>`
                            : '';
                    headerRightArea.innerHTML = `<span class="nickname-avatar" id="nicknameAvatar" onclick="location.href='/mypage'">${nickname.slice(0, 2)}</span>${adminButton}<button class="login-btn" onclick="logout()" style="background: #666; margin-left:8px;">로그아웃</button><span class="current-location" id="gps-location" onclick="getGPSLocation()">📍 내 위치</span>`;
                    getGPSLocation && getGPSLocation();
                } else if (headerRightArea) {
                    headerRightArea.innerHTML = `<button class="login-btn" onclick="location.href='/login'">로그인</button><button class="login-btn" style="background:#fff;color:#dc2626;border:1px solid #dc2626" onclick="location.href='/signup'">회원가입</button>`;
                }
            });
        </script>

        <div class="mobile-nav" id="mobileNav" onclick="closeMobileNavOutside(event)">
            <div class="mobile-nav-panel">
                <div class="mobile-nav-header">
                    <a href="/main" class="mobile-nav-logo">🍽️ TasteMate</a>
                    <button class="mobile-nav-close" onclick="closeMobileNav()">✕</button>
                </div>
                <div class="mobile-nav-links">
                    <a href="/main">🏠 홈</a>
                    <a href="/aichat">🤖 AI 맛집추천</a>
                    <a href="/community">🧑‍🤝‍🧑 커뮤니티</a>
                    <div class="mobile-nav-divider"></div>
                    <a href="/SOLO">🍚 혼밥</a><a href="/DATE">💑 데이트</a><a href="/WORK">🍻 회식</a
                    ><a href="/ETC">🧩 기타</a>
                    <div class="mobile-nav-divider"></div>
                    <a href="/game/pinball">🎯 핀볼</a><a href="/game/ladder">🪜 사다리타기</a
                    ><a href="/game/random_amount">🎰 룰렛 게임</a><a href="/game/worldcup">🏆 음식 월드컵</a
                    ><a href="/game/calculator">🧮 계산기</a>
                    <div class="mobile-nav-divider"></div>
                    <a href="/about">ℹ️ 회사소개</a>
                </div>
            </div>
        </div>
        <script>
            function openMobileNav() {
                document.getElementById('mobileNav').classList.add('open');
                document.body.style.overflow = 'hidden';
            }
            function closeMobileNav() {
                document.getElementById('mobileNav').classList.remove('open');
                document.body.style.overflow = '';
            }
            function closeMobileNavOutside(e) {
                if (e.target === document.getElementById('mobileNav')) closeMobileNav();
            }
        </script>
        <script src="/static/js/avatar-sync.js"></script>
        <script src="/static/js/avatar-sync.js"></script>
    </body>
</html>

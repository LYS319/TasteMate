<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>테이스트메이트 - 1인당 계산기</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
            rel="stylesheet"
        />

        <style>
            :root {
                --primary-color: #dc2626;
                --primary-hover: #b91c1c;
                --bg-gradient: linear-gradient(135deg, #fdfdfd 0%, #f1f1f1 100%);
                --glass-bg: rgba(255, 255, 255, 0.85);
            }

            body {
                margin: 0;
                font-family: 'Noto Sans KR', sans-serif;
                background: var(--bg-gradient);
                color: #333;
                min-height: 100vh;
            }

            /* ===== Header (공통 스타일) ===== */
            .header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 16px 32px;
                background: var(--glass-bg);
                box-shadow: 0 2px 16px rgba(220, 38, 38, 0.1);
                backdrop-filter: blur(12px);
                position: sticky;
                top: 0;
                z-index: 2000;
                box-sizing: border-box;
                width: 100%;
            }
            .header-left {
                display: flex;
                align-items: center;
                gap: 24px;
            }
            .header-logo {
                font-size: 1.5rem;
                font-weight: 900;
                color: var(--primary-color);
                text-decoration: none;
            }
            .menu-bar {
                display: flex;
                gap: 18px;
                margin-left: 24px;
            }
            .menu-item {
                font-size: 1.1rem;
                font-weight: 700;
                color: var(--primary-color);
                text-decoration: none;
                padding: 8px 18px;
                border-radius: 8px;
                cursor: pointer;
            }
            .menu-item:hover { background: #fff5f5; }

            .game-dropdown { position: relative; }
            .dropdown-content {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                background: #fff;
                min-width: 140px;
                box-shadow: 0 4px 16px rgba(220, 38, 38, 0.13);
                border-radius: 12px;
                padding: 12px 0;
                flex-direction: column;
                z-index: 3000;
            }
            .game-dropdown:hover .dropdown-content { display: flex; }
            .dropdown-content a {
                color: var(--primary-color);
                padding: 10px 24px;
                text-decoration: none;
                font-weight: 600;
            }
            .dropdown-content a:hover { background: #ffe5e5; }

            .login-btn {
                padding: 8px 16px;
                background: var(--primary-color);
                color: #fff;
                border: none;
                border-radius: 6px;
                font-weight: bold;
                cursor: pointer;
            }

            /* ===== Layout & Containers ===== */
            .game-main { padding: 60px 10px; }
            .main-layout-container {
                display: flex;
                justify-content: center;
                align-items: flex-start;
                max-width: 1200px;
                margin: 0 auto;
            }

            .calc-container {
                flex: 1;
                max-width: 500px;
                text-align: center;
                background: white;
                padding: 40px;
                border-radius: 32px;
                border: 2px solid var(--primary-color);
                box-shadow: 0 16px 64px rgba(220, 38, 38, 0.15);
            }

            /* ===== Setup Box (계산기 폼) ===== */
            .setup-title {
                font-weight: 900;
                font-size: 2rem;
                color: var(--primary-color);
                margin-top: 0;
                margin-bottom: 10px;
            }
            .setup-desc {
                color: #666;
                margin-bottom: 25px;
                font-size: 1rem;
            }

            .form-group {
                text-align: left;
                margin-bottom: 20px;
            }
            .form-label {
                font-weight: 800;
                color: #444;
                margin-bottom: 8px;
                display: block;
                padding-left: 5px;
            }

            input {
                padding: 14px;
                border-radius: 12px;
                border: 1px solid #ddd;
                width: 100%;
                box-sizing: border-box;
                text-align: center;
                font-family: inherit;
                font-size: 1.1rem;
            }
            input:focus {
                border-color: var(--primary-color);
                outline: none;
                box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.05);
            }

            .action-btn {
                background: var(--primary-color);
                color: white;
                border: none;
                padding: 15px 40px;
                border-radius: 12px;
                font-size: 1.1rem;
                font-weight: 900;
                cursor: pointer;
                transition: 0.2s;
                width: 100%;
                margin-top: 10px;
            }
            .action-btn:hover {
                transform: scale(1.02);
                background: var(--primary-hover);
            }

            /* ===== Result View ===== */
            .result-banner {
                background: #fff5f5;
                color: var(--primary-color);
                padding: 20px;
                border-radius: 15px;
                font-size: 1.2rem;
                font-weight: 900;
                margin-top: 25px;
                display: none;
                flex-direction: column;
                gap: 8px;
                border: 1px solid #ffebeb;
                animation: fadeIn 0.4s ease;
            }
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
        </style>
    </head>

    <body>
        <header class="header">
            <div class="header-left">
                <a href="/main" class="header-logo">TasteMate</a>
                <nav class="menu-bar">
                    <a class="menu-item" href="/aichat">AI추천</a>
                    <a class="menu-item" href="/community">커뮤니티</a>
                    <div class="menu-item game-dropdown">
                        <span>게임 ▾</span>
                        <div class="dropdown-content">
                            <a href="/game/pinball">핀볼</a>
                            <a href="/game/ladder">사다리타기</a>
                            <a href="/game/random_amount">룰렛 게임</a>
                            <a href="/game/worldcup">음식 월드컵</a>
                            <a href="/game/calculator">계산기</a>
                        </div>
                    </div>
                </nav>
            </div>
            <button class="login-btn">로그인</button>
        </header>

        <main class="game-main">
            <div class="main-layout-container">
                <div class="calc-container">
                    <h2 class="setup-title">🧮 1인당 계산기</h2>
                    <p class="setup-desc">정확하고 공평한 정산을 도와드립니다.</p>
                    
                    <form onsubmit="event.preventDefault(); calculateAmount();">
                        <div class="form-group">
                            <label class="form-label">👥 인원수</label>
                            <input id="calcPeople" type="number" min="1" placeholder="몇 명인가요?" />
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">💰 총 금액</label>
                            <input id="calcAmount" type="text" placeholder="금액을 입력하세요" />
                        </div>
                        
                        <button class="action-btn" type="submit">정산하기</button>
                    </form>

                    <div id="calcResult" class="result-banner"></div>
                    
                    <button class="action-btn" style="background: #666; font-size: 0.9rem; margin-top: 20px;" onclick="location.reload()">초기화</button>
                </div>
            </div>
        </main>

        <script>
            // 세 자릿수 콤마 로직
            const calcAmountInput = document.getElementById('calcAmount');
            calcAmountInput.addEventListener('input', function (e) {
                let value = calcAmountInput.value.replace(/[^0-9]/g, '');
                if (value) {
                    calcAmountInput.value = Number(value).toLocaleString();
                } else {
                    calcAmountInput.value = '';
                }
            });

            // 계산 로직
            function calculateAmount() {
                const people = parseInt(document.getElementById('calcPeople').value);
                const amountRaw = document.getElementById('calcAmount').value.replace(/,/g, '');
                const amount = parseInt(amountRaw);
                const resultDiv = document.getElementById('calcResult');

                if (!people || !amount || people < 1 || amount < 0) {
                    resultDiv.style.display = 'flex';
                    resultDiv.innerHTML = '❗ 입력값이 올바르지 않습니다.';
                    return;
                }

                // 100원 단위 절사 계산
                const perPerson = Math.floor(amount / people / 100) * 100;
                const remain = amount - (perPerson * people);

                resultDiv.style.display = 'flex';
                resultDiv.innerHTML = `
                    <div style="font-size: 1.4rem;">💸 1인당 <b>${perPerson.toLocaleString()}원</b></div>
                    <div style="font-size: 0.95rem; color: #666; margin-top: 5px;">🪙 남는 금액 <b>${remain.toLocaleString()}원</b></div>
                `;
            }

            // 로그인 정보 연동 (있을 경우만 작동)
            document.addEventListener('DOMContentLoaded', () => {
                const nickname = localStorage.getItem('nickname');
                if (nickname) {
                    const loginBtn = document.querySelector('.login-btn');
                    if (loginBtn) loginBtn.innerText = `👤 ${nickname}님`;
                }
            });
        </script>
    </body>
</html>

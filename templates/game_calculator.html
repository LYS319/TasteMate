<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>테이스트메이트 - 1인당 계산기</title>
        <style>
            /* --- TasteMate 헤더 및 공통 스타일 이식 --- */
            body {
                margin: 0;
                font-family: 'Noto Sans KR', sans-serif;
                background: linear-gradient(135deg, #fff5f5 60%, #ffe5e5 100%);
                display: flex;
                flex-direction: column;
                min-height: 100vh;
            }
            .header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 16px 32px;
                background: rgba(255, 255, 255, 0.85);
                box-shadow: 0 2px 16px rgba(220, 38, 38, 0.1);
                backdrop-filter: blur(12px);
                position: sticky;
                top: 0;
                z-index: 2000;
                width: 100%;
                box-sizing: border-box;
            }
            .header-left {
                display: flex;
                align-items: center;
                gap: 24px;
            }
            .header-logo {
                display: flex;
                align-items: center;
                gap: 18px;
                font-size: 1.5rem;
                font-weight: bold;
                color: #dc2626;
                text-decoration: none;
            }
            .menu-bar {
                display: flex;
                gap: 18px;
                align-items: center;
                margin-left: 24px;
            }
            .menu-item {
                font-size: 1.15rem;
                font-weight: 700;
                color: #dc2626;
                text-decoration: none;
                padding: 8px 18px;
                border-radius: 8px;
                background: none;
                cursor: pointer;
                transition: background 0.18s;
            }
            .menu-item:hover {
                background: #fff5f5;
            }
            .game-dropdown {
                position: relative;
            }
            .game-dropdown span {
                cursor: pointer;
            }
            .dropdown-content {
                display: none;
                position: absolute;
                top: 36px;
                left: 0;
                background: #fff;
                min-width: 140px;
                box-shadow: 0 4px 16px rgba(220, 38, 38, 0.13);
                border-radius: 12px;
                padding: 12px 0;
                z-index: 1000;
                flex-direction: column;
            }
            .game-dropdown:hover .dropdown-content {
                display: flex;
            }
            .dropdown-content a {
                color: #dc2626;
                padding: 10px 24px;
                text-decoration: none;
                font-size: 1.08rem;
                font-weight: 600;
                border-radius: 8px;
                transition: background 0.18s;
            }
            .dropdown-content a:hover {
                background: #ffe5e5;
            }
            .header-right {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .login-btn {
                padding: 8px 16px;
                color: #fff;
                border: none;
                border-radius: 6px;
                font-size: 0.95rem;
                font-weight: bold;
                cursor: pointer;
                transition: background 0.2s;
                background: #dc2626;
            }
            .current-location {
                font-size: 0.95rem;
                color: #dc2626;
                background: #fff5f5;
                border: 1px solid #ffe5e5;
                border-radius: 6px;
                padding: 8px 14px;
                font-weight: 700;
                cursor: pointer;
                transition: background 0.2s;
            }

            /* --- 계산기 컨텐츠 디자인 --- */
            .main-content {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 40px 20px;
            }
            .calc-container {
                background: #fff;
                border-radius: 24px;
                box-shadow: 0 8px 32px rgba(220, 38, 38, 0.13);
                padding: 40px 36px 32px 36px;
                min-width: 340px;
                max-width: 400px;
                text-align: center;
                border: 2px solid #dc2626;
            }
            .calc-title {
                color: #dc2626;
                margin-bottom: 22px;
                font-size: 2rem;
                font-weight: 900;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
            }
            .calc-form {
                display: flex;
                flex-direction: column;
                gap: 18px;
                margin-bottom: 18px;
            }
            .calc-label {
                font-size: 1.08rem;
                font-weight: 700;
                color: #b91c1c;
                margin-bottom: 6px;
                text-align: left;
            }
            .calc-input {
                padding: 10px 14px;
                border-radius: 10px;
                border: 1.5px solid #dc2626;
                font-size: 1.08rem;
                width: 100%;
                box-sizing: border-box;
                outline: none;
            }
            .calc-btn {
                background: #dc2626;
                color: #fff;
                border: none;
                border-radius: 10px;
                padding: 12px 0;
                font-size: 1.15rem;
                font-weight: 900;
                cursor: pointer;
                margin-top: 8px;
                transition: 0.2s;
            }
            .calc-btn:hover { background: #b91c1c; }
            .calc-result {
                margin-top: 24px;
                color: #dc2626;
                font-size: 1.15rem;
                font-weight: 700;
                background: #fff5f5;
                border-radius: 12px;
                padding: 18px;
                display: none;
                flex-direction: column;
                gap: 8px;
            }
        </style>
    </head>
    <body>
        <header class="header">
            <div class="header-left">
                <a href="/main" class="header-logo">TasteMate</a>
                <nav class="menu-bar">
                    <a class="menu-item" href="/aichat">AI추천</a>
                    <a class="menu-item" href="/community">커뮤니티</a>
                    <div class="menu-item game-dropdown">
                        <span>게임 ▾</span>
                        <div class="dropdown-content">
                            <a href="/game/pinball">핀볼</a>
                            <a href="/game/ladder">사다리타기</a>
                            <a href="/game/random_amount">룰렛 게임</a>
                            <a href="/game/worldcup">음식 월드컵</a>
                            <a href="/game/calculator">계산기</a>
                        </div>
                    </div>
                </nav>
            </div>

            <div class="header-right" id="headerRightArea">
                <button class="login-btn" onclick="location.href = '/login'">로그인</button>
                <button class="login-btn" style="background: #fff; color: #dc2626; border: 1px solid #dc2626" onclick="location.href = '/signup'">회원가입</button>
            </div>
        </header>

        <main class="main-content">
            <div class="calc-container">
                <div class="calc-title"><span>🧮</span> 1인당 계산기</div>
                <form class="calc-form" onsubmit="event.preventDefault(); calculateAmount();">
                    <div>
                        <div class="calc-label">👥 명수</div>
                        <input id="calcPeople" class="calc-input" type="number" min="1" placeholder="명수 입력" />
                    </div>
                    <div>
                        <div class="calc-label">💰 총 금액</div>
                        <input id="calcAmount" class="calc-input" type="text" placeholder="총 금액 입력" />
                    </div>
                    <button class="calc-btn" type="submit">계산하기</button>
                </form>
                <div id="calcResult" class="calc-result"></div>
            </div>
        </main>

        <script>
            // --- 상단바 로그인 상태 제어 스크립트 (기억하신 내용 이식) ---
            document.addEventListener('DOMContentLoaded', () => {
                const nickname = localStorage.getItem('nickname');
                const isAdmin = localStorage.getItem('is_admin');
                const headerRightArea = document.getElementById('headerRightArea');

                if (nickname && headerRightArea) {
                    let adminButton = '';
                    if (isAdmin === '1') {
                        adminButton = `<button class="login-btn" onclick="location.href='/admin'" style="background: #2c3e50;">⚙️ 관리자</button>`;
                    }
                    headerRightArea.innerHTML = `
                        <span style="font-weight: 700; color: #dc2626; font-size: 1.05rem; margin-right: 5px;">👤 ${nickname}님</span>
                        ${adminButton}
                        <button class="login-btn" onclick="location.href='/mypage'" style="background: #f39c12;">정보</button>
                        <button class="login-btn" onclick="logout()" style="background: #666;">로그아웃</button>
                    `;
                }
            });

            function logout() {
                localStorage.clear();
                alert('로그아웃 되었습니다.');
                window.location.href = '/main';
            }

            // --- 계산기 기능 로직 (기존 유지) ---
            const calcAmountInput = document.getElementById('calcAmount');
            calcAmountInput.addEventListener('input', function (e) {
                let value = calcAmountInput.value.replace(/[^0-9]/g, '');
                if (value) { calcAmountInput.value = Number(value).toLocaleString(); } 
                else { calcAmountInput.value = ''; }
            });

            function calculateAmount() {
                const people = parseInt(document.getElementById('calcPeople').value);
                const amountRaw = document.getElementById('calcAmount').value.replace(/,/g, '');
                const amount = parseInt(amountRaw);
                const resultDiv = document.getElementById('calcResult');
                
                if (!people || !amount || people < 1 || amount < 0) {
                    resultDiv.style.display = 'flex';
                    resultDiv.innerHTML = '❗ 입력값이 올바르지 않습니다.';
                    return;
                }
                
                const perPerson = Math.floor(amount / people / 100) * 100;
                const remain = amount - perPerson * people;
                
                resultDiv.style.display = 'flex';
                resultDiv.innerHTML = `
                    <div>💸 1인당 <b>${perPerson.toLocaleString()}원</b></div>
                    <div style="font-size: 0.95rem; color: #666;">🪙 남는 금액 <b>${remain.toLocaleString()}원</b></div>
                `;
            }
        </script>
    </body>
</html>

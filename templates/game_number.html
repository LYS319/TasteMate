<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <title>번호뽑기</title>
        <style>
            body {
                font-family: 'Noto Sans KR', sans-serif;
                background: #fff;
                margin: 0;
            }
            .game-container {
                max-width: 420px;
                margin: 60px auto;
                background: #fff8f8;
                border-radius: 16px;
                box-shadow: 0 2px 16px rgba(220, 38, 38, 0.08);
                padding: 32px 24px;
            }
            .game-title {
                font-size: 2rem;
                font-weight: 900;
                color: #dc2626;
                margin-bottom: 24px;
            }
            .input-label {
                font-size: 1.1rem;
                color: #b91c1c;
                font-weight: 700;
                margin-bottom: 8px;
            }
            .input-box {
                font-size: 1.1rem;
                padding: 10px 14px;
                border: 1.5px solid #ffe5e5;
                border-radius: 6px;
                background: #fff;
                width: 100%;
                margin-bottom: 18px;
            }
            .submit-btn {
                padding: 10px 32px;
                background: #dc2626;
                color: #fff;
                border: none;
                border-radius: 6px;
                font-size: 1.1rem;
                font-weight: 700;
                cursor: pointer;
                transition: background 0.2s;
            }
            .submit-btn:hover {
                background: #b91c1c;
            }
            .result-area {
                margin-top: 24px;
                font-size: 1.3rem;
                color: #222;
                font-weight: 700;
            }
        </style>
    </head>
    <body>
        <div class="game-container">
            <div class="game-title">번호뽑기</div>
            <form id="numberForm">
                <div class="input-label">명수(2~20명):</div>
                <input type="number" min="2" max="20" id="numPeople" class="input-box" required />
                <button type="submit" class="submit-btn">랜덤 번호 생성</button>
            </form>
            <div class="result-area" id="resultArea"></div>
        </div>
        <script>
            document.getElementById('numberForm').onsubmit = function (e) {
                e.preventDefault();
                const n = parseInt(document.getElementById('numPeople').value);
                if (isNaN(n) || n < 2 || n > 20) {
                    alert('2~20명 사이로 입력하세요!');
                    return;
                }
                let arr = Array.from({ length: n }, (_, i) => i + 1);
                arr = arr.sort(() => Math.random() - 0.5);
                document.getElementById('resultArea').innerText = '랜덤 번호: ' + arr.join(', ');
            };
        </script>
    </body>
</html>

<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <title>TasteMate AI</title>

        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap"
            rel="stylesheet"
        />

        <style>
            body {
                font-family: 'Noto Sans KR', sans-serif;
                background: #fafafa;
                padding-bottom: 100px;
            }

            .glass-header {
                background: rgba(255, 255, 255, 0.9);
                backdrop-filter: blur(12px);
                border-bottom: 1px solid #eee;
            }

            #chat-container::-webkit-scrollbar {
                width: 4px;
            }
            #chat-container::-webkit-scrollbar-thumb {
                background: #fecaca;
                border-radius: 10px;
            }

            .bottom-nav {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: #fff;
                display: flex;
                justify-content: space-around;
                padding: 12px 0 25px;
                border-top: 1px solid #eee;
            }

            .nav-item {
                text-align: center;
                font-size: 11px;
                font-weight: 800;
                color: #cbd5e0;
            }

            .nav-item.active {
                color: #e53e3e;
            }

            .bottom-nav svg {
                width: 22px;
                height: 22px;
                margin: auto;
            }
        </style>
    </head>

    <body class="max-w-2xl mx-auto bg-white shadow-xl">
        <!-- 🔥 HEADER (MAIN과 동일 구조) -->
        <header class="glass-header px-5 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3 relative">
                <button class="text-xl" onclick="toggleMenu()">☰</button>

                <span onclick="location.href = '/main'" class="text-red-600 font-black text-xl cursor-pointer">
                    TasteMate
                </span>

                <!-- 🔥 추가되는 메뉴 (기존 디자인 유지) -->
                <nav
                    id="mainNavMenu"
                    style="
                        display: none;
                        position: absolute;
                        top: 55px;
                        left: 0;
                        background: white;
                        padding: 20px 25px;
                        border-radius: 20px;
                        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
                    "
                >
                    <button onclick="location.href = '/main'" style="display: block; margin: 8px 0; font-weight: 800">
                        🏠 홈
                    </button>

                    <button onclick="location.href = '/aichat'" style="display: block; margin: 8px 0; font-weight: 800">
                        🤖 AI추천
                    </button>

                    <button
                        onclick="location.href = '/community'"
                        style="display: block; margin: 8px 0; font-weight: 800"
                    >
                        🧑‍🤝‍🧑 커뮤니티
                    </button>
                </nav>
            </div>
        </header>

        <!-- 🔥 카테고리 버튼 -->
        <div class="bg-gray-50 pt-4 px-4 overflow-x-auto flex gap-2 pb-2">
            <button
                onclick="showTopPlaces('혼밥')"
                class="whitespace-nowrap px-4 py-2 bg-white border border-red-500 text-red-600 rounded-full text-xs font-bold hover:bg-red-600 hover:text-white transition shadow-sm"
            >
                🍚 혼밥
            </button>
            <button
                onclick="showTopPlaces('데이트')"
                class="whitespace-nowrap px-4 py-2 bg-white border border-red-500 text-red-600 rounded-full text-xs font-bold hover:bg-red-600 hover:text-white transition shadow-sm"
            >
                👩‍❤️‍👨 데이트
            </button>
            <button
                onclick="showTopPlaces('술집')"
                class="whitespace-nowrap px-4 py-2 bg-white border border-red-500 text-red-600 rounded-full text-xs font-bold hover:bg-red-600 hover:text-white transition shadow-sm"
            >
                🍻 술집
            </button>
        </div>

        <!-- 🔥 채팅 영역 -->
        <main id="chat-container" class="h-[65vh] overflow-y-auto p-4 space-y-4 bg-gray-50">
            <div class="flex flex-col items-start">
                <div class="max-w-[85%] p-4 rounded-2xl shadow-sm text-sm bg-white border border-red-100">
                    안녕하세요 <b>TasteMate AI</b>입니다 🍷<br />
                    오늘의 상황에 맞는 최적의 주류·안주 페어링을 추천해드릴게요.
                </div>
            </div>
        </main>

        <div id="loading-indicator" class="hidden px-6 py-2 bg-gray-50">
            <div class="flex items-center gap-2 text-red-400 font-medium text-xs animate-pulse">
                <div class="w-1.5 h-1.5 bg-red-400 rounded-full animate-bounce"></div>
                <span>분석 중...</span>
            </div>
        </div>

        <!-- 🔥 입력창 -->
        <footer class="p-4 bg-white border-t border-gray-100">
            <form
                id="chat-form"
                class="flex gap-2 bg-gray-100 p-2 rounded-2xl border focus-within:border-red-400 transition shadow-inner"
            >
                <input
                    id="chat-input"
                    type="text"
                    placeholder="오늘 마실 술 또는 메뉴를 입력해 보세요..."
                    required
                    class="flex-1 bg-transparent border-none focus:outline-none px-4 py-3 text-sm"
                />
                <button
                    type="submit"
                    id="submit-btn"
                    class="bg-red-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-red-700 transition active:scale-95 shadow-lg"
                >
                    전송
                </button>
            </form>
        </footer>

        <!-- 🔥 하단 네비 (MAIN과 동일 디자인) -->
        <div class="bottom-nav">
            <div onclick="location.href = '/main'" class="nav-item">
                <svg fill="currentColor" viewBox="0 0 20 20">
                    <path
                        d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"
                    />
                </svg>
                홈
            </div>

            <div onclick="location.href = '/aichat'" class="nav-item active">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path
                        stroke-width="2"
                        d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"
                    />
                </svg>
                AI 추천
            </div>

            <div onclick="location.href = '/community'" class="nav-item">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path
                        stroke-width="2"
                        d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"
                    />
                </svg>
                커뮤니티
            </div>

            <div onclick="location.href = '/mypage'" class="nav-item">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
                내정보
            </div>
        </div>

        <script>
            /* ===== 기존 JS 그대로 유지 ===== */

            const chatContainer = document.getElementById('chat-container');
            const chatForm = document.getElementById('chat-form');
            const chatInput = document.getElementById('chat-input');
            const loadingIndicator = document.getElementById('loading-indicator');
            const submitBtn = document.getElementById('submit-btn');

            function scrollToBottom() {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }

            function addMessage(role, text) {
                const isAI = role === 'ai';
                const msgDiv = document.createElement('div');
                msgDiv.className = `flex flex-col ${isAI ? 'items-start' : 'items-end'} mb-4`;
                msgDiv.innerHTML = `
        <div class="max-w-[85%] p-4 rounded-2xl shadow-sm text-sm ${isAI ? 'bg-white border border-red-100 text-slate-800' : 'bg-red-600 text-white'}">
            <div class="whitespace-pre-wrap">${text}</div>
        </div>
    `;
                chatContainer.appendChild(msgDiv);
                scrollToBottom();
            }

            chatForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const message = chatInput.value.trim();
                if (!message) return;

                addMessage('user', message);
                chatInput.value = '';
                loadingIndicator.classList.remove('hidden');
                submitBtn.disabled = true;

                try {
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message }),
                    });
                    const data = await response.json();
                    addMessage('ai', data.reply);
                } catch {
                    addMessage('ai', '서버와 연결할 수 없습니다.');
                } finally {
                    loadingIndicator.classList.add('hidden');
                    submitBtn.disabled = false;
                }
            });

            /* 위치 기반 기능 그대로 유지 */
            let userLat = null;
            let userLon = null;

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    userLat = position.coords.latitude;
                    userLon = position.coords.longitude;
                });
            }

            async function showTopPlaces(category) {
                if (!userLat || !userLon) {
                    addMessage('ai', '위치 정보를 불러오지 못했습니다.');
                    return;
                }

                loadingIndicator.classList.remove('hidden');

                try {
                    const response = await fetch('/api/top-places', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            category,
                            lat: userLat,
                            lon: userLon,
                        }),
                    });

                    const data = await response.json();

                    addMessage('ai', `📍 현재 위치 기준 ${category} 인기 장소 TOP5`);

                    data.places.forEach((place) => {
                        const card = document.createElement('div');
                        card.className = 'flex flex-col items-start mb-4';
                        card.innerHTML = `
                <div class="max-w-[85%] p-4 rounded-2xl shadow-sm bg-white border border-red-100">
                    <div class="font-bold text-red-600 mb-1">🍽 ${place.name}</div>
                    <div class="text-xs text-slate-500 mb-2">📍 ${place.address}</div>
                    <a href="${place.map_url}" target="_blank"
                       class="text-xs bg-red-600 text-white px-3 py-1 rounded-full hover:bg-red-700">
                       지도 보기
                    </a>
                </div>
            `;
                        chatContainer.appendChild(card);
                    });
                } catch {
                    addMessage('ai', '추천 정보를 불러오지 못했습니다.');
                } finally {
                    loadingIndicator.classList.add('hidden');
                }
            }

            function toggleMenu() {
                const menu = document.getElementById('mainNavMenu');
                menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
            }
        </script>
    </body>
</html>

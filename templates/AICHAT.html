<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>테이스트메이트 AI CHATBOT</title>
        <style>
            body {
                margin: 0;
                font-family: 'Noto Sans KR', sans-serif;
                background: #fff5f5;
                overflow: hidden;
            }
            .menu-toggle-btn {
                background: none;
                border: none;
                font-size: 2.1rem;
                cursor: pointer;
                border-radius: 8px;
                padding: 4px 12px;
                transition: background 0.18s;
            }
            .menu-toggle-btn:hover {
                background: #ffe5e5;
            }
            #mainNavMenu {
                min-width: 140px;
                position: absolute;
                top: 60px;
                left: 32px;
                background: #fff;
                box-shadow: 0 4px 16px rgba(220, 38, 38, 0.13);
                border-radius: 12px;
                padding: 18px 24px 14px 24px;
                z-index: 1000;
                display: none;
            }
            .nav-emoji-btn {
                background: none;
                border: none;
                font-size: 1.3rem;
                margin: 0 2px;
                cursor: pointer;
                border-radius: 8px;
                padding: 4px 10px;
                transition: background 0.18s;
                font-family: 'Noto Sans KR', sans-serif;
            }
            .nav-emoji-btn:hover {
                background: #ffe5e5;
            }

            #ai-chat-fullscreen-container {
                display: flex;
                flex-direction: column;
                height: 100vh;
            }
            #ai-chat-fullscreen-header {
                position: relative;
                background: #fff5f5;
                padding-top: 24px;
                padding-bottom: 24px;
                text-align: center;
                box-shadow: 0 2px 10px rgba(220, 38, 38, 0.05);
                z-index: 10;
            }
            #ai-chat-fullscreen-title {
                font-size: 2.2rem;
                font-weight: 900;
                color: #dc2626;
                letter-spacing: 1px;
                margin: 0;
            }

            #ai-chat-fullscreen-box {
                flex: 1;
                overflow-y: auto;
                padding: 30px 6vw;
                display: flex;
                flex-direction: column;
                gap: 16px;
                font-size: 1.15rem;
            }
            .chat-msg {
                max-width: 75%;
                padding: 16px 20px;
                border-radius: 14px;
                line-height: 1.5;
                font-weight: 600;
                word-break: break-word;
            }
            .chat-ai {
                background: #fff;
                color: #222;
                border: 1.5px solid #ffe5e5;
                align-self: flex-start;
                border-top-left-radius: 4px;
                box-shadow: 0 2px 6px rgba(220, 38, 38, 0.04);
            }
            .chat-user {
                background: #dc2626;
                color: #fff;
                align-self: flex-end;
                border-top-right-radius: 4px;
                box-shadow: 0 2px 6px rgba(220, 38, 38, 0.1);
            }

            #ai-chat-fullscreen-form {
                display: flex;
                gap: 12px;
                padding: 20px 6vw 30px 6vw;
                background: #fff5f5;
                border-top: 1px solid #ffe5e5;
            }
            #ai-chat-fullscreen-input {
                flex: 1;
                padding: 16px 20px;
                border: 2px solid #dc2626;
                border-radius: 12px;
                font-size: 1.2rem;
                outline: none;
                font-family: 'Noto Sans KR', sans-serif;
            }
            #ai-chat-fullscreen-form button {
                padding: 0 30px;
                background: #dc2626;
                color: #fff;
                border: none;
                border-radius: 12px;
                font-size: 1.2rem;
                font-weight: 700;
                cursor: pointer;
                transition: background 0.2s;
                white-space: nowrap;
            }
            #ai-chat-fullscreen-form button:hover {
                background: #b91c1c;
            }
        </style>
    </head>
    <body>
        <div id="ai-chat-fullscreen-container">
            <div id="ai-chat-fullscreen-header">
                <div style="position: absolute; top: 18px; left: 20px">
                    <button class="menu-toggle-btn" onclick="toggleMenu()">☰</button>
                    <nav id="mainNavMenu">
                        <button class="nav-emoji-btn" onclick="location.href = '/main'" title="홈">🏠 홈</button><br />
                        <button class="nav-emoji-btn" onclick="location.href = '/community'" title="커뮤니티">🧑‍🤝‍🧑 커뮤니티</button><br />
                        <button class="nav-emoji-btn" onclick="openCalculator()" title="계산기">🧮 계산기</button>
                        <!-- 계산기 모달 -->
                        <div id="calculatorModal" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.18); z-index:2000; justify-content:center; align-items:center;">
                            <div style="background:#fff; border-radius:16px; box-shadow:0 4px 16px rgba(220,38,38,0.13); padding:32px 28px; min-width:320px; text-align:center; position:relative;">
                                <button onclick="closeCalculator()" style="position:absolute; top:12px; right:12px; background:none; border:none; font-size:1.4rem; cursor:pointer;">✖</button>
                                <h2 style="color:#dc2626; margin-bottom:18px;">1인당 계산기</h2>
                                <div style="margin-bottom:16px;">
                                    <input id="calcPeople" type="number" min="1" placeholder="명수 입력" style="padding:8px 12px; border-radius:8px; border:1px solid #dc2626; font-size:1rem; width:120px; margin-right:8px;" />
                                    <input id="calcAmount" type="number" min="0" placeholder="총 금액 입력" style="padding:8px 12px; border-radius:8px; border:1px solid #dc2626; font-size:1rem; width:120px;" />
                                </div>
                                <button onclick="calculateAmount()" style="background:#dc2626; color:#fff; border:none; border-radius:8px; padding:8px 24px; font-size:1rem; font-weight:700; cursor:pointer;">계산하기</button>
                                <div id="calcResult" style="margin-top:18px; color:#222; font-size:1.1rem;"></div>
                            </div>
                        </div>
                </div>
                <h1 id="ai-chat-fullscreen-title">🤖 AI CHATBOT</h1>
            </div>

            <div id="ai-chat-fullscreen-box">
                <div class="chat-msg chat-ai" id="ai-welcome-msg">
                    안녕하세요! 맛집 추천 AI 챗봇입니다. 무엇을 도와드릴까요?
                </div>
            </div>

            <form id="ai-chat-fullscreen-form" autocomplete="off">
                <input
                    id="ai-chat-fullscreen-input"
                    type="text"
                    placeholder="AI에게 질문해보세요! (예: 강남역 혼밥 맛집 추천해줘)"
                    required
                />
                <button type="submit">질문하기</button>
            </form>
        </div>

        <script>
                    // 계산기 모달 열기/닫기
                    function openCalculator() {
                        document.getElementById('calculatorModal').style.display = 'flex';
                    }
                    function closeCalculator() {
                        document.getElementById('calculatorModal').style.display = 'none';
                        document.getElementById('calcResult').innerText = '';
                        document.getElementById('calcPeople').value = '';
                        document.getElementById('calcAmount').value = '';
                    }
                    function calculateAmount() {
                        const people = parseInt(document.getElementById('calcPeople').value);
                        const amount = parseInt(document.getElementById('calcAmount').value);
                        if (!people || !amount || people < 1 || amount < 0) {
                            document.getElementById('calcResult').innerText = '명수와 금액을 올바르게 입력하세요.';
                            return;
                        }
                        const perPerson = Math.floor(amount / people);
                        const remain = amount % people;
                        document.getElementById('calcResult').innerText = `1인당 ${perPerson.toLocaleString()}원, 남는 금액 ${remain.toLocaleString()}원`;
                    }
            // 햄버거 메뉴 토글 기능
            function toggleMenu() {
                const menu = document.getElementById('mainNavMenu');
                menu.style.display = menu.style.display === 'none' || menu.style.display === '' ? 'block' : 'none';
            }

            document.addEventListener('DOMContentLoaded', function () {
                // 🚨 1. 로그인 상태 확인 (로그인 안되어있으면 로그인 창으로 튕겨냄)
                const nickname = localStorage.getItem('nickname');
                if (!nickname) {
                    alert('AI 추천 기능은 로그인이 필요합니다!');
                    sessionStorage.setItem('return_url', '/aichat');
                    window.location.href = '/login';
                    return;
                }

                // 🚨 2. 유저 이름을 부르며 환영 메시지 출력
                document.getElementById('ai-welcome-msg').innerText =
                    `안녕하세요 ${nickname}님! 현재 위치(서울)를 기반으로 맛집을 추천해 드릴까요?`;

                // 3. 채팅 UI 작동 로직
                const chatBox = document.getElementById('ai-chat-fullscreen-box');
                const chatForm = document.getElementById('ai-chat-fullscreen-form');
                const chatInput = document.getElementById('ai-chat-fullscreen-input');

                chatForm.addEventListener('submit', function (e) {
                    e.preventDefault();
                    const msg = chatInput.value.trim();

                    if (msg) {
                        // 내가 보낸 메시지 화면에 그리기
                        const userDiv = document.createElement('div');
                        userDiv.className = 'chat-msg chat-user';
                        userDiv.textContent = msg;
                        chatBox.appendChild(userDiv);
                        chatBox.scrollTop = chatBox.scrollHeight; // 스크롤 맨 아래로
                        chatInput.value = ''; // 입력창 비우기

                        // 0.8초 뒤에 AI가 답변하는 척 연출
                        setTimeout(() => {
                            const aiDiv = document.createElement('div');
                            aiDiv.className = 'chat-msg chat-ai';
                            aiDiv.textContent = 'AI 챗봇 엔진과 연결 중입니다! 곧 똑똑한 맛집 추천으로 찾아올게요 🍽️';
                            chatBox.appendChild(aiDiv);
                            chatBox.scrollTop = chatBox.scrollHeight;
                        }, 800);
                    }
                });
            });
        </script>
    </body>
</html>

<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>내 회원정보</title>
    <style>
        body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background: #fff5f5; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 32px; background: rgba(255, 255, 255, 0.85); box-shadow: 0 2px 16px rgba(220, 38, 38, 0.1); }
        .header-logo { font-size: 1.5rem; font-weight: bold; color: #dc2626; text-decoration: none; }
        .container { max-width: 500px; margin: 60px auto; padding: 40px; border-radius: 16px; background: #fff; box-shadow: 0 4px 20px rgba(220, 38, 38, 0.08); }
        .title { font-size: 2rem; font-weight: 900; color: #dc2626; margin-bottom: 30px; text-align: center; }
        .info-box { background: #fff8f8; border: 1.5px solid #ffe5e5; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .info-label { font-weight: bold; color: #b91c1c; font-size: 1.1rem; margin-bottom: 5px; }
        .info-value { font-size: 1.3rem; color: #333; margin-bottom: 20px; }
        
        /* 통계 박스 스타일 (클릭 가능 강조) */
        .stats-box { display: flex; gap: 15px; }
        .stat { 
            flex: 1; 
            text-align: center; 
            background: #fff; 
            border: 1px solid #ffe5e5; 
            border-radius: 10px; 
            padding: 15px; 
            cursor: pointer; 
            transition: all 0.2s; 
            position: relative;
            user-select: none;
        }
        .stat:hover { 
            background: #fff0f0; 
            border-color: #dc2626; 
            transform: translateY(-3px); 
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.15);
        }
        .stat:active { transform: translateY(0); }
        
        .stat-num { 
            font-size: 1.8rem; 
            font-weight: 900; 
            color: #dc2626; 
            text-decoration: underline; 
            text-underline-offset: 4px;
        }
        
        .back-btn { display: block; width: 100%; text-align: center; padding: 15px 0; background: #dc2626; color: #fff; font-weight: bold; font-size: 1.2rem; border: none; border-radius: 8px; margin-top: 30px; cursor: pointer; text-decoration: none; }

        /* 모달 스타일 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: #fefefe; margin: 10% auto; padding: 30px; border-radius: 12px; width: 80%; max-width: 600px; max-height: 70vh; overflow-y: auto; position: relative; animation: slideDown 0.3s; }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close:hover { color: black; }
        
        .post-item { border-bottom: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .post-info { flex: 1; }
        .post-cat { font-size: 0.85rem; color: #dc2626; font-weight: bold; margin-bottom: 4px; }
        .post-title-link { font-size: 1.1rem; font-weight: bold; color: #333; text-decoration: none; display: block; }
        .post-title-link:hover { text-decoration: underline; color: #dc2626; }
        .post-date { font-size: 0.85rem; color: #888; margin-top: 4px; }
        .del-btn { padding: 8px 16px; background: #fff; border: 1px solid #e74c3c; color: #e74c3c; border-radius: 6px; cursor: pointer; font-size: 0.9rem; margin-left: 10px; font-weight: bold; transition: 0.2s; white-space: nowrap;}
        .del-btn:hover { background: #e74c3c; color: #fff; }

        /* 🚨 데이터 없음 메시지 스타일 */
        .empty-msg { text-align: center; color: #999; padding: 50px 0; font-size: 1.1rem; }
        .empty-icon { font-size: 3rem; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <header class="header">
        <a href="/main" class="header-logo">TasteMate</a>
    </header>
    <div class="container">
        <div class="title">👤 내 회원정보</div>
        <div class="info-box">
            <div class="info-label">닉네임</div>
            <div class="info-value" id="my-nickname">로딩중...</div>
            <div class="info-label">이메일 (아이디)</div>
            <div class="info-value" id="my-email">로딩중...</div>
        </div>
        
        <div class="stats-box">
            <div class="stat" onclick="openPostList()" title="작성한 글 보기">
                <div style="font-size:1rem; color:#555; margin-bottom: 8px;">📝 내가 쓴 게시글</div>
                <div class="stat-num" id="my-posts">0</div>
                <div style="font-size:0.85rem; color:#dc2626; margin-top: 8px; font-weight: bold;">(클릭하여 관리 👆)</div>
            </div>
            
            <div class="stat" onclick="openCommentList()" title="작성한 댓글 보기">
                <div style="font-size:1rem; color:#555; margin-bottom: 8px;">💬 내가 쓴 댓글</div>
                <div class="stat-num" id="my-comments">0</div>
                <div style="font-size:0.85rem; color:#dc2626; margin-top: 8px; font-weight: bold;">(클릭하여 관리 👆)</div>
            </div>
        </div>
        <button class="back-btn" onclick="location.href='/main'">메인으로 돌아가기</button>
    </div>

    <div id="listModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modal-title" style="color:#dc2626; margin-top:0; border-bottom: 2px solid #ffe5e5; padding-bottom: 15px;">목록</h2>
            <div id="modal-list-body">
                </div>
        </div>
    </div>

    <script>
        let myPostData = []; 
        let myCommentData = [];

        async function loadMyInfo() {
            const userId = localStorage.getItem('user_id');
            if (!userId) {
                alert("로그인이 만료되었습니다.");
                window.location.href = '/login';
                return;
            }

            try {
                const res = await fetch(`/api/users/${userId}/me`);
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('my-nickname').innerText = data.nickname;
                    document.getElementById('my-email').innerText = data.email;
                    
                    document.getElementById('my-posts').innerText = data.post_count + "개";
                    document.getElementById('my-comments').innerText = data.comment_count + "개";
                    
                    myPostData = data.posts;
                    myCommentData = data.comments;
                }
            } catch (e) {
                console.error(e);
                alert("데이터를 불러올 수 없습니다.");
            }
        }

        // --- 게시글 목록 열기 ---
        function openPostList() {
            const title = document.getElementById('modal-title');
            const listBody = document.getElementById('modal-list-body');
            title.innerText = "📝 내가 쓴 글 목록";
            
            // 🚨 게시글이 0개일 때 안내 문구 출력
            if (myPostData.length === 0) {
                listBody.innerHTML = `
                    <div class="empty-msg">
                        <span class="empty-icon">📭</span>
                        아직 작성한 게시글이 없습니다.
                    </div>`;
            } else {
                listBody.innerHTML = myPostData.map(post => `
                    <div class="post-item">
                        <div class="post-info">
                            <div class="post-cat">[${post.category}]</div>
                            <a href="/post/${post.id}" target="_blank" class="post-title-link">${post.title}</a>
                            <div class="post-date">${post.date}</div>
                        </div>
                        <button class="del-btn" onclick="deleteMyPost(${post.id})">삭제</button>
                    </div>
                `).join('');
            }
            document.getElementById('listModal').style.display = "block";
        }

        // --- 댓글 목록 열기 ---
        function openCommentList() {
            const title = document.getElementById('modal-title');
            const listBody = document.getElementById('modal-list-body');
            title.innerText = "💬 내가 쓴 댓글 목록";
            
            // 🚨 댓글이 0개일 때 안내 문구 출력
            if (myCommentData.length === 0) {
                listBody.innerHTML = `
                    <div class="empty-msg">
                        <span class="empty-icon">💭</span>
                        아직 작성한 댓글이 없습니다.
                    </div>`;
            } else {
                listBody.innerHTML = myCommentData.map(c => `
                    <div class="post-item">
                        <div class="post-info">
                            <div class="post-title-link" style="font-weight:normal;">${c.content}</div>
                            <div class="post-date">
                                <a href="/post/${c.post_id}" target="_blank" style="color:#aaa; text-decoration:none;">게시글 보러가기 🔗</a> | ${c.date}
                            </div>
                        </div>
                        <button class="del-btn" onclick="deleteMyComment(${c.id})">삭제</button>
                    </div>
                `).join('');
            }
            document.getElementById('listModal').style.display = "block";
        }

        function closeModal() {
            document.getElementById('listModal').style.display = "none";
        }
        
        window.onclick = function(event) {
            const modal = document.getElementById('listModal');
            if (event.target == modal) modal.style.display = "none";
        }

        // 게시글 삭제
        async function deleteMyPost(postId) {
            if (!confirm("정말로 이 게시글을 삭제하시겠습니까?")) return;
            const userId = localStorage.getItem('user_id');
            const fd = new FormData(); fd.append('user_id', userId); 

            try {
                const res = await fetch(`/api/posts/${postId}`, { method: 'DELETE', body: fd });
                if (res.ok) {
                    alert("게시글이 삭제되었습니다.");
                    await loadMyInfo(); 
                    // 데이터 갱신 후 목록이 비었는지 즉시 확인하여 화면 업데이트
                    myPostData = myPostData.filter(p => p.id !== postId);
                    openPostList(); 
                } else {
                    alert("삭제 실패");
                }
            } catch (e) { alert("서버 오류"); }
        }

        // 댓글 삭제
        async function deleteMyComment(commentId) {
            if (!confirm("이 댓글을 삭제하시겠습니까?")) return;
            const userId = localStorage.getItem('user_id');
            const fd = new FormData(); fd.append('user_id', userId); 

            try {
                const res = await fetch(`/api/comments/${commentId}`, { method: 'DELETE', body: fd });
                if (res.ok) {
                    alert("댓글이 삭제되었습니다.");
                    await loadMyInfo(); 
                    myCommentData = myCommentData.filter(c => c.id !== commentId);
                    openCommentList(); 
                } else {
                    alert("삭제 실패");
                }
            } catch (e) { alert("서버 오류"); }
        }

        loadMyInfo();
    </script>
</body>
</html>

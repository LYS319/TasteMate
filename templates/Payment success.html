<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결제 완료 — TasteMate</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'맑은 고딕',sans-serif; background:#F0F7FF;
         display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .card { background:#fff; border-radius:24px; padding:48px 40px;
          text-align:center; box-shadow:0 8px 40px rgba(37,99,235,0.12); max-width:420px; width:90%; }
  .icon { font-size:64px; margin-bottom:20px; }
  h1 { font-size:22px; color:#1F2937; margin-bottom:8px; }
  .sub { font-size:14px; color:#6B7280; margin-bottom:28px; line-height:1.6; }
  .plan-badge { display:inline-block; background:#DBEAFE; color:#2563EB;
                font-weight:700; font-size:14px; padding:6px 18px;
                border-radius:50px; margin-bottom:28px; }
  .btn { display:block; background:#2563EB; color:#fff; text-decoration:none;
         padding:14px; border-radius:14px; font-size:15px; font-weight:700;
         margin-bottom:12px; cursor:pointer; border:none; width:100%; }
  .btn-outline { background:#fff; color:#2563EB; border:2px solid #2563EB; }
  #plan-info { font-size:13px; color:#6B7280; margin-bottom:20px; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🎉</div>
  <h1>결제가 완료됐어요!</h1>
  <p class="sub">TasteMate 구독이 시작됐습니다.<br>이제 더 스마트한 추천을 즐겨보세요.</p>
  <div class="plan-badge" id="plan-badge">구독 플랜</div>
  <p id="plan-info">만료일을 불러오는 중...</p>
  <a href="/aichat" class="btn">🍺 AI 챗봇 바로가기</a>
  <a href="/main" class="btn btn-outline">홈으로 돌아가기</a>
</div>

<script>
(async () => {
  const params   = new URLSearchParams(location.search);
  const payKey   = params.get('paymentKey');
  const orderId  = params.get('orderId');
  const amount   = parseInt(params.get('amount'));
  const userId   = parseInt(localStorage.getItem('user_id'));
  const plan     = amount === 2900 ? 'basic' : 'premium';

  try {
    const res = await fetch('/api/payment/confirm', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ payment_key:payKey, order_id:orderId, amount, user_id:userId, plan })
    });
    const data = await res.json();

    document.getElementById('plan-badge').textContent =
      plan === 'basic' ? '💎 베이직 플랜' : '👑 프리미엄 플랜';

    if (data.expires_at) {
      const exp = new Date(data.expires_at);
      document.getElementById('plan-info').textContent =
        `다음 결제일: ${exp.toLocaleDateString('ko-KR')}`;
    }
    localStorage.setItem('subscription_plan', plan);
  } catch(e) {
    document.getElementById('plan-info').textContent = '구독 정보 불러오기 실패';
  }
})();
</script>
</body>
</html>

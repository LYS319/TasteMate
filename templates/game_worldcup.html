<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>테이스트메이트 - 메뉴 월드컵</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
            rel="stylesheet"
        />
        <style>
            /* --- TasteMate 브랜드 스타일 변수 --- */
            :root {
                --primary-color: #dc2626;
                --primary-hover: #b91c1c;
                --bg-gradient: linear-gradient(135deg, #fff5f5 0%, #f0f2f5 100%);
                --glass-bg: rgba(255, 255, 255, 0.85);
            }

            body {
                margin: 0;
                font-family: 'Noto Sans KR', sans-serif;
                background: var(--bg-gradient);
                color: #333;
                min-height: 100vh;
                overflow-x: hidden;
            }

            /* --- 상단바 (예시 코드와 1:1 일치) --- */
            .header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 16px 32px;
                background: var(--glass-bg);
                box-shadow: 0 2px 16px rgba(220, 38, 38, 0.1);
                backdrop-filter: blur(12px);
                position: sticky;
                top: 0;
                z-index: 2000;
                box-sizing: border-box;
                width: 100%;
            }
            .header-left {
                display: flex;
                align-items: center;
                gap: 24px;
            }
            .header-logo {
                display: flex;
                align-items: center;
                gap: 10px;
                font-size: 1.5rem;
                font-weight: 900;
                color: var(--primary-color);
                text-decoration: none;
                transition: transform 0.2s;
            }
            .header-logo:hover {
                transform: scale(1.05);
            }
            .menu-bar {
                display: flex;
                gap: 18px;
                align-items: center;
                margin-left: 24px;
            }
            .menu-item {
                font-size: 1.1rem;
                font-weight: 700;
                color: var(--primary-color);
                text-decoration: none;
                padding: 8px 18px;
                border-radius: 8px;
                cursor: pointer;
                transition: background 0.18s;
            }
            .menu-item:hover {
                background: #fff5f5;
            }

            .game-dropdown {
                position: relative;
            }
            .dropdown-content {
                display: none;
                position: absolute;
                top: 36px;
                left: 0;
                background: #fff;
                min-width: 140px;
                box-shadow: 0 4px 16px rgba(220, 38, 38, 0.13);
                border-radius: 12px;
                padding: 12px 0;
                z-index: 1000;
                flex-direction: column;
            }
            .game-dropdown:hover .dropdown-content {
                display: flex;
            }
            .dropdown-content a {
                color: var(--primary-color);
                padding: 10px 24px;
                text-decoration: none;
                font-size: 1.05rem;
                font-weight: 600;
                border-radius: 8px;
                transition: background 0.18s;
            }
            .dropdown-content a:hover {
                background: #ffe5e5;
            }

            .header-right {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .login-btn {
                padding: 8px 16px;
                color: #fff;
                border: none;
                border-radius: 6px;
                font-size: 0.95rem;
                font-weight: bold;
                cursor: pointer;
                background: var(--primary-color);
                transition: background 0.2s;
            }

            /* --- 월드컵 컨텐츠 (카드 디자인 강화) --- */
            .game-main {
                padding: 40px 20px 80px;
            }
            .worldcup-container {
                max-width: 700px;
                margin: 0 auto;
                text-align: center;
                background: white;
                padding: 40px;
                border-radius: 32px;
                border: 2px solid var(--primary-color);
                box-shadow: 0 16px 64px rgba(220, 38, 38, 0.15);
            }
            .worldcup-title {
                font-size: 2.3rem;
                font-weight: 900;
                color: var(--primary-color);
                margin-bottom: 12px;
            }
            .round-title {
                font-size: 1.4rem;
                font-weight: 800;
                margin-bottom: 30px;
                color: var(--primary-color);
                background: #fff5f5;
                padding: 12px 24px;
                border-radius: 15px;
                display: inline-block;
                border: 1px solid #ffebeb;
            }

            .choices {
                display: flex;
                justify-content: center;
                gap: 25px;
                margin-bottom: 32px;
                flex-wrap: wrap;
            }
            .choice {
                cursor: pointer;
                border: 3px solid #f0f0f0;
                border-radius: 28px;
                background: #fff;
                box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
                transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                width: 260px;
                padding: 20px;
                display: flex;
                flex-direction: column;
                align-items: center;
                position: relative;
            }
            .choice:hover {
                border-color: var(--primary-color);
                transform: translateY(-10px) scale(1.02);
                box-shadow: 0 15px 30px rgba(220, 38, 38, 0.15);
            }

            .choice-img {
                width: 100%;
                height: 180px;
                object-fit: cover;
                border-radius: 20px;
                margin-bottom: 18px;
                background: #f8f8f8;
                border: 1px solid #eee;
            }
            .choice-label {
                font-size: 1.6rem;
                font-weight: 900;
                color: #222;
            }

            .result {
                font-size: 2rem;
                font-weight: 900;
                color: var(--primary-color);
                margin-top: 20px;
                line-height: 1.4;
            }
            .restart-btn {
                margin-top: 30px;
                padding: 16px 45px;
                font-size: 1.2rem;
                font-weight: 900;
                background: var(--primary-color);
                color: white;
                border: none;
                border-radius: 15px;
                cursor: pointer;
                transition: 0.2s;
                box-shadow: 0 8px 20px rgba(220, 38, 38, 0.2);
            }
            .restart-btn:hover {
                background: var(--primary-hover);
                transform: scale(1.05);
            }
        </style>
    </head>
    <body>
        <header class="header">
            <div class="header-left">
                <a href="/main" class="header-logo">TasteMate</a>
                <nav class="menu-bar">
                    <a class="menu-item" href="/aichat">AI추천</a>
                    <a class="menu-item" href="/community">커뮤니티</a>
                    <div class="menu-item game-dropdown">
                        <span>게임 ▾</span>
                        <div class="dropdown-content">
                            <a href="/game/pinball">핀볼</a>
                            <a href="/game/ladder">사다리타기</a>
                            <a href="/game/random_amount">룰렛 게임</a>
                            <a href="/game/worldcup">음식 월드컵</a>
                            <a href="/game/calculator">계산기</a>
                        </div>
                    </div>
                </nav>
            </div>

            <div class="header-right" id="headerRightArea">
                <button class="login-btn" onclick="location.href = '/login'">로그인</button>
                <button class="login-btn" style="background: #fff; color: #dc2626; border: 1px solid #dc2626; margin-left: 5px;" onclick="location.href = '/signup'">회원가입</button>
            </div>
        </header>

        <main class="game-main">
            <div class="worldcup-container">
                <div class="worldcup-title">🍗 메뉴 월드컵</div>
                <div id="round-title" class="round-title">준비 중...</div>

                <div class="choices">
                    <div class="choice" id="choice1" onclick="selectChoice(0)">
                        <img class="choice-img" id="img1" src="" alt="음식1" />
                        <div class="choice-label" id="label1"></div>
                    </div>
                    <div class="choice" id="choice2" onclick="selectChoice(1)">
                        <img class="choice-img" id="img2" src="" alt="음식2" />
                        <div class="choice-label" id="label2"></div>
                    </div>
                </div>

                <div id="result" class="result" style="display: none"></div>
                <button id="restart-btn" class="restart-btn" style="display: none" onclick="restartWorldcup()">
                    다시 하기
                </button>
            </div>
        </main>

        <script>
            /* --- 로그인 세션 유지 로직 --- */
            document.addEventListener('DOMContentLoaded', () => {
                const nickname = localStorage.getItem('nickname');
                const isAdmin = localStorage.getItem('is_admin');
                const headerRightArea = document.getElementById('headerRightArea');

                if (nickname && headerRightArea) {
                    let adminButton = '';
                    if (isAdmin === '1') {
                        adminButton = `<button class="login-btn" onclick="location.href='/admin'" style="background: #2c3e50;">⚙️ 관리자</button>`;
                    }
                    headerRightArea.innerHTML = `
                        <span style="font-weight: 700; color: #dc2626; font-size: 1.05rem; margin-right: 8px;">👤 ${nickname}님</span>
                        ${adminButton}
                        <button class="login-btn" onclick="location.href='/mypage'" style="background: #f39c12; margin-left:4px;">정보</button>
                        <button class="login-btn" onclick="logout()" style="background: #666; margin-left:4px;">로그아웃</button>
                    `;
                }
            });

            function logout() {
                localStorage.clear();
                alert('로그아웃 되었습니다.');
                window.location.href = '/main';
            }

            /* --- 월드컵 게임 로직 유지 --- */
            const menuList = [
                { name: '짜장면', img: '/food/짜장면.webp' }, { name: '짬뽕', img: '/food/짬뽕.jpg' },
                { name: '돈가스', img: '/food/돈가스.jpeg' }, { name: '제육볶음', img: '/food/제육볶음.webp' },
                { name: '비빔밥', img: '/food/비빔밥.jpg' }, { name: '김치찌개', img: '/food/김치찌개.webp' },
                { name: '파스타', img: '/food/파스타.jpeg' }, { name: '샐러드', img: '/food/샐러드.webp' },
            ];

            let roundMenus = [];
            let nextRound = [];
            let match = 0;

            function shuffle(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
            }

            function startWorldcup() {
                roundMenus = [...menuList];
                shuffle(roundMenus);
                nextRound = [];
                match = 0;
                document.getElementById('result').style.display = 'none';
                document.getElementById('restart-btn').style.display = 'none';
                document.querySelector('.choices').style.display = 'flex';
                showMatch();
            }

            function showMatch() {
                if (roundMenus.length === 1) {
                    document.querySelector('.choices').style.display = 'none';
                    document.getElementById('round-title').textContent = '🏆 우승 추천 메뉴';
                    document.getElementById('result').innerHTML = `오늘의 원픽은!<br><b>[ ${roundMenus[0].name} ]</b>`;
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('restart-btn').style.display = 'inline-block';
                    return;
                }
                document.getElementById('round-title').textContent = `${roundMenus.length}강 (진행: ${match + 1}/${roundMenus.length / 2})`;
                document.getElementById('img1').src = roundMenus[match * 2].img;
                document.getElementById('label1').textContent = roundMenus[match * 2].name;
                document.getElementById('img2').src = roundMenus[match * 2 + 1].img;
                document.getElementById('label2').textContent = roundMenus[match * 2 + 1].name;
            }

            function selectChoice(idx) {
                nextRound.push(roundMenus[match * 2 + idx]);
                match++;
                if (match * 2 >= roundMenus.length) {
                    roundMenus = nextRound;
                    nextRound = [];
                    match = 0;
                }
                showMatch();
            }

            function restartWorldcup() { startWorldcup(); }
            window.onload = startWorldcup;
        </script>
    </body>
</html>

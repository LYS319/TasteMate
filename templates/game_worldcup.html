<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>테이스트메이트 - 점심 메뉴 월드컵</title>
        <style>
            /* --- TasteMate 헤더 스타일 (통일) --- */
            body {
                margin: 0;
                font-family: 'Noto Sans KR', sans-serif;
                background: #fff;
            }
            .header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 16px 32px;
                background: rgba(255, 255, 255, 0.85);
                box-shadow: 0 2px 16px rgba(220, 38, 38, 0.1);
                backdrop-filter: blur(12px);
                position: sticky;
                top: 0;
                z-index: 2000;
            }
            .header-left {
                display: flex;
                align-items: center;
                gap: 24px;
            }
            .header-logo {
                display: flex;
                align-items: center;
                gap: 18px;
                font-size: 1.5rem;
                font-weight: bold;
                color: #dc2626;
                text-decoration: none;
            }
            .game-btn {
                margin-left: 8px;
                padding: 6px 18px;
                background: #fff5f5;
                color: #dc2626;
                border: 1.5px solid #dc2626;
                border-radius: 8px;
                font-size: 1rem;
                font-weight: 700;
                cursor: pointer;
                transition: background 0.18s;
            }
            .game-btn:hover {
                background: #ffe5e5;
            }
            .menu-toggle-btn {
                background: none;
                border: none;
                font-size: 2.1rem;
                margin-left: 8px;
                cursor: pointer;
                border-radius: 8px;
                padding: 4px 12px;
                transition: background 0.18s;
            }
            .menu-toggle-btn:hover {
                background: #ffe5e5;
            }
            #mainNavMenu {
                min-width: 140px;
                animation: fadeInMenu 0.18s;
                position: absolute;
                top: 60px;
                left: 32px;
                background: #fff;
                box-shadow: 0 4px 16px rgba(220, 38, 38, 0.13);
                border-radius: 12px;
                padding: 18px 24px 14px 24px;
                z-index: 1000;
                display: none;
            }
            @keyframes fadeInMenu {
                from {
                    opacity: 0;
                    transform: translateY(-10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .nav-emoji-btn {
                background: none;
                border: none;
                font-size: 1.7rem;
                margin: 0 2px;
                cursor: pointer;
                border-radius: 8px;
                padding: 4px 10px;
                transition: background 0.18s;
                text-align: left;
                width: 100%;
            }
            .nav-emoji-btn:hover {
                background: #ffe5e5;
            }
            .header-right {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .login-btn {
                padding: 8px 16px;
                color: #fff;
                border: none;
                border-radius: 6px;
                font-size: 0.95rem;
                font-weight: bold;
                cursor: pointer;
                transition: background 0.2s;
                background: #dc2626;
            }

            /* --- 월드컵 스타일 (원래 코드 유지) --- */
            .worldcup-container {
                max-width: 600px;
                margin: 40px auto;
                text-align: center;
                padding: 0 20px;
            }
            .worldcup-title {
                font-size: 2.2rem;
                font-weight: 900;
                color: #dc2626;
                margin-bottom: 10px;
            }
            .round-title {
                font-size: 1.3rem;
                font-weight: 700;
                margin-bottom: 24px;
                color: #b91c1c;
            }
            .choices {
                display: flex;
                justify-content: center;
                gap: 20px;
                margin-bottom: 32px;
                flex-wrap: wrap;
            }
            .choice {
                cursor: pointer;
                border: 2.5px solid #ffe5e5;
                border-radius: 20px;
                background: linear-gradient(135deg, #fff5f5 0%, #ffeaea 100%);
                box-shadow: 0 6px 18px rgba(220, 38, 38, 0.13);
                transition: all 0.2s;
                width: 240px;
                padding: 18px 10px 10px 10px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                font-size: 1.5rem;
                font-weight: 800;
                color: #b91c1c;
                letter-spacing: 1px;
                position: relative;
                overflow: hidden;
            }
            .choice-img {
                width: 180px;
                height: 130px;
                object-fit: cover;
                border-radius: 14px;
                margin-bottom: 16px;
                background: #eee;
                box-shadow: 0 2px 8px #ffe5e5;
            }
            .choice:hover {
                border: 2.5px solid #dc2626;
                background: linear-gradient(135deg, #ffeaea 0%, #fff5f5 100%);
                transform: translateY(-7px) scale(1.04);
                box-shadow: 0 10px 24px rgba(220, 38, 38, 0.18);
            }
            .choice-label {
                font-size: 1.3rem;
                font-weight: 900;
                color: #b91c1c;
                text-shadow:
                    1px 1px 0 #fff,
                    0 2px 8px #ffe5e5;
                letter-spacing: 1px;
                margin-top: 2px;
            }
            .result {
                font-size: 1.8rem;
                font-weight: 900;
                color: #dc2626;
                margin-top: 36px;
                animation: bounce 0.5s;
            }
            .restart-btn {
                margin-top: 24px;
                padding: 12px 40px;
                font-size: 1.1rem;
                font-weight: 700;
                background: #dc2626;
                color: white;
                border: none;
                border-radius: 12px;
                cursor: pointer;
            }
            @keyframes bounce {
                0%,
                100% {
                    transform: translateY(0);
                }
                50% {
                    transform: translateY(-10px);
                }
            }
        </style>
        <script>
            // 헤더 메뉴 제어용 (통일)
            function toggleMenu() {
                const menu = document.getElementById('mainNavMenu');
                menu.style.display = menu.style.display === 'none' || menu.style.display === '' ? 'block' : 'none';
            }
        </script>
    </head>
    <body>
        <header class="header">
            <div class="header-left">
                <button class="menu-toggle-btn" aria-label="메뉴 열기" onclick="toggleMenu()">☰</button>
                <a href="/main" class="header-logo">TasteMate</a>
                <div style="display: flex; gap: 8px; align-items: center">
                    <button class="game-btn" onclick="location.href = '/game/ideal'">메뉴 월드컵</button>
                    <button class="game-btn" onclick="location.href = '/game/pinball'">핀볼</button>
                    <button class="game-btn" onclick="location.href = '/game/ladder'">사다리타기</button>
                    <button class="game-btn" onclick="location.href = '/game/random-amount'">룰렛게임</button>
                </div>
                <nav class="main-nav" id="mainNavMenu">
                    <button class="nav-emoji-btn" onclick="location.href = '/main'" title="홈">🏠 홈</button><br />
                </nav>
            </div>
            <div class="header-right">
                <button class="login-btn" onclick="location.href = '/login'">로그인</button>
                <button
                    class="login-btn"
                    style="background: #fff; color: #dc2626; border: 1px solid #dc2626"
                    onclick="location.href = '/signup'"
                >
                    회원가입
                </button>
            </div>
        </header>

        <div class="worldcup-container">
            <div class="worldcup-title">🍗 메뉴 월드컵</div>
            <div id="round-title" class="round-title">로딩 중...</div>

            <div class="choices">
                <div class="choice" id="choice1" onclick="selectChoice(0)">
                    <img class="choice-img" id="img1" src="" alt="음식1" />
                    <div class="choice-label" id="label1"></div>
                </div>
                <div class="choice" id="choice2" onclick="selectChoice(1)">
                    <img class="choice-img" id="img2" src="" alt="음식2" />
                    <div class="choice-label" id="label2"></div>
                </div>
            </div>

            <div id="result" class="result" style="display: none"></div>
            <button id="restart-btn" class="restart-btn" style="display: none" onclick="restartWorldcup()">
                처음부터 다시하기
            </button>
        </div>

        <script>
            // 월드컵 기능 로직 (만지지 않음)
            const menuList = [
                { name: '짜장면', img: '/food/짜장면.webp' },
                { name: '짬뽕', img: '/food/짬뽕.jpg' },
                { name: '돈가스', img: '/food/돈가스.jpeg' },
                { name: '제육볶음', img: '/food/제육볶음.webp' },
                { name: '비빔밥', img: '/food/비빔밥.jpg' },
                { name: '김치찌개', img: '/food/김치찌개.webp' },
                { name: '파스타', img: '/food/파스타.jpeg' },
                { name: '샐러드', img: '/food/샐러드.webp' },
            ];

            let roundMenus = [];
            let nextRound = [];
            let match = 0;

            function shuffle(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
            }

            function startWorldcup() {
                roundMenus = [...menuList];
                shuffle(roundMenus);
                nextRound = [];
                match = 0;
                document.getElementById('result').style.display = 'none';
                document.getElementById('restart-btn').style.display = 'none';
                showMatch();
            }

            function showMatch() {
                if (roundMenus.length === 1) {
                    document.querySelector('.choices').style.display = 'none';
                    document.getElementById('round-title').textContent = '🏆 우승 메뉴 확정!';
                    document.getElementById('result').innerHTML =
                        `오늘 점심은<br><b>[${roundMenus[0].name}]</b> 어때요?`;
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('restart-btn').style.display = 'inline-block';
                    return;
                }

                document.querySelector('.choices').style.display = 'flex';
                document.getElementById('round-title').textContent =
                    `${roundMenus.length}강 - (${match + 1} / ${roundMenus.length / 2})`;

                document.getElementById('img1').src = roundMenus[match * 2].img;
                document.getElementById('label1').textContent = roundMenus[match * 2].name;
                document.getElementById('img2').src = roundMenus[match * 2 + 1].img;
                document.getElementById('label2').textContent = roundMenus[match * 2 + 1].name;
            }

            function selectChoice(idx) {
                nextRound.push(roundMenus[match * 2 + idx]);
                match++;

                if (match * 2 >= roundMenus.length) {
                    roundMenus = nextRound;
                    nextRound = [];
                    match = 0;
                }
                showMatch();
            }

            function restartWorldcup() {
                startWorldcup();
            }

            window.onload = startWorldcup;
        </script>
    </body>
</html>

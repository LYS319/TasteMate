<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>테이스트메이트 - 메뉴 월드컵</title>
        <style>
            /* --- TasteMate 공식 상단바 및 공통 스타일 --- */
            body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background: #fff; overflow-x: hidden; }
            .header {
                display: flex; justify-content: space-between; align-items: center; padding: 16px 32px;
                background: rgba(255, 255, 255, 0.85); box-shadow: 0 2px 16px rgba(220, 38, 38, 0.1);
                backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 2000; box-sizing: border-box; width: 100%;
            }
            .header-left { display: flex; align-items: center; gap: 24px; }
            .header-logo { display: flex; align-items: center; gap: 18px; font-size: 1.5rem; font-weight: bold; color: #dc2626; text-decoration: none; }
            
            .menu-bar { display: flex; gap: 18px; align-items: center; margin-left: 24px; }
            .menu-item { font-size: 1.15rem; font-weight: 700; color: #dc2626; text-decoration: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; transition: background 0.18s; }
            .menu-item:hover { background: #fff5f5; }
            
            .game-dropdown { position: relative; }
            .dropdown-content {
                display: none; position: absolute; top: 36px; left: 0; background: #fff; min-width: 140px;
                box-shadow: 0 4px 16px rgba(220, 38, 38, 0.13); border-radius: 12px; padding: 12px 0; z-index: 1000; flex-direction: column;
            }
            .game-dropdown:hover .dropdown-content { display: flex; }
            .dropdown-content a { color: #dc2626; padding: 10px 24px; text-decoration: none; font-size: 1.08rem; font-weight: 600; border-radius: 8px; transition: background 0.18s; }
            .dropdown-content a:hover { background: #ffe5e5; }

            .header-right { display: flex; align-items: center; gap: 10px; }
            .login-btn { padding: 8px 16px; color: #fff; border: none; border-radius: 6px; font-size: 0.95rem; font-weight: bold; cursor: pointer; background: #dc2626; transition: background 0.2s; }

            /* --- 월드컵 컨텐츠 스타일 --- */
            .game-main { padding: 40px 20px 80px; background: linear-gradient(135deg, #fff5f5 0%, #f0f2f5 100%); min-height: calc(100vh - 80px); }
            .worldcup-container { max-width: 650px; margin: 0 auto; text-align: center; background: white; padding: 40px; border-radius: 32px; border: 2px solid #dc2626; box-shadow: 0 16px 64px rgba(220, 38, 38, 0.15); }
            .worldcup-title { font-size: 2.2rem; font-weight: 900; color: #dc2626; margin-bottom: 10px; }
            .round-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 24px; color: #b91c1c; background: #fff5f5; padding: 10px; border-radius: 12px; display: inline-block; }
            
            .choices { display: flex; justify-content: center; gap: 20px; margin-bottom: 32px; flex-wrap: wrap; }
            .choice {
                cursor: pointer; border: 2.5px solid #ffe5e5; border-radius: 24px; background: #fff;
                box-shadow: 0 6px 18px rgba(0, 0, 0, 0.05); transition: all 0.2s; width: 240px; padding: 20px;
                display: flex; flex-direction: column; align-items: center; position: relative;
            }
            .choice:hover { border: 2.5px solid #dc2626; transform: translateY(-7px); box-shadow: 0 12px 24px rgba(220, 38, 38, 0.15); }
            
            .choice-img { width: 100%; height: 160px; object-fit: cover; border-radius: 16px; margin-bottom: 16px; background: #f0f0f0; }
            .choice-label { font-size: 1.4rem; font-weight: 900; color: #333; }
            
            .result { font-size: 1.8rem; font-weight: 900; color: #dc2626; margin-top: 20px; animation: bounce 0.6s infinite alternate; }
            .restart-btn { margin-top: 24px; padding: 14px 40px; font-size: 1.1rem; font-weight: 800; background: #dc2626; color: white; border: none; border-radius: 12px; cursor: pointer; transition: 0.2s; }
            .restart-btn:hover { background: #b91c1c; transform: scale(1.05); }

            @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
        </style>
    </head>
    <body>
        <header class="header">
            <div class="header-left">
                <a href="/main" class="header-logo">TasteMate</a>
                <nav class="menu-bar">
                    <a class="menu-item" href="/aichat">AI추천</a>
                    <a class="menu-item" href="/community">커뮤니티</a>
                    <div class="menu-item game-dropdown">
                        <span>게임 ▾</span>
                        <div class="dropdown-content">
                            <a href="/game/pinball">핀볼</a>
                            <a href="/game/ladder">사다리타기</a>
                            <a href="/game/random_amount">룰렛 게임</a>
                            <a href="/game/worldcup">음식 월드컵</a>
                            <a href="/game/calculator">계산기</a>
                        </div>
                    </div>
                </nav>
            </div>

            <div class="header-right" id="headerRightArea">
                <button class="login-btn" onclick="location.href = '/login'">로그인</button>
                <button class="login-btn" style="background: #fff; color: #dc2626; border: 1px solid #dc2626" onclick="location.href = '/signup'">회원가입</button>
            </div>
        </header>

        <main class="game-main">
            <div class="worldcup-container">
                <div class="worldcup-title">🍗 메뉴 월드컵</div>
                <div id="round-title" class="round-title">준비 중...</div>

                <div class="choices">
                    <div class="choice" id="choice1" onclick="selectChoice(0)">
                        <img class="choice-img" id="img1" src="" alt="음식1" />
                        <div class="choice-label" id="label1"></div>
                    </div>
                    <div class="choice" id="choice2" onclick="selectChoice(1)">
                        <img class="choice-img" id="img2" src="" alt="음식2" />
                        <div class="choice-label" id="label2"></div>
                    </div>
                </div>

                <div id="result" class="result" style="display: none"></div>
                <button id="restart-btn" class="restart-btn" style="display: none" onclick="restartWorldcup()">
                    다시 하기
                </button>
            </div>
        </main>

        <script>
            // --- 상단바 로그인 세션 관리 ---
            document.addEventListener('DOMContentLoaded', () => {
                const nickname = localStorage.getItem('nickname');
                const isAdmin = localStorage.getItem('is_admin');
                const headerRightArea = document.getElementById('headerRightArea');

                if (nickname && headerRightArea) {
                    let adminButton = '';
                    if (isAdmin === '1') {
                        adminButton = `<button class="login-btn" onclick="location.href='/admin'" style="background: #2c3e50;">⚙️ 관리자</button>`;
                    }
                    headerRightArea.innerHTML = `
                        <span style="font-weight: 700; color: #dc2626; font-size: 1.05rem; margin-right: 5px;">👤 ${nickname}님</span>
                        ${adminButton}
                        <button class="login-btn" onclick="location.href='/mypage'" style="background: #f39c12;">정보</button>
                        <button class="login-btn" onclick="logout()" style="background: #666;">로그아웃</button>
                    `;
                }
            });

            function logout() {
                localStorage.clear();
                alert('로그아웃 되었습니다.');
                window.location.href = '/main';
            }

            // --- 월드컵 로직 (기존 유지) ---
            const menuList = [
                { name: '짜장면', img: '/food/짜장면.webp' },
                { name: '짬뽕', img: '/food/짬뽕.jpg' },
                { name: '돈가스', img: '/food/돈가스.jpeg' },
                { name: '제육볶음', img: '/food/제육볶음.webp' },
                { name: '비빔밥', img: '/food/비빔밥.jpg' },
                { name: '김치찌개', img: '/food/김치찌개.webp' },
                { name: '파스타', img: '/food/파스타.jpeg' },
                { name: '샐러드', img: '/food/샐러드.webp' },
            ];

            let roundMenus = [];
            let nextRound = [];
            let match = 0;

            function shuffle(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
            }

            function startWorldcup() {
                roundMenus = [...menuList];
                shuffle(roundMenus);
                nextRound = [];
                match = 0;
                document.getElementById('result').style.display = 'none';
                document.getElementById('restart-btn').style.display = 'none';
                document.querySelector('.choices').style.display = 'flex';
                showMatch();
            }

            function showMatch() {
                if (roundMenus.length === 1) {
                    document.querySelector('.choices').style.display = 'none';
                    document.getElementById('round-title').textContent = '🏆 최종 우승!';
                    document.getElementById('result').innerHTML = `오늘의 추천 메뉴는<br><b>[ ${roundMenus[0].name} ]</b> 입니다!`;
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('restart-btn').style.display = 'inline-block';
                    return;
                }
                document.getElementById('round-title').textContent = `${roundMenus.length}강 (${match + 1} / ${roundMenus.length / 2})`;
                document.getElementById('img1').src = roundMenus[match * 2].img;
                document.getElementById('label1').textContent = roundMenus[match * 2].name;
                document.getElementById('img2').src = roundMenus[match * 2 + 1].img;
                document.getElementById('label2').textContent = roundMenus[match * 2 + 1].name;
            }

            function selectChoice(idx) {
                nextRound.push(roundMenus[match * 2 + idx]);
                match++;
                if (match * 2 >= roundMenus.length) {
                    roundMenus = nextRound;
                    nextRound = [];
                    match = 0;
                }
                showMatch();
            }

            function restartWorldcup() { startWorldcup(); }
            window.onload = startWorldcup;
        </script>
    </body>
</html>

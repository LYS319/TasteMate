<!doctype html>
<html lang="ko">
    <head>
        <script>
            if (window.top !== window.self) {
                window.top.location.href = window.self.location.href;
            }
        </script>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>테이스트메이트 - 메뉴 월드컵</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="/static/css/header.css" />

        <style>
            :root {
                --primary-color: #dc2626;
                --primary-hover: #b91c1c;
                --bg-gradient: linear-gradient(135deg, #fff5f5 0%, #f0f2f5 100%);
                --glass-bg: rgba(255, 255, 255, 0.85);
            }

            body {
                margin: 0;
                font-family: 'Noto Sans KR', sans-serif;
                background: #fff;
                color: #333;
                min-height: 100vh;
                overflow-x: hidden;
            }

            /* ===== Layout ===== */
            .game-main {
                padding: 160px 20px 80px;
            }
            .worldcup-container {
                max-width: 700px;
                margin: 0 auto;
                text-align: center;
                background: #fff;
                padding: 40px;
                border-radius: 32px;
                border: 2px solid var(--primary-color);
                box-shadow: 0 16px 64px rgba(220, 38, 38, 0.15);
            }
            .worldcup-title {
                font-size: 2.3rem;
                font-weight: 900;
                color: var(--primary-color);
                margin-bottom: 12px;
            }
            .round-title {
                font-size: 1.4rem;
                font-weight: 800;
                margin-bottom: 30px;
                color: var(--primary-color);
                background: #fff5f5;
                padding: 12px 24px;
                border-radius: 15px;
                display: inline-block;
                border: 1px solid #ffebeb;
            }

            .choices {
                display: flex;
                justify-content: center;
                gap: 25px;
                margin-bottom: 32px;
                flex-wrap: wrap;
            }
            .choice {
                cursor: pointer;
                border: 3px solid #f0f0f0;
                border-radius: 28px;
                background: #fff;
                box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
                transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                width: 260px;
                padding: 20px;
                display: flex;
                flex-direction: column;
                align-items: center;
                position: relative;
            }
            .choice:hover {
                border-color: var(--primary-color);
                transform: translateY(-10px) scale(1.02);
                box-shadow: 0 15px 30px rgba(220, 38, 38, 0.15);
            }

            .choice-img {
                width: 100%;
                height: 180px;
                object-fit: cover;
                border-radius: 20px;
                margin-bottom: 18px;
                background: #f8f8f8;
                border: 1px solid #eee;
            }
            .choice-label {
                font-size: 1.6rem;
                font-weight: 900;
                color: #222;
            }

            .result {
                font-size: 2rem;
                font-weight: 900;
                color: var(--primary-color);
                margin-top: 20px;
                line-height: 1.4;
            }
            .restart-btn {
                margin-top: 30px;
                padding: 16px 45px;
                font-size: 1.2rem;
                font-weight: 900;
                background: var(--primary-color);
                color: white;
                border: none;
                border-radius: 15px;
                cursor: pointer;
                transition: 0.2s;
                box-shadow: 0 8px 20px rgba(220, 38, 38, 0.2);
            }
            .restart-btn:hover {
                background: var(--primary-hover);
                transform: scale(1.05);
            }

            /* ===== 광고 배너 ===== */
            .side-ad {
                position: fixed;
                top: 150px;
                width: 160px;
                height: 600px;
                background: #f4f4f4;
                border: 1px solid #ddd;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #999;
                font-weight: bold;
                z-index: 100;
                border-radius: 10px;
                font-size: 0.85rem;
                text-align: center;
                padding: 8px;
                box-sizing: border-box;
            }
            .ad-left {
                left: 20px;
            }
            .ad-right {
                right: 20px;
            }
            .mobile-top-ad {
                display: none;
                position: fixed;
                top: 100px;
                left: 0;
                right: 0;
                height: 55px;
                background: #f4f4f4;
                border-bottom: 1px solid #ddd;
                align-items: center;
                justify-content: center;
                color: #999;
                font-weight: bold;
                font-size: 0.9rem;
                z-index: 100;
                pointer-events: none;
            }
            @media (max-width: 1200px) {
                .side-ad {
                    display: none;
                }
            }
            @media (max-width: 900px) {
                .mobile-top-ad {
                    display: flex;
                }
                .game-main {
                    padding-top: 80px !important;
                }
                .worldcup-container {
                    padding: 20px;
                }
                .choices {
                    gap: 15px;
                }
                .choice {
                    width: 100%;
                    max-width: 320px;
                }
            }
        </style>
    </head>
    <body>
        <header class="header">
            <div class="header-left">
                <a href="/main" class="header-logo">TasteMate</a>
                <nav class="menu-bar">
                    <a class="menu-item" href="/about">회사소개</a>
                    <a class="menu-item" href="/aichat">AI추천</a>
                    <a class="menu-item" href="/community">커뮤니티</a>
                    <div class="menu-item game-dropdown">
                        <span>게임 ▾</span>
                        <div class="dropdown-content">
                            <a href="/game/pinball">핀볼</a>
                            <a href="/game/ladder">사다리타기</a>
                            <a href="/game/random_amount">룰렛 게임</a>
                            <a href="/game/worldcup">음식 월드컵</a>
                            <a href="/game/calculator">계산기</a>
                        </div>
                    </div>
                </nav>
            </div>

            <div class="header-center"></div>

            <div class="header-right" id="headerRightArea">
                <button class="login-btn" onclick="location.href = '/login'">로그인</button>
                <button
                    class="login-btn"
                    style="background: #fff; color: #dc2626; border: 1.5px solid #dc2626"
                    onclick="location.href = '/signup'"
                >
                    회원가입
                </button>
            </div>
        </header>

        <main class="game-main">
            <div class="side-ad ad-left">광고 영역 (좌)</div>
            <div class="side-ad ad-right">광고 영역 (우)</div>
            <div class="mobile-top-ad">📢 광고 영역 (모바일)</div>

            <div class="worldcup-container">
                <div class="worldcup-title">🍗 메뉴 월드컵</div>
                <button id="start-btn" class="restart-btn" onclick="onStartClick()">시작하기</button>
                <div id="round-title" class="round-title" style="display: none">준비 중...</div>
                <div class="choices" style="display: none">
                    <div class="choice" id="choice1" onclick="selectChoice(0)">
                        <img class="choice-img" id="img1" src="" alt="음식1" />
                        <div class="choice-label" id="label1"></div>
                    </div>
                    <div class="choice" id="choice2" onclick="selectChoice(1)">
                        <img class="choice-img" id="img2" src="" alt="음식2" />
                        <div class="choice-label" id="label2"></div>
                    </div>
                </div>
                <div id="result" class="result" style="display: none"></div>
                <button id="restart-btn" class="restart-btn" style="display: none" onclick="restartWorldcup()">
                    다시 하기
                </button>
            </div>
        </main>

        <script>
            function logout() {
                localStorage.clear();
                alert('안전하게 로그아웃 되었습니다.');
                window.location.href = '/main';
            }

            function getGPSLocation() {
                const locSpan = document.getElementById('gps-location');
                if (!locSpan) return;
                if (navigator.geolocation) {
                    locSpan.innerText = '📍 위치 찾는 중...';
                    navigator.geolocation.getCurrentPosition(
                        async (pos) => {
                            try {
                                const res = await fetch(
                                    `/api/reverse-geocode?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`,
                                );
                                const data = await res.json();
                                const addr = data.address.city || data.address.province || '위치 확인됨';
                                locSpan.innerText = `📍 ${addr}`;
                            } catch (e) {
                                locSpan.innerText = '📍 위치 확인됨';
                            }
                        },
                        () => {
                            locSpan.innerText = '📍 위치 거부됨';
                        },
                    );
                }
            }

            const menuList = [
                { name: '짜장면', img: '/food/짜장면.webp' },
                { name: '짬뽕', img: '/food/짬뽕.jpg' },
                { name: '돈가스', img: '/food/돈가스.jpeg' },
                { name: '제육볶음', img: '/food/제육볶음.webp' },
                { name: '비빔밥', img: '/food/비빔밥.jpg' },
                { name: '김치찌개', img: '/food/김치찌개.webp' },
                { name: '파스타', img: '/food/파스타.jpeg' },
                { name: '샐러드', img: '/food/샐러드.webp' },
            ];

            let roundMenus = [],
                nextRound = [],
                match = 0;

            function shuffle(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
            }

            function onStartClick() {
                document.getElementById('start-btn').style.display = 'none';
                document.getElementById('round-title').style.display = '';
                document.querySelector('.choices').style.display = 'flex';
                startWorldcup();
            }

            function startWorldcup() {
                roundMenus = [...menuList];
                shuffle(roundMenus);
                nextRound = [];
                match = 0;
                document.getElementById('result').style.display = 'none';
                document.getElementById('restart-btn').style.display = 'none';
                showMatch();
            }

            function showMatch() {
                if (roundMenus.length === 1) {
                    document.querySelector('.choices').style.display = 'none';
                    document.getElementById('round-title').textContent = '🏆 우승 추천 메뉴';
                    document.getElementById('result').innerHTML = `오늘의 원픽은!<br><b>[ ${roundMenus[0].name} ]</b>`;
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('restart-btn').style.display = 'inline-block';
                    return;
                }
                document.getElementById('round-title').textContent =
                    `${roundMenus.length}강 (진행: ${match + 1}/${roundMenus.length / 2})`;
                document.getElementById('img1').src = roundMenus[match * 2].img;
                document.getElementById('label1').textContent = roundMenus[match * 2].name;
                document.getElementById('img2').src = roundMenus[match * 2 + 1].img;
                document.getElementById('label2').textContent = roundMenus[match * 2 + 1].name;
            }

            function selectChoice(idx) {
                nextRound.push(roundMenus[match * 2 + idx]);
                match++;
                if (match * 2 >= roundMenus.length) {
                    roundMenus = nextRound;
                    nextRound = [];
                    match = 0;
                }
                showMatch();
            }

            function restartWorldcup() {
                document.getElementById('start-btn').style.display = '';
                document.getElementById('round-title').style.display = 'none';
                document.querySelector('.choices').style.display = 'none';
                document.getElementById('result').style.display = 'none';
                document.getElementById('restart-btn').style.display = 'none';
            }

            document.addEventListener('DOMContentLoaded', () => {
                const nickname = localStorage.getItem('nickname');
                const isAdmin = localStorage.getItem('is_admin');
                const headerRightArea = document.getElementById('headerRightArea');
                if (nickname && headerRightArea) {
                    let avatarText = nickname.slice(0, 2);
                    let adminButton =
                        isAdmin == '1'
                            ? `<button class="login-btn" onclick="location.href='/admin'" style="background: #2c3e50; margin-left:8px;">⚙️ 관리자</button>`
                            : '';
                    headerRightArea.innerHTML = `
                        <span class="nickname-avatar" id="nicknameAvatar" onclick="location.href='/mypage'">${avatarText}</span>
                        ${adminButton}
                        <button class="login-btn" onclick="logout()" style="background: #666; margin-left:8px;">로그아웃</button>
                        <span class="current-location" id="gps-location" onclick="getGPSLocation()">📍 내 위치</span>
                    `;
                    getGPSLocation && getGPSLocation();
                } else if (headerRightArea) {
                    headerRightArea.innerHTML = `
                        <button class="login-btn" onclick="location.href = '/login'">로그인</button>
                        <button class="login-btn" style="background: #fff; color: #dc2626; border: 1px solid #dc2626" onclick="location.href = '/signup'">회원가입</button>
                    `;
                }
                restartWorldcup();
            });
        </script>

        <div class="mobile-nav" id="mobileNav" onclick="closeMobileNavOutside(event)">
            <div class="mobile-nav-panel">
                <div class="mobile-nav-header">
                    <a href="/main" class="mobile-nav-logo">🍽️ TasteMate</a>
                    <button class="mobile-nav-close" onclick="closeMobileNav()">✕</button>
                </div>
                <div class="mobile-nav-links">
                    <a href="/main">🏠 홈</a>
                    <a href="/aichat">🤖 AI 맛집추천</a>
                    <a href="/community">🧑‍🤝‍🧑 커뮤니티</a>
                    <div class="mobile-nav-divider"></div>
                    <a href="/SOLO">🍚 혼밥</a>
                    <a href="/DATE">💑 데이트</a>
                    <a href="/WORK">🍻 회식</a>
                    <a href="/ETC">🧩 기타</a>
                    <div class="mobile-nav-divider"></div>
                    <a href="/game/pinball">🎯 핀볼</a>
                    <a href="/game/ladder">🪜 사다리타기</a>
                    <a href="/game/random_amount">🎰 룰렛 게임</a>
                    <a href="/game/worldcup">🏆 음식 월드컵</a>
                    <a href="/game/calculator">🧮 계산기</a>
                    <div class="mobile-nav-divider"></div>
                    <a href="/about">ℹ️ 회사소개</a>
                </div>
            </div>
        </div>
        <script>
            function openMobileNav() {
                document.getElementById('mobileNav').classList.add('open');
                document.body.style.overflow = 'hidden';
            }
            function closeMobileNav() {
                document.getElementById('mobileNav').classList.remove('open');
                document.body.style.overflow = '';
            }
            function closeMobileNavOutside(e) {
                if (e.target === document.getElementById('mobileNav')) closeMobileNav();
            }
        </script>
        <script src="/static/js/avatar-sync.js"></script>
        <script>
            // 드롭다운 메뉴 hover 유지 (테이스트메이트.html 방식)
            document.addEventListener('DOMContentLoaded', function () {
                document.querySelectorAll('.game-dropdown').forEach(function (dropdown) {
                    const dropdownContent = dropdown.querySelector('.dropdown-content');
                    if (!dropdownContent) return;
                    let dropdownTimer = null;
                    dropdown.addEventListener('mouseenter', function () {
                        clearTimeout(dropdownTimer);
                        dropdownContent.style.display = 'block';
                    });
                    dropdown.addEventListener('mouseleave', function () {
                        dropdownTimer = setTimeout(function () {
                            dropdownContent.style.display = '';
                        }, 120);
                    });
                    dropdownContent.addEventListener('mouseenter', function () {
                        clearTimeout(dropdownTimer);
                        dropdownContent.style.display = 'block';
                    });
                    dropdownContent.addEventListener('mouseleave', function () {
                        dropdownTimer = setTimeout(function () {
                            dropdownContent.style.display = '';
                        }, 120);
                    });
                });
            });
        </script>
    </body>
</html>

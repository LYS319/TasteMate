<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>관리자 센터 - TasteMate</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js" defer></script>
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; background: #fff; }
        th, td { padding: 14px 10px; border-bottom: 1px solid var(--border-red); text-align: left; vertical-align: middle; }
        th { background: var(--bg-light); color: var(--main-red); font-weight: 800; }
        .action-btn { padding: 6px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; white-space: nowrap; }
        .action-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-left">
                <button class="menu-toggle-btn" onclick="toggleMenu()">☰</button>
                <a href="/main" class="header-logo">TasteMate</a>
                <nav id="mainNavMenu">
                    <button class="nav-emoji-btn" onclick="location.href='/main'">🏠 홈</button>
                    <button class="nav-emoji-btn" onclick="location.href='/aichat'">🤖 AI추천</button>
                    <button class="nav-emoji-btn" onclick="location.href='/community'">🧑‍🤝‍🧑 커뮤니티</button>
                </nav>
            </div>
            <div class="header-right" id="headerRightArea"></div>
        </div>
    </header>

    <main style="padding-top: 100px; padding-bottom: 80px;">
        <div class="container">
            <div class="main-title" style="font-size: 2.2rem; margin: 20px 0; text-align: left;">⚙️ 관리자 센터</div>
            
            <section style="margin-bottom: 50px;">
                <h3 style="color: var(--main-red); border-left: 5px solid var(--main-red); padding-left: 10px; margin-bottom: 15px;">👤 사용자 관리</h3>
                <div style="overflow-x: auto; border-radius: 12px; box-shadow: 0 4px 12px var(--shadow-soft); border: 1.5px solid var(--border-red);"> 
                    <table id="user-table" style="margin-top: 0;">
                        <thead>
                            <tr>
                                <th>닉네임</th>
                                <th>상태</th>
                                <th>관리 (차단/추방)</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="3" style="text-align: center; padding: 30px; color: #999;">유저 목록을 불러오는 중입니다...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <section>
                <h3 style="color: var(--main-red); border-left: 5px solid var(--main-red); padding-left: 10px; margin-bottom: 15px;">📝 전체 게시글 관리</h3>
                <div id="admin-posts-list" style="display: flex; flex-direction: column; gap: 12px;">
                    <p style="text-align: center; padding: 30px; color: #999; background: #fff; border-radius: 12px; border: 1.5px solid var(--border-red);">게시글을 불러오는 중입니다...</p>
                </div>
            </section>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            if (localStorage.getItem('is_admin') !== '1') {
                alert("관리자 권한이 없습니다.");
                location.href = "/main";
                return;
            }
            // 페이지 로드 시 유저와 게시글 데이터를 모두 불러옵니다.
            loadAdminUsers();
            loadAdminPosts();
        });

        // ==========================================
        // 1. 유저 관리 로직
        // ==========================================
        async function loadAdminUsers() {
            try {
                const res = await fetch('/api/admin/users');
                const users = await res.json();
                const tbody = document.querySelector('#user-table tbody');
                
                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#999;">가입한 유저가 없습니다.</td></tr>';
                    return;
                }

                tbody.innerHTML = users.map(u => `
                    <tr>
                        <td style="font-weight: bold;">${u.nickname}</td>
                        <td><span style="color: ${u.status === '차단' ? '#e74c3c' : '#2ecc71'}; font-weight: bold;">${u.status || '정상'}</span></td>
                        <td style="display: flex; gap: 6px;">
                            <button class="action-btn" style="background: ${u.status === '차단' ? '#2ecc71' : '#f39c12'}; color: #fff;" 
                                    onclick="updateUserStatus(${u.id}, '${u.status === '차단' ? '정상' : '차단'}')">
                                ${u.status === '차단' ? '차단 해제' : '차단'}
                            </button>
                            <button class="action-btn" style="background: #000; color: #fff;" onclick="kickUser(${u.id})">추방</button>
                        </td>
                    </tr>
                `).join('');
            } catch(e) { console.error("유저 로드 에러:", e); }
        }

        async function updateUserStatus(uid, status) {
            if (!confirm(`해당 유저를 ${status} 처리하시겠습니까?`)) return;
            const formData = new FormData();
            formData.append('status', status);
            try {
                await fetch(`/api/admin/users/${uid}/status`, { method: 'PATCH', body: formData });
                alert(`유저 상태가 ${status}(으)로 변경되었습니다.`);
                loadAdminUsers();
            } catch(e) { alert("상태 변경 실패"); }
        }

        // 추방 기능
        async function kickUser(uid) {
            if (!confirm("정말 이 유저를 영구 추방(데이터 삭제)하시겠습니까?\\n이 작업은 되돌릴 수 없습니다.")) return;
            try {
                const res = await fetch(`/api/admin/users/${uid}`, { method: 'DELETE' });
                if (res.ok) {
                    alert("유저가 추방되었습니다.");
                    loadAdminUsers();
                } else { alert("추방에 실패했습니다."); }
            } catch(e) { alert("서버 오류로 추방에 실패했습니다."); }
        }

        // ==========================================
        // 2. 게시글 관리 로직
        // ==========================================
        async function loadAdminPosts() {
            try {
                const res = await fetch('/api/admin/posts'); 
                const posts = await res.json();
                const container = document.getElementById('admin-posts-list');
                
                if (!posts || posts.length === 0) {
                    container.innerHTML = '<p style="text-align: center; padding: 30px; color: #999; background: #fff; border-radius: 12px; border: 1.5px solid var(--border-red);">등록된 게시글이 없습니다.</p>';
                    return;
                }

                container.innerHTML = posts.map(post => `
                    <div style="background: #fff; border: 1.5px solid var(--border-red); border-radius: 12px; padding: 16px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px var(--shadow-soft);">
                        <div style="flex: 1; margin-right: 15px;">
                            <div style="font-size: 0.8rem; color: #fff; background: var(--main-red); padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 6px; font-weight: bold;">${post.category}</div>
                            <div style="font-weight: 900; font-size: 1.1rem; color: #222; margin-bottom: 6px; word-break: break-word;">${post.title}</div>
                            <div style="font-size: 0.85rem; color: #666;">👤 ${post.author} | 📅 ${post.date.split(' ')[0]}</div>
                        </div>
                        <button class="action-btn" style="background: #e74c3c; color: #fff; padding: 10px 15px;" onclick="deletePost(${post.id})">삭제 🗑️</button>
                    </div>
                `).join('');
            } catch(e) { console.error("게시글 로드 에러:", e); }
        }

        // 🌟 422 에러 완벽 해결: FormData로 묶어서 전송합니다.
        async function deletePost(postId) {
            if (!confirm("이 게시글을 삭제하시겠습니까?")) return;
            
            // 현재 로그인한 관리자의 user_id 가져오기
            const userId = localStorage.getItem('user_id');
            
            // 💡 핵심: 폼 데이터 객체를 만들어서 user_id를 담습니다.
            const formData = new FormData();
            formData.append('user_id', userId);
            
            try {
                // URL에 붙이지 않고, body에 formData를 실어서 보냅니다.
                const res = await fetch(`/api/posts/${postId}`, { 
                    method: 'DELETE',
                    body: formData
                });
                
                if (res.ok) {
                    alert("게시글이 깔끔하게 삭제되었습니다.");
                    loadAdminPosts(); // 삭제 후 목록 다시 불러오기
                } else { 
                    const errData = await res.json();
                    console.error("삭제 실패 상세 이유:", errData);
                    
                    // 만약 또 에러가 난다면, 서버가 요구하는 변수명이 'user_id'가 아닐 수 있습니다.
                    alert("게시글 삭제 실패! 콘솔창의 에러 로그를 확인해주세요."); 
                }
            } catch(e) { 
                alert("서버 오류로 삭제에 실패했습니다."); 
            }
        }
    </script>
</body>
</html>

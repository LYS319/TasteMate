<!doctype html>
<html lang="ko">
    <head>
    <script>
        // ngrok iframe 탈출 - 경고 페이지 없이 직접 접속
        if (window.top !== window.self) {
            window.top.location.href = window.self.location.href;
        }
    </script>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>기타 커뮤니티 | TasteMate</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

            /* --- Animations --- */
            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(25px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            @keyframes noticeGlow {
                0% {
                    box-shadow: 0 4px 6px rgba(220, 38, 38, 0.05);
                }
                50% {
                    box-shadow: 0 4px 20px rgba(220, 38, 38, 0.15);
                    border-color: #dc2626;
                }
                100% {
                    box-shadow: 0 4px 6px rgba(220, 38, 38, 0.05);
                }
            }

            .fade-in-card {
                opacity: 0;
                animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            }

            body {
                margin: 0;
                font-family: 'Noto Sans KR', sans-serif;
                background: #fdfdfd;
                word-break: keep-all;
                color: #333;
            }

            /* --- Header Style (기본 유지) --- */
            .header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 12px 32px;
                background: rgba(255, 255, 255, 0.9);
                box-shadow: 0 4px 20px rgba(220, 38, 38, 0.08);
                backdrop-filter: blur(15px);
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 1000;
            }
            .header-left {
                display: flex;
                align-items: center;
                gap: 20px;
            }
            .header-logo {
                display: flex;
                align-items: center;
                gap: 10px;
                font-size: 1.6rem;
                font-weight: 900;
                color: #dc2626;
                text-decoration: none;
            }
            .menu-toggle-btn {
                background: none;
                border: none;
                font-size: 1.8rem;
                cursor: pointer;
                border-radius: 8px;
                padding: 4px 10px;
            }
            #mainNavMenu {
                min-width: 140px;
                position: absolute;
                top: 65px;
                left: 32px;
                background: #fff;
                box-shadow: 0 4px 16px rgba(220, 38, 38, 0.13);
                border-radius: 12px;
                padding: 15px;
                display: none;
            }
            .nav-emoji-btn {
                background: none;
                border: none;
                font-size: 1.1rem;
                font-weight: 600;
                margin-bottom: 5px;
                cursor: pointer;
                width: 100%;
                text-align: left;
                padding: 10px;
            }
            .header-right {
                display: flex;
                align-items: center;
                gap: 12px;
            }

            /* --- Avatar & Buttons --- */
            .nickname-avatar {
                width: 38px;
                height: 38px;
                border-radius: 50%;
                background: #222;
                color: #fff;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                font-weight: 700;
                cursor: pointer;
            }
            .current-location {
                font-size: 0.85rem;
                color: #dc2626;
                background: #fff1f1;
                border: 1px solid rgba(220, 38, 38, 0.1);
                border-radius: 10px;
                padding: 8px 14px;
                font-weight: 700;
                cursor: pointer;
            }
            .login-btn {
                padding: 10px 18px;
                background: #dc2626;
                color: #fff;
                border: none;
                border-radius: 10px;
                font-size: 0.9rem;
                font-weight: 700;
                cursor: pointer;
            }

            /* --- 카드 UI 디자인 --- */
            .post-card {
                background: #fff;
                border: 1px solid #f1f1f1;
                border-radius: 20px;
                padding: 24px;
                margin-bottom: 20px;
                list-style: none;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
                cursor: pointer;
                position: relative;
            }
            .post-card:hover {
                transform: translateY(-6px);
                box-shadow: 0 15px 30px rgba(220, 38, 38, 0.1);
                border-color: #ffe5e5;
            }

            /* 공지글 전용 스타일 */
            .post-card.notice-card {
                border: 2px solid #dc2626;
                background: #fff8f8;
                animation: noticeGlow 3s infinite;
            }
            .notice-badge {
                background: #dc2626;
                color: #fff;
                font-size: 0.75rem;
                font-weight: 900;
                padding: 4px 10px;
                border-radius: 8px;
                display: inline-block;
                margin-bottom: 12px;
            }

            .post-title {
                font-size: 1.3rem;
                font-weight: 800;
                color: #1a1a1a;
                text-decoration: none;
                margin-bottom: 12px;
                display: block;
            }
            .post-content-preview {
                color: #555;
                font-size: 1rem;
                line-height: 1.6;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
                margin-bottom: 18px;
            }

            .category-btn {
                flex: 1;
                padding: 12px 0;
                border-radius: 12px;
                text-align: center;
                text-decoration: none;
                font-weight: 700;
                border: 1.5px solid #f0f0f0;
                transition: 0.3s;
                background: #fff;
                color: #999;
            }
            .category-btn.active {
                background: #dc2626;
                color: #fff;
                border-color: #dc2626;
                box-shadow: 0 4px 12px rgba(220, 38, 38, 0.15);
            }

            .sort-btn {
                padding: 8px 20px;
                border-radius: 25px;
                border: none;
                background: #f5f5f5;
                color: #777;
                font-weight: 700;
                font-size: 0.85rem;
                cursor: pointer;
                transition: 0.2s;
            }
            .sort-btn.active {
                background: #222;
                color: #fff;
            }

            .meta-footer {
                display: flex;
                justify-content: flex-end;
                align-items: center;
                gap: 12px;
                font-size: 0.85rem;
                color: #aaa;
                padding-top: 15px;
                border-top: 1px solid #f8f8f8;
            }
        
            /* ===== 반응형 (태블릿/모바일) ===== */
            @media (max-width: 900px) {
                .header {
                    flex-direction: column;
                    padding: 10px 16px;
                    gap: 8px;
                    position: sticky;
                }
                .header-left { width: 100%; justify-content: space-between; }
                .header-center { width: 100%; }
                .header-right { width: 100%; justify-content: flex-end; }
                .menu-bar { display: none; }
                .header-logo { font-size: 1.3rem; }
                .login-btn { padding: 8px 10px; font-size: 0.8rem; }
                .current-location { padding: 6px 8px; font-size: 0.78rem; }
                .nickname-avatar { width: 32px; height: 32px; font-size: 0.85rem; }
                .container, .write-container, .community-wrap {
                    padding: 16px;
                    margin: 10px auto;
                }
                .post-card, .board-card {
                    padding: 14px 12px;
                }
                table { font-size: 0.85rem; }
                th, td { padding: 8px 6px; }
            }
            @media (max-width: 480px) {
                .header { padding: 8px 10px; }
                .header-logo { font-size: 1.1rem; }
                .search-box input { font-size: 0.85rem; }
                body { font-size: 0.95rem; }
                h1 { font-size: 1.4rem; }
                h2 { font-size: 1.2rem; }
                .btn, button[type=submit] { width: 100%; }
            }

        
            /* ===== 햄버거 메뉴 ===== */
            .hamburger-btn {
                display: none;
                background: none;
                border: none;
                font-size: 1.6rem;
                cursor: pointer;
                padding: 4px 8px;
                border-radius: 8px;
                color: #dc2626;
                line-height: 1;
            }
            .hamburger-btn:hover { background: #fff1f1; }
            .mobile-nav {
                display: none;
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.4);
                z-index: 2000;
            }
            .mobile-nav.open { display: block; }
            .mobile-nav-panel {
                position: absolute;
                top: 0; left: 0;
                width: 260px;
                height: 100%;
                max-height: 100vh;
                background: #fff;
                box-shadow: 4px 0 20px rgba(0,0,0,0.15);
                padding: 0;
                display: flex;
                flex-direction: column;
                box-sizing: border-box;
            }
            .mobile-nav-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 20px 20px 16px 20px;
                border-bottom: 1px solid #f1f1f1;
                flex-shrink: 0;
            }
            .mobile-nav-logo {
                font-size: 1.4rem;
                font-weight: 900;
                color: #dc2626;
                text-decoration: none;
            }
            .mobile-nav-close {
                background: none;
                border: none;
                font-size: 1.6rem;
                cursor: pointer;
                color: #666;
                padding: 4px;
            }
            .mobile-nav-links {
                padding: 16px 0;
                display: flex;
                flex-direction: column;
                flex: 1;
                overflow-y: auto;
            }
            .mobile-nav-links a, .mobile-nav-links button {
                display: block;
                padding: 14px 24px;
                font-size: 1rem;
                font-weight: 600;
                color: #333;
                text-decoration: none;
                background: none;
                border: none;
                text-align: left;
                cursor: pointer;
                transition: background 0.15s;
            }
            .mobile-nav-links a:hover, .mobile-nav-links button:hover {
                background: #fff1f1;
                color: #dc2626;
            }
            .mobile-nav-divider {
                height: 1px;
                background: #f1f1f1;
                margin: 8px 0;
            }

        
            @media (max-width: 600px) {
                .search-write-row {
                    flex-wrap: wrap !important;
                }
                .search-write-row input {
                    width: 100% !important;
                    flex: none !important;
                }
                .search-write-row button {
                    flex: 1;
                }
            }

        </style>
    </head>
    <body>
        <header class="header">
            <div class="header-left">
                <button class="menu-toggle-btn" onclick="openMobileNav()">☰</button>
                <a href="/main" class="header-logo">TasteMate</a>
                <nav id="mainNavMenu">
                    <button class="nav-emoji-btn" onclick="location.href = '/main'">🏠 홈</button>
                    <button class="nav-emoji-btn" onclick="location.href = '/aichat'">🤖 AI추천</button>
                    <button class="nav-emoji-btn" onclick="location.href = '/community'">🧑‍🤝‍🧑 커뮤니티</button>
                </nav>
            </div>
            <div class="header-right" id="headerRightArea">
                <button class="login-btn" onclick="location.href = '/login'">로그인</button>
            </div>
        </header>

        <main style="padding-top: 110px; max-width: 650px; margin: 0 auto; padding-left: 20px; padding-right: 20px">
            <div class="fade-in-card" style="display: flex; gap: 10px; margin-bottom: 40px">
                <a href="/category/solo" class="category-btn">혼밥</a>
                <a href="/category/date" class="category-btn">데이트</a>
                <a href="/category/work" class="category-btn">회식</a>
                <a href="/category/etc" class="category-btn active">기타</a>
            </div>

            <div class="fade-in-card" style="text-align: center; margin-bottom: 40px; animation-delay: 0.1s">
                <h1 style="font-size: 2.2rem; font-weight: 900; color: #dc2626; margin: 0">🍽️ 기타 커뮤니티</h1>
                <p style="color: #b91c1c; font-weight: 500; margin-top: 10px">
                    자유로운 미식 이야기와 다양한 정보를 나누세요
                </p>
            </div>

            <div
                class="fade-in-card"
                class="search-write-row" style="display: flex; gap: 10px; align-items: center; margin-bottom: 30px; animation-delay: 0.2s; flex-wrap: wrap"
            >
                <input
                    id="searchInput"
                    type="text"
                    placeholder="궁금한 정보를 검색해보세요"
                    style="
                        flex: 1;
                        padding: 12px 18px;
                        border-radius: 12px;
                        border: 2px solid #f0f0f0;
                        font-size: 1rem;
                        outline: none;
                    "
                />
                <button
                    id="searchBtn"
                    style="
                        padding: 12px 20px;
                        border-radius: 12px;
                        background: #222;
                        color: #fff;
                        border: none;
                        font-weight: 700;
                        cursor: pointer;
                    "
                >
                    검색
                </button>
                <button
                    onclick="location.href = '/write'"
                    style="
                        padding: 12px 20px;
                        border-radius: 12px;
                        background: #dc2626;
                        color: #fff;
                        border: none;
                        font-weight: 700;
                        cursor: pointer;
                    "
                >
                    ✏️ 글쓰기
                </button>
            </div>

            <div
                class="fade-in-card"
                style="display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; animation-delay: 0.3s"
            >
                <button id="popularBtn" class="sort-btn active">인기순</button>
                <button id="latestBtn" class="sort-btn">최신순</button>
                <button id="commentBtn" class="sort-btn">댓글순</button>
            </div>

            <div id="post-container"></div>
        </main>

        <script>
            let currentSort = 'popular';

            document.addEventListener('DOMContentLoaded', () => {
                const nickname = localStorage.getItem('nickname');
                const isAdmin = localStorage.getItem('is_admin');
                const headerRightArea = document.getElementById('headerRightArea');

                if (nickname && headerRightArea) {
                    const avatarText = nickname.slice(0, 2);
                    let adminBtn =
                        isAdmin === '1'
                            ? `<button class=\"login-btn\" onclick=\"location.href='/admin'\" style=\"background: #222; margin-left:8px;\">관리자 기능</button>`
                            : '';
                    headerRightArea.innerHTML = `
                        <span class=\"nickname-avatar\" onclick=\"location.href='/mypage'\">${avatarText}</span>
                        ${adminBtn}
                        <button class=\"login-btn\" onclick=\"logout()\" style=\"background: #666; margin-left: 8px;\">로그아웃</button>
                        <span class=\"current-location\" id=\"gps-location\" onclick=\"getGPSLocation()\" style=\"margin-left: 8px;\">📍 내 위치</span>
                    `;
                    getGPSLocation();
                }
                loadPosts();
            });

            async function loadPosts() {
                const container = document.getElementById('post-container');
                container.innerHTML =
                    '<div style="text-align: center; color: #bbb; padding: 40px;">다양한 이야기들을 불러오는 중...</div>';

                try {
                    const res = await fetch(`/api/posts/ETC/${currentSort}`);
                    let posts = await res.json();

                    if (!posts || posts.length === 0) {
                        container.innerHTML =
                            '<div style="text-align:center; padding:50px; border:2px dashed #eee; border-radius:20px; color:#999;">작성된 게시글이 없습니다.</div>';
                        return;
                    }

                    // [정렬] 공지사항을 항상 최상단으로 배치
                    posts.sort((a, b) => b.is_notice - a.is_notice);

                    container.innerHTML = posts
                        .map(
                            (post, idx) => `
                        <li class="post-card fade-in-card ${post.is_notice == 1 ? 'notice-card' : ''}" 
                            style="animation-delay: ${0.05 * idx}s" 
                            onclick="location.href='/post_detail/${post.id}'">
                            
                            ${post.is_notice == 1 ? '<span class="notice-badge">📢 공지사항</span>' : ''}
                            
                            <span class="post-title" style="${post.is_notice == 1 ? 'color:#dc2626' : ''}">${post.title}</span>
                            <div class="post-content-preview">${post.content}</div>
                            
                            <div class="meta-footer">
                                <span style="color:#dc2626; font-weight:700;">❤️ ${post.like_count || 0}</span>
                                <span style="color:#b91c1c; font-weight:700;">💬 ${post.comment_count || 0}</span>
                                <span style="margin-left:auto; color:#666; font-weight:600;">👤 ${post.nickname || '익명'}</span>
                                <span>${post.created_at || ''}</span>
                            </div>
                        </li>
                    `,
                        )
                        .join('');
                } catch (e) {
                    container.innerHTML =
                        '<div style="text-align:center; color:red; padding:20px;">데이터를 불러오지 못했습니다.</div>';
                }
            }

            function toggleMenu() {
                const menu = document.getElementById('mainNavMenu');
                menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
            }

            const sortBtns = document.querySelectorAll('.sort-btn');
            sortBtns.forEach((btn) => {
                btn.onclick = () => {
                    sortBtns.forEach((b) => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentSort = btn.id.replace('Btn', '');
                    loadPosts();
                };
            });

            function logout() {
                localStorage.clear();
                location.href = '/main';
            }
            function getGPSLocation() {
                /* GPS 로직 생략 */
            }
        </script>
    
    <!-- 모바일 햄버거 메뉴 -->
    <div class="mobile-nav" id="mobileNav" onclick="closeMobileNavOutside(event)">
        <div class="mobile-nav-panel">
            <div class="mobile-nav-header">
                <a href="/main" class="mobile-nav-logo">🍽️ TasteMate</a>
                <button class="mobile-nav-close" onclick="closeMobileNav()">✕</button>
            </div>
            <div class="mobile-nav-links">
                <a href="/main">🏠 홈</a>
                <a href="/aichat">🤖 AI 맛집추천</a>
                <a href="/community">🧑‍🤝‍🧑 커뮤니티</a>
                <div class="mobile-nav-divider"></div>
                <a href="/SOLO">🍚 혼밥</a>
                <a href="/DATE">💑 데이트</a>
                <a href="/WORK">🍻 회식</a>
                <a href="/ETC">🧩 기타</a>
                <div class="mobile-nav-divider"></div>
                <a href="/game/pinball">🎯 핀볼</a>
                <a href="/game/ladder">🪜 사다리타기</a>
                <a href="/game/random_amount">🎰 룰렛 게임</a>
                <a href="/game/worldcup">🏆 음식 월드컵</a>
                <a href="/game/calculator">🧮 계산기</a>
                <div class="mobile-nav-divider"></div>
                <a href="/about">ℹ️ 회사소개</a>
            </div>
        </div>
    </div>

        <script>
            function openMobileNav() {
                document.getElementById('mobileNav').classList.add('open');
                document.body.style.overflow = 'hidden';
            }
            function closeMobileNav() {
                document.getElementById('mobileNav').classList.remove('open');
                document.body.style.overflow = '';
            }
            function closeMobileNavOutside(e) {
                if (e.target === document.getElementById('mobileNav')) closeMobileNav();
            }
        </script>

</body>
</html>

<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>커뮤니티 - TasteMate</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js" defer></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-left">
                <button class="menu-toggle-btn" onclick="toggleMenu()">☰</button>
                <a href="/main" class="header-logo">TasteMate</a>
                <nav id="mainNavMenu">
                    <button class="nav-emoji-btn" onclick="location.href='/main'">🏠 홈</button>
                    <button class="nav-emoji-btn" onclick="location.href='/aichat'">🤖 AI추천</button>
                    <button class="nav-emoji-btn" onclick="location.href='/community'">🧑‍🤝‍🧑 커뮤니티</button>
                </nav>
            </div>
            <div class="header-right" id="headerRightArea"></div>
        </div>
    </header>

    <main style="padding-top: 80px; padding-bottom: 80px;">
        <div class="container">
            <div style="display: flex; gap: 8px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; -ms-overflow-style: none;">
                <button class="community-card" onclick="location.href='/category/solo'" style="flex: 1; min-width: 80px; padding: 10px; border-radius: 10px;">🍱 혼밥</button>
                <button class="community-card" onclick="location.href='/category/date'" style="flex: 1; min-width: 80px; padding: 10px; border-radius: 10px;">💑 데이트</button>
                <button class="community-card" onclick="location.href='/category/work'" style="flex: 1; min-width: 80px; padding: 10px; border-radius: 10px;">🍻 회식</button>
                <button class="community-card" onclick="location.href='/category/etc'" style="flex: 1; min-width: 80px; padding: 10px; border-radius: 10px;">✨ 기타</button>
            </div>

            <div class="main-title" style="text-align: left; margin: 20px 0 10px 0; font-size: 1.8rem;">🍱 혼밥 커뮤니티</div>
            <p style="color: #b91c1c; margin-bottom: 20px; font-size: 0.9rem;">혼자서도 즐거운 맛집 탐방기를 공유해 주세요!</p>

            <div id="post-container" class="post-list">
                <p style="text-align: center; color: #999; padding: 40px 0;">게시글을 불러오는 중입니다...</p>
            </div>

            <button class="main-btn" onclick="location.href='/write'" style="position: fixed; bottom: 20px; right: 20px; width: auto; padding: 12px 24px; border-radius: 30px; font-size: 1rem; box-shadow: 0 4px 15px var(--shadow-deep); z-index: 999;">
                ✍️ 글쓰기
            </button>
        </div>
    </main>

    <script>
        // 현재 페이지의 카테고리 (예: SOLO, DATE, WORK, ETC)
        const CURRENT_CATEGORY = "ETC"; 

        async function loadPosts() {
            try {
                const res = await fetch(`/api/posts/${CURRENT_CATEGORY}`);
                const posts = await res.json();
                const container = document.getElementById('post-container');

                if (!posts || posts.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 50px 0; color: #999;">아직 등록된 게시글이 없습니다.</div>';
                    return;
                }

                container.innerHTML = posts.map(post => `
                    <div class="community-card" onclick="location.href='/post/${post.id}'" style="text-align: left; padding: 20px; margin-bottom: 15px; cursor: pointer;">
                        <div style="font-weight: 800; color: var(--main-red); font-size: 1.1rem; margin-bottom: 8px;">${post.title}</div>
                        <p style="font-size: 0.9rem; color: #444; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${post.content}</p>
                        <div style="display: flex; justify-content: space-between; font-size: 0.8rem; color: #888;">
                            <span>👤 ${post.author}</span>
                            <span>📅 ${post.date}</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('post-container').innerHTML = '<p style="text-align: center; color: var(--main-red);">데이터 로드 실패</p>';
            }
        }
        window.onload = loadPosts;
    </script>
</body>
</html>

<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>테이스트메이트 - 핀볼 서바이벌 Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- TasteMate 브랜드 스타일 변수 --- */
        :root {
            --primary-color: #dc2626;
            --primary-hover: #b91c1c;
            --bg-gradient: linear-gradient(135deg, #fff5f5 0%, #f0f2f5 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
        }

        body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background: var(--bg-gradient); color: #333; min-height: 100vh; overflow-x: hidden; }

        /* --- TasteMate 공식 상단바 (완벽 복구) --- */
        .header {
            display: flex; justify-content: space-between; align-items: center; padding: 16px 32px;
            background: var(--glass-bg); box-shadow: 0 2px 16px rgba(220, 38, 38, 0.1);
            backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 2000; box-sizing: border-box; width: 100%;
        }
        .header-left { display: flex; align-items: center; gap: 24px; }
        .header-logo { display: flex; align-items: center; gap: 10px; font-size: 1.5rem; font-weight: 900; color: var(--primary-color); text-decoration: none; }
        .menu-bar { display: flex; gap: 18px; align-items: center; margin-left: 24px; }
        .menu-item { font-size: 1.1rem; font-weight: 700; color: var(--primary-color); text-decoration: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; transition: background 0.18s; }
        .menu-item:hover { background: #fff5f5; }
        
        .game-dropdown { position: relative; }
        .dropdown-content {
            display: none; position: absolute; top: 36px; left: 0; background: #fff; min-width: 140px;
            box-shadow: 0 4px 16px rgba(220, 38, 38, 0.13); border-radius: 12px; padding: 12px 0; z-index: 1000; flex-direction: column;
        }
        .game-dropdown:hover .dropdown-content { display: flex; }
        .dropdown-content a { color: var(--primary-color); padding: 10px 24px; text-decoration: none; font-size: 1.05rem; font-weight: 600; border-radius: 8px; transition: background 0.18s; }
        .dropdown-content a:hover { background: #ffe5e5; }

        .header-right { display: flex; align-items: center; gap: 10px; }
        .login-btn { padding: 8px 16px; color: #fff; border: none; border-radius: 6px; font-size: 0.95rem; font-weight: bold; cursor: pointer; background: var(--primary-color); transition: background 0.2s; }

        /* --- 게임 메인 영역 --- */
        .game-main { text-align: center; padding: 40px 20px 80px; }
        .setup { background: white; padding: 40px; border-radius: 32px; display: inline-block; box-shadow: 0 16px 64px rgba(220, 38, 38, 0.15); max-width: 700px; border: 2px solid var(--primary-color); }
        .setup h2 { color: var(--primary-color); margin-bottom: 20px; font-weight: 900; }
        
        canvas { background: #1a1a1a; border-radius: 24px; cursor: crosshair; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3); margin: 32px auto; border: 6px solid #333; display: block; }

        .action-btn { background: var(--primary-color); color: white; border: none; padding: 12px 28px; border-radius: 12px; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(220, 38, 38, 0.3); }

        #resultOverlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 245, 245, 0.98); color: var(--primary-color); padding: 40px 60px;
            border-radius: 30px; font-weight: 900; display: none; z-index: 100;
            box-shadow: 0 0 50px rgba(220,38,38,0.25); pointer-events: none; text-align: center;
            border: 3px solid var(--primary-color); min-width: 400px; white-space: nowrap;
            animation: popIn 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.49);
        }
        @keyframes popIn { from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        /* --- 히스토리 스타일 --- */
        .history-container {
            margin: 30px auto; background: white; padding: 25px; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: left; max-width: 440px;
        }
        .history-title { font-weight: 900; color: #444; margin-bottom: 15px; font-size: 1.1rem; border-left: 4px solid var(--primary-color); padding-left: 10px; }
        .history-list { display: flex; flex-wrap: wrap; gap: 8px; list-style: none; padding: 0; margin: 0; }
        .history-item { background: #fff5f5; border: 1px solid #ffebeb; padding: 6px 14px; border-radius: 10px; font-weight: 700; color: var(--primary-color); font-size: 0.95rem; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .badge { background: var(--primary-color); color: white; padding: 2px 10px; border-radius: 6px; font-size: 0.9rem; }
        input { padding: 12px; border: 2px solid #ddd; border-radius: 12px; margin: 5px; text-align: center; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <a href="/main" class="header-logo">TasteMate</a>
            <nav class="menu-bar">
                <a class="menu-item" href="/aichat">AI추천</a>
                <a class="menu-item" href="/community">커뮤니티</a>
                <div class="menu-item game-dropdown">
                    <span>게임 ▾</span>
                    <div class="dropdown-content">
                        <a href="/game/pinball">핀볼</a>
                        <a href="/game/ladder">사다리타기</a>
                        <a href="/game/random_amount">룰렛 게임</a>
                        <a href="/game/worldcup">음식 월드컵</a>
                    </div>
                </div>
            </nav>
        </div>
        <div class="header-right">
            <button class="login-btn" onclick="location.href = '/login'">로그인</button>
        </div>
    </header>

    <main class="game-main">
        <div class="setup" id="setupBox">
            <h2>⚽ 서바이벌 핀볼</h2>
            <p style="color:#666; font-size:0.95rem;">당첨된 칸은 히스토리에 기록되고 자동으로 빠집니다.</p>
            <div style="margin-bottom: 20px;">
                항목 개수: <input type="number" id="itemCount" value="5" min="2" max="10" />
                <button class="action-btn" onclick="initInputs()">칸 생성</button>
            </div>
            <div id="item-inputs"></div>
        </div>

        <div id="game-container" style="display: none; position: relative; width: fit-content; margin: 0 auto;">
            <p style="font-weight:bold;">남은 항목: <span id="remCount" class="badge">0</span></p>
            <div id="resultOverlay"></div>
            <canvas id="pinballCanvas"></canvas>
            
            <div class="history-container">
                <div class="history-title">📝 당첨 히스토리</div>
                <ul class="history-list" id="historyList"></ul>
            </div>

            <button class="action-btn" onclick="location.reload()" style="background:#666;">전체 리셋</button>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('pinballCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('resultOverlay');
        const historyList = document.getElementById('historyList');
        
        let pegs = [];
        let slots = [];
        let winHistoryCount = 0;
        let ball = { x: 0, y: 0, vx: 0, vy: 0, active: false, trail: [] };
        const gravity = 0.38;
        const friction = 0.985;

        function initInputs() {
            const n = document.getElementById('itemCount').value;
            const inputDiv = document.getElementById('item-inputs');
            inputDiv.innerHTML = '';
            for (let i = 0; i < n; i++) {
                inputDiv.innerHTML += `<input type="text" class="slot-val" value="벌칙 ${i + 1}"> `;
            }
            inputDiv.innerHTML += `<br><br><button class="action-btn" onclick="startGame()">게임 시작</button>`;
        }

        function startGame() {
            slots = Array.from(document.querySelectorAll('.slot-val')).map(i => i.value);
            canvas.width = 440; canvas.height = 600;
            document.getElementById('setupBox').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            createPegs(); updateUI(); animate();
        }

        function createPegs() {
            pegs = [];
            for (let r = 0; r < 8; r++) {
                const cols = r % 2 === 0 ? 7 : 8;
                const spacing = canvas.width / (cols + 1);
                for (let c = 0; c < cols; c++) {
                    pegs.push({ x: spacing * (c + 1), y: 120 + r * 50, r: 6, hit: 0 });
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const slotWidth = canvas.width / slots.length;
            slots.forEach((text, i) => {
                ctx.fillStyle = i % 2 === 0 ? '#2a2a2a' : '#333';
                ctx.fillRect(i * slotWidth, canvas.height - 70, slotWidth, 70);
                ctx.strokeStyle = '#dc2626';
                ctx.strokeRect(i * slotWidth, canvas.height - 70, slotWidth, 70);
                ctx.fillStyle = '#fff'; ctx.font = 'bold 12px Noto Sans KR'; ctx.textAlign = 'center';
                ctx.fillText(text.length > 6 ? text.substring(0,5)+'..' : text, i * slotWidth + slotWidth/2, canvas.height - 30);
            });
            pegs.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = p.hit > 0 ? `rgba(220, 38, 38, ${p.hit})` : '#555';
                ctx.fill(); if(p.hit > 0) p.hit -= 0.05;
            });
            if (ball.active) {
                ball.trail.push({x: ball.x, y: ball.y}); if(ball.trail.length > 10) ball.trail.shift();
                ball.trail.forEach((t, idx) => {
                    ctx.beginPath(); ctx.arc(t.x, t.y, 4+idx, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(220, 38, 38, ${idx/10})`; ctx.fill();
                });
                ctx.beginPath(); ctx.arc(ball.x, ball.y, 10, 0, Math.PI*2);
                ctx.fillStyle = '#dc2626'; ctx.fill();
            }
        }

        function updateBall() {
            if (!ball.active) return;
            ball.vy += gravity; ball.vx *= friction; ball.x += ball.vx; ball.y += ball.vy;
            if (ball.x < 12 || ball.x > canvas.width - 12) { ball.vx *= -0.7; ball.x = ball.x < 12 ? 12 : canvas.width-12; }
            pegs.forEach(p => {
                const dx = ball.x - p.x, dy = ball.y - p.y, dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 10 + p.r) {
                    p.hit = 1.0; const angle = Math.atan2(dy, dx);
                    ball.vx = Math.cos(angle)*Math.abs(ball.vy)*1.1 + (Math.random()-0.5);
                    ball.vy = Math.sin(angle)*Math.abs(ball.vy)*1.1;
                    ball.x = p.x + Math.cos(angle)*(11+p.r); ball.y = p.y + Math.sin(angle)*(11+p.r);
                }
            });
            if (ball.y > canvas.height - 45) {
                ball.active = false;
                const winIdx = Math.floor(ball.x / (canvas.width / slots.length));
                handleWin(winIdx);
            }
        }

        function handleWin(idx) {
            const winnerText = slots[idx];
            addHistory(winnerText);
            
            overlay.innerHTML = `<div style="font-size: 1.5rem; opacity: 0.8;">🎊 당첨! 🎊</div><div style="font-size:3rem; margin-top:10px;">${winnerText}</div>`;
            overlay.style.display = 'block';
            
            setTimeout(() => {
                slots.splice(idx, 1);
                overlay.style.display = 'none';
                updateUI();
                
                // 마지막 1개 남으면 자동 당첨
                if (slots.length === 1) {
                    setTimeout(() => {
                        const lastOne = slots[0];
                        addHistory(lastOne);
                        overlay.innerHTML = `<div style="font-size: 1.2rem;">마지막 항목 자동 당첨!</div><div style="font-size:2.5rem; margin-top:10px;">${lastOne}</div><hr style="border:none; border-top:1px solid #ddd; margin:15px 0;"><div style="font-size:1.6rem;">🚩 모든 항목 당첨 완료!</div>`;
                        slots = [];
                        overlay.style.display = 'block';
                        updateUI();
                    }, 800);
                }
            }, 1800);
        }

        function addHistory(text) {
            winHistoryCount++;
            const li = document.createElement('li');
            li.className = 'history-item';
            li.innerText = `${winHistoryCount}. ${text}`;
            historyList.appendChild(li);
        }

        function updateUI() {
            document.getElementById('remCount').innerText = slots.length;
        }

        function animate() { updateBall(); draw(); requestAnimationFrame(animate); }

        canvas.onclick = function (e) {
            if (ball.active || overlay.style.display === 'block' || slots.length <= 1) return;
            const rect = canvas.getBoundingClientRect();
            ball.x = (e.clientX - rect.left) * (canvas.width / rect.width);
            ball.y = 40; ball.vx = (Math.random() - 0.5) * 5; ball.vy = 2;
            ball.trail = []; ball.active = true;
        };
    </script>
</body>
</html>

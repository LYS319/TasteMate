<!doctype html>
<html lang="ko">
    <head>
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                const dropdown = document.querySelector('.game-dropdown');
                const content = dropdown?.querySelector('.dropdown-content');
                let dropdownTimer = null;
                if (dropdown && content) {
                    dropdown.addEventListener('mouseenter', () => {
                        clearTimeout(dropdownTimer);
                        content.style.display = 'block';
                    });
                    dropdown.addEventListener('mouseleave', () => {
                        dropdownTimer = setTimeout(() => {
                            content.style.display = 'none';
                        }, 120);
                    });
                    content.addEventListener('mouseenter', () => {
                        clearTimeout(dropdownTimer);
                        content.style.display = 'block';
                    });
                    content.addEventListener('mouseleave', () => {
                        dropdownTimer = setTimeout(() => {
                            content.style.display = 'none';
                        }, 120);
                    });
                }
            });
        </script>
        <script>
            if (window.top !== window.self) {
                window.top.location.href = window.self.location.href;
            }
        </script>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>테이스트메이트 - 핀볼 서바이벌 Pro</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="/static/css/header.css" />
        <style>
            :root {
                --primary-color: #dc2626;
                --primary-hover: #b91c1c;
                --bg-gradient: linear-gradient(135deg, #fdfdfd 0%, #f1f1f1 100%);
                --pinball-bg: radial-gradient(circle at center, #2d2d44 0%, #1a1a2e 100%);
            }
            body {
                margin: 0;
                font-family: 'Noto Sans KR', sans-serif;
                background: var(--bg-gradient);
                color: #333;
                min-height: 100vh;
            }

            .game-main {
                padding: 160px 10px 40px;
            }
            .main-layout-container {
                display: flex;
                justify-content: center;
                align-items: flex-start;
                gap: 20px;
                max-width: 1200px;
                margin: 0 auto;
            }
            .worldcup-container {
                flex: 1;
                max-width: 700px;
                text-align: center;
                background: white;
                padding: 40px;
                border-radius: 32px;
                border: 2px solid var(--primary-color);
                box-shadow: 0 16px 64px rgba(220, 38, 38, 0.15);
            }
            canvas {
                background: var(--pinball-bg);
                border-radius: 25px;
                cursor: crosshair;
                box-shadow:
                    0 20px 50px rgba(0, 0, 0, 0.3),
                    inset 0 0 60px rgba(0, 0, 0, 0.5);
                margin: 20px auto;
                border: 10px solid #2d2d3a;
                display: block;
                max-width: 100%;
            }
            .badge {
                background: var(--primary-color);
                color: white;
                padding: 6px 15px;
                border-radius: 10px;
                font-size: 1.2rem;
                font-weight: 900;
                display: inline-block;
                margin-bottom: 15px;
            }
            .action-btn {
                background: var(--primary-color);
                color: white;
                border: none;
                padding: 14px 40px;
                border-radius: 12px;
                font-size: 1.1rem;
                font-weight: 900;
                cursor: pointer;
                transition: 0.2s;
            }
            .action-btn:hover {
                transform: scale(1.05);
                background: var(--primary-hover);
            }
            input {
                padding: 12px;
                border-radius: 10px;
                border: 1px solid #ddd;
                margin: 5px;
                text-align: center;
            }
            #resultOverlay {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(255, 255, 255, 0.98);
                color: var(--primary-color);
                padding: 30px 50px;
                border-radius: 25px;
                display: none;
                z-index: 100;
                border: 3px solid var(--primary-color);
                text-align: center;
                box-shadow: 0 0 50px rgba(0, 0, 0, 0.3);
            }
            .history-container {
                margin-top: 25px;
                text-align: left;
                padding: 20px;
                background: #fffafa;
                border-radius: 15px;
            }
            .history-item {
                background: #fff;
                border: 1px solid #eee;
                padding: 6px 12px;
                border-radius: 8px;
                font-weight: 700;
                color: #333;
                margin: 3px;
                display: inline-block;
                font-size: 0.9rem;
            }
            @media (max-width: 700px) {
                canvas {
                    width: 100% !important;
                    height: auto !important;
                    max-width: 100vw;
                }
            }
            @media (max-width: 900px) {
                .game-main {
                    padding-top: 80px !important;
                }
            }

            .side-ad {
                position: fixed;
                top: 150px;
                width: 160px;
                height: 600px;
                background: #f4f4f4;
                border: 1px solid #ddd;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #999;
                font-weight: bold;
                z-index: 100;
                border-radius: 10px;
                font-size: 0.85rem;
                text-align: center;
                padding: 8px;
                box-sizing: border-box;
            }
            .ad-left {
                left: 20px;
            }
            .ad-right {
                right: 20px;
            }
            .mobile-top-ad {
                display: none;
                position: fixed;
                top: 100px;
                left: 0;
                right: 0;
                height: 55px;
                background: #f4f4f4;
                border-bottom: 1px solid #ddd;
                align-items: center;
                justify-content: center;
                color: #999;
                font-weight: bold;
                font-size: 0.9rem;
                z-index: 100;
                pointer-events: none;
            }
            @media (max-width: 1200px) {
                .side-ad {
                    display: none;
                }
            }
            @media (max-width: 900px) {
                .mobile-top-ad {
                    display: flex;
                }
            }
        </style>

                    <a class="menu-item" href="/community">커뮤니티</a>

                        <div class="dropdown-content">

        <main class="game-main">
            <div class="side-ad ad-left">광고 영역 (좌)</div>
            <div class="side-ad ad-right">광고 영역 (우)</div>
            <div class="mobile-top-ad">📢 광고 영역 (모바일)</div>
            <div class="main-layout-container">
                <div class="worldcup-container">
                    <div id="setupBox">
                        <h2 style="font-weight: 900; font-size: 2rem; color: var(--primary-color); margin-top: 0">
                            ⚽ 서바이벌 핀볼
                        </h2>
                        <p style="color: #666; margin-bottom: 25px">
                            항목을 입력하고 캔버스를 클릭해 공을 떨어뜨리세요!
                        </p>
                        <div style="margin-bottom: 20px">
                            <input type="number" id="itemCount" value="5" min="2" max="10" style="width: 60px" />
                            <button
                                class="action-btn"
                                onclick="initInputs()"
                                style="padding: 10px 20px; font-size: 1rem"
                            >
                                칸 생성
                            </button>
                        </div>
                        <div id="item-inputs"></div>
                    </div>
                    <div id="game-container" style="display: none; position: relative">
                        <div id="resultOverlay"></div>
                        <div style="margin-bottom: 10px">
                            <span style="font-weight: 800; font-size: 1.1rem">남은 항목:</span>
                            <span id="remCount" class="badge">0</span>
                        </div>
                        <canvas id="pinballCanvas"></canvas>
                        <div class="history-container">
                            <div style="font-weight: 900; margin-bottom: 10px">📝 당첨 히스토리</div>
                            <div id="historyList"></div>
                        </div>
                        <button
                            class="action-btn"
                            onclick="location.reload()"
                            style="background: #666; margin-top: 20px; font-size: 0.9rem"
                        >
                            초기화
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <script>
            function logout() {
                localStorage.clear();
                alert('안전하게 로그아웃 되었습니다.');
                window.location.href = '/main';
            }
            function getGPSLocation() {
                const locSpan = document.getElementById('gps-location');
                if (!locSpan) return;
                if (navigator.geolocation) {
                    locSpan.innerText = '📍 위치 찾는 중...';
                    navigator.geolocation.getCurrentPosition(
                        async (pos) => {
                            try {
                                const res = await fetch(
                                    `/api/reverse-geocode?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`,
                                );
                                const data = await res.json();
                                locSpan.innerText = `📍 ${data.address.city || data.address.province || '위치 확인됨'}`;
                            } catch (e) {
                                locSpan.innerText = '📍 위치 확인됨';
                            }
                        },
                        () => {
                            locSpan.innerText = '📍 위치 거부됨';
                        },
                    );
                }
            }

            const canvas = document.getElementById('pinballCanvas');
            const ctx = canvas.getContext('2d');
            const overlay = document.getElementById('resultOverlay');
            const historyList = document.getElementById('historyList');
            let pegs = [],
                slots = [],
                winHistoryCount = 0;
            let ball = { x: 0, y: 0, vx: 0, vy: 0, active: false, trail: [] };
            const gravity = 0.45,
                friction = 0.985;

            function initInputs() {
                const n = document.getElementById('itemCount').value;
                const inputDiv = document.getElementById('item-inputs');
                inputDiv.innerHTML = '';
                for (let i = 0; i < n; i++) {
                    inputDiv.innerHTML += `<input type="text" class="slot-val" placeholder="항목 ${i + 1}" value="벌칙 ${i + 1}" style="width: 110px;">`;
                }
                inputDiv.innerHTML += `<div style="margin-top: 15px;"><button class="action-btn" onclick="startGame()">게임 시작</button></div>`;
            }

            function startGame() {
                slots = Array.from(document.querySelectorAll('.slot-val')).map((i) => i.value || '미지정');
                canvas.width = 460;
                canvas.height = 580;
                document.getElementById('setupBox').style.display = 'none';
                document.getElementById('game-container').style.display = 'block';
                createPegs();
                updateUI();
                animate();
            }

            function createPegs() {
                pegs = [];
                for (let r = 0; r < 8; r++) {
                    const cols = r % 2 === 0 ? 7 : 8;
                    const spacing = canvas.width / (cols + 1);
                    for (let c = 0; c < cols; c++) {
                        pegs.push({ x: spacing * (c + 1), y: 110 + r * 50, r: 6, hit: 0 });
                    }
                }
            }

            function draw() {
                let bgGrad = ctx.createRadialGradient(
                    canvas.width / 2,
                    canvas.height / 2,
                    50,
                    canvas.width / 2,
                    canvas.height / 2,
                    400,
                );
                bgGrad.addColorStop(0, '#2d2d44');
                bgGrad.addColorStop(1, '#131325');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                const slotWidth = canvas.width / slots.length;
                slots.forEach((text, i) => {
                    ctx.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.05)' : 'rgba(255,255,255,0.1)';
                    ctx.fillRect(i * slotWidth, canvas.height - 80, slotWidth, 80);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 13px Noto Sans KR';
                    ctx.textAlign = 'center';
                    ctx.fillText(
                        text.length > 5 ? text.substring(0, 4) + '..' : text,
                        i * slotWidth + slotWidth / 2,
                        canvas.height - 35,
                    );
                });
                pegs.forEach((p) => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = p.hit > 0 ? '#ff3e3e' : '#6366f1';
                    ctx.shadowBlur = p.hit > 0 ? 15 : 0;
                    ctx.shadowColor = '#ff0000';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    if (p.hit > 0) p.hit -= 0.05;
                });
                if (ball.active) {
                    ball.trail.push({ x: ball.x, y: ball.y });
                    if (ball.trail.length > 12) ball.trail.shift();
                    ball.trail.forEach((t, idx) => {
                        ctx.beginPath();
                        ctx.arc(t.x, t.y, 2 + idx / 2, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(220, 38, 38, ${idx / 20})`;
                        ctx.fill();
                    });
                    ctx.beginPath();
                    ctx.arc(ball.x, ball.y, 11, 0, Math.PI * 2);
                    ctx.fillStyle = '#ff4d4d';
                    ctx.fill();
                }
            }

            function updateBall() {
                if (!ball.active) return;
                ball.vy += gravity;
                ball.vx *= friction;
                ball.x += ball.vx;
                ball.y += ball.vy;
                if (ball.x < 15 || ball.x > canvas.width - 15) {
                    ball.vx *= -0.7;
                    ball.x = ball.x < 15 ? 15 : canvas.width - 15;
                }
                pegs.forEach((p) => {
                    const dx = ball.x - p.x,
                        dy = ball.y - p.y,
                        dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 11 + p.r) {
                        p.hit = 1.0;
                        const angle = Math.atan2(dy, dx);
                        const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
                        ball.vx = Math.cos(angle) * speed * 0.85 + (Math.random() - 0.5) * 2;
                        ball.vy = Math.sin(angle) * speed * 0.85;
                        ball.x = p.x + Math.cos(angle) * (12 + p.r);
                        ball.y = p.y + Math.sin(angle) * (12 + p.r);
                    }
                });
                if (ball.y > canvas.height - 40) {
                    ball.active = false;
                    handleWin(Math.min(Math.floor(ball.x / (canvas.width / slots.length)), slots.length - 1));
                }
            }

            function handleWin(idx) {
                const winnerText = slots[idx];
                winHistoryCount++;
                const item = document.createElement('span');
                item.className = 'history-item';
                item.innerText = `${winHistoryCount}. ${winnerText}`;
                historyList.appendChild(item);
                overlay.innerHTML = `<div style="font-size: 1.2rem; color: #666;">당첨!</div><div style="font-size:2.8rem; font-weight: 900; margin-top:8px;">${winnerText}</div>`;
                overlay.style.display = 'block';
                setTimeout(() => {
                    slots.splice(idx, 1);
                    overlay.style.display = 'none';
                    updateUI();
                    if (slots.length === 1) {
                        setTimeout(() => {
                            overlay.innerHTML = `<div style="font-size: 1.1rem;">마지막 항목</div><div style="font-size:2.5rem; font-weight:900; margin-top:8px;">${slots[0]}</div>`;
                            overlay.style.display = 'block';
                        }, 500);
                    }
                }, 2000);
            }

            function updateUI() {
                const el = document.getElementById('remCount');
                if (el) el.innerText = slots.length;
            }
            function animate() {
                updateBall();
                draw();
                requestAnimationFrame(animate);
            }

            canvas.onclick = function (e) {
                if (ball.active || overlay.style.display === 'block' || slots.length <= 1) return;
                const rect = canvas.getBoundingClientRect();
                ball.x = (e.clientX - rect.left) * (canvas.width / rect.width);
                ball.y = 40;
                ball.vx = (Math.random() - 0.5) * 8;
                ball.vy = 2;
                ball.trail = [];
                ball.active = true;
            };

            document.addEventListener('DOMContentLoaded', () => {
                const nickname = localStorage.getItem('nickname');
                const isAdmin = localStorage.getItem('is_admin');
                const headerRightArea = document.getElementById('headerRightArea');
                if (nickname && headerRightArea) {
                    let adminButton =
                        isAdmin == '1'
                            ? `<button class="login-btn" onclick="location.href='/admin'" style="background: #2c3e50; margin-left:8px;">⚙️ 관리자</button>`
                            : '';
                    headerRightArea.innerHTML = `<span class="nickname-avatar" id="nicknameAvatar" onclick="location.href='/mypage'">${nickname.slice(0, 2)}</span>${adminButton}<button class="login-btn" onclick="logout()" style="background: #666; margin-left:8px;">로그아웃</button><span class="current-location" id="gps-location" onclick="getGPSLocation()">📍 내 위치</span>`;
                    getGPSLocation && getGPSLocation();
                } else if (headerRightArea) {
                    headerRightArea.innerHTML = `<button class="login-btn" onclick="location.href='/login'">로그인</button><button class="login-btn" style="background:#fff;color:#dc2626;border:1px solid #dc2626" onclick="location.href='/signup'">회원가입</button>`;
                }
            });
        </script>

                    <a href="/game/pinball">🎯 핀볼</a><a href="/game/ladder">🪜 사다리타기</a

        <script>
            function openMobileNav() {
                document.getElementById('mobileNav').classList.add('open');
                document.body.style.overflow = 'hidden';
            }
            function closeMobileNav() {
                document.getElementById('mobileNav').classList.remove('open');
                document.body.style.overflow = '';
            }
            function closeMobileNavOutside(e) {
                if (e.target === document.getElementById('mobileNav')) closeMobileNav();
            }
        </script>

<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>테이스트메이트 - 핀볼 술게임</title>
        <style>
            /* --- TasteMate 메인 스타일 이식 --- */
            body {
                margin: 0;
                font-family: 'Noto Sans KR', sans-serif;
                background: #fff;
            }
            .header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 16px 32px;
                background: rgba(255, 255, 255, 0.85);
                box-shadow: 0 2px 16px rgba(220, 38, 38, 0.1);
                backdrop-filter: blur(12px);
                position: sticky;
                top: 0;
                z-index: 2000;
            }
            .header-left {
                display: flex;
                align-items: center;
                gap: 24px;
            }
            .header-logo {
                display: flex;
                align-items: center;
                gap: 18px;
                font-size: 1.5rem;
                font-weight: bold;
                color: #dc2626;
                text-decoration: none;
            }
            .game-btn {
                margin-left: 8px;
                padding: 6px 18px;
                background: #fff5f5;
                color: #dc2626;
                border: 1.5px solid #dc2626;
                border-radius: 8px;
                font-size: 1rem;
                font-weight: 700;
                cursor: pointer;
                transition: background 0.18s;
            }
            .game-btn:hover {
                background: #ffe5e5;
            }
            .menu-toggle-btn {
                background: none;
                border: none;
                font-size: 2.1rem;
                margin-left: 8px;
                cursor: pointer;
                border-radius: 8px;
                padding: 4px 12px;
                transition: background 0.18s;
            }
            .menu-toggle-btn:hover {
                background: #ffe5e5;
            }
            #mainNavMenu {
                min-width: 140px;
                animation: fadeInMenu 0.18s;
                position: absolute;
                top: 60px;
                left: 32px;
                background: #fff;
                box-shadow: 0 4px 16px rgba(220, 38, 38, 0.13);
                border-radius: 12px;
                padding: 18px 24px 14px 24px;
                z-index: 1000;
                display: none;
            }
            @keyframes fadeInMenu {
                from {
                    opacity: 0;
                    transform: translateY(-10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .nav-emoji-btn {
                background: none;
                border: none;
                font-size: 1.7rem;
                margin: 0 2px;
                cursor: pointer;
                border-radius: 8px;
                padding: 4px 10px;
                transition: background 0.18s;
            }
            .nav-emoji-btn:hover {
                background: #ffe5e5;
            }
            .header-right {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .login-btn {
                padding: 8px 16px;
                color: #fff;
                border: none;
                border-radius: 6px;
                font-size: 0.95rem;
                font-weight: bold;
                cursor: pointer;
                transition: background 0.2s;
                background: #dc2626;
            }

            /* --- 기존 핀볼 스타일 유지 및 최적화 --- */
            .game-main {
                text-align: center;
                background: linear-gradient(135deg, #fff5f5 0%, #f0f2f5 100%);
                padding-top: 40px;
                padding-bottom: 80px;
                min-height: calc(100vh - 80px);
            }
            .setup {
                background: linear-gradient(135deg, #fff 60%, #ffe5e5 100%);
                padding: 56px 48px;
                border-radius: 32px;
                display: inline-block;
                box-shadow: 0 16px 64px rgba(220, 38, 38, 0.22);
                max-width: 700px;
                min-width: 420px;
                border: 2px solid #dc2626;
                position: relative;
            }
            .setup h2 {
                font-size: 2.2rem;
                color: #dc2626;
                margin-bottom: 24px;
                letter-spacing: 1px;
                font-weight: 900;
                text-shadow: 0 2px 12px #ffe5e5;
            }
            canvas {
                background: linear-gradient(135deg, #222 60%, #444 100%);
                border-radius: 24px;
                cursor: crosshair;
                box-shadow: 0 12px 48px rgba(220, 38, 38, 0.18);
                margin: 32px auto;
                border: 4px solid #dc2626;
                display: block;
                transition: box-shadow 0.2s;
            }
            input {
                padding: 12px 20px;
                width: 140px;
                border: 2px solid #dc2626;
                border-radius: 12px;
                font-size: 1.1rem;
                margin: 6px;
                text-align: center;
            }
            .action-btn {
                background: linear-gradient(135deg, #fff5f5 0%, #ffe5e5 100%);
                color: #dc2626;
                border: 2.5px solid #dc2626;
                padding: 10px 25px;
                border-radius: 12px;
                font-size: 1.1rem;
                font-weight: 800;
                cursor: pointer;
                transition: all 0.18s;
            }
            .action-btn:hover {
                background: #ffe5e5;
                transform: translateY(-2px);
            }
        </style>
        <script>
            function toggleMenu() {
                const menu = document.getElementById('mainNavMenu');
                menu.style.display = menu.style.display === 'none' || menu.style.display === '' ? 'block' : 'none';
            }
        </script>
    </head>
    <body>
        <header class="header">
            <div class="header-left">
                <button class="menu-toggle-btn" aria-label="메뉴 열기" onclick="toggleMenu()">☰</button>
                <a href="/main" class="header-logo">TasteMate</a>
                <div style="display: flex; gap: 8px; align-items: center">
                    <button class="game-btn" onclick="location.href = '/game/ideal'">메뉴 월드컵</button>
                    <button class="game-btn" onclick="location.href = '/game/pinball'">핀볼</button>
                    <button class="game-btn" onclick="location.href = '/game/ladder'">사다리타기</button>
                    <button class="game-btn" onclick="location.href = '/game/random-amount'">룰렛 게임</button>
                </div>
                <nav class="main-nav" id="mainNavMenu">
                    <button class="nav-emoji-btn" onclick="location.href = '/main'" title="홈">🏠 홈</button><br />
                    <button class="nav-emoji-btn" onclick="location.href = '/aichat'" title="AI추천">🤖 AI추천</button
                    ><br />
                    <button class="nav-emoji-btn" onclick="location.href = '/community'" title="커뮤니티">
                        🧑‍🤝‍🧑 커뮤니티
                    </button>
                </nav>
            </div>
            <div class="header-right">
                <button class="login-btn" onclick="location.href = '/login'">로그인</button>
                <button
                    class="login-btn"
                    style="background: #fff; color: #dc2626; border: 1px solid #dc2626"
                    onclick="location.href = '/signup'"
                >
                    회원가입
                </button>
            </div>
        </header>

        <main class="game-main">
            <div class="setup">
                <h2>⚽ 핀볼 술게임</h2>
                항목 수: <input type="number" id="itemCount" value="4" min="2" max="8" />
                <button class="action-btn" onclick="initGame()">게임 생성</button>
                <div id="item-inputs" style="margin-top: 15px"></div>
            </div>

            <div id="game-container" style="display: none">
                <p style="margin-top: 20px; color: #666">
                    상단의 원하는 위치를 <strong>클릭</strong>해서 공을 떨어뜨리세요!
                </p>
                <canvas id="pinballCanvas"></canvas>
            </div>
        </main>

        <script>
            const canvas = document.getElementById('pinballCanvas');
            const ctx = canvas.getContext('2d');
            let pegs = [];
            let slots = [];
            let ball = { x: 0, y: 0, vx: 0, vy: 0, active: false };
            const gravity = 0.25;

            function initGame() {
                const n = document.getElementById('itemCount').value;
                const inputDiv = document.getElementById('item-inputs');
                inputDiv.innerHTML = '';
                for (let i = 0; i < n; i++) {
                    inputDiv.innerHTML += `<input type="text" class="slot-val" placeholder="벌칙 ${i + 1}" value="벌칙${i + 1}"> `;
                }
                inputDiv.innerHTML += `<br><button class="action-btn" style="margin-top:15px; background:#dc2626; color:white;" onclick="setupCanvas()">시작하기</button>`;
            }

            function setupCanvas() {
                const slotInputs = document.querySelectorAll('.slot-val');
                slots = Array.from(slotInputs).map((i) => i.value);
                canvas.width = 400;
                canvas.height = 500;
                document.getElementById('game-container').style.display = 'block';
                pegs = [];
                const rows = 6;
                for (let r = 0; r < rows; r++) {
                    const cols = r % 2 === 0 ? 6 : 5;
                    for (let c = 0; c < cols; c++) {
                        pegs.push({
                            x: (canvas.width / (cols + 1)) * (c + 1),
                            y: 100 + r * 55,
                            r: 5,
                        });
                    }
                }
                draw();
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                pegs.forEach((peg) => {
                    ctx.beginPath();
                    ctx.arc(peg.x, peg.y, peg.r, 0, Math.PI * 2);
                    ctx.fill();
                });
                const slotWidth = canvas.width / slots.length;
                ctx.strokeStyle = '#666';
                ctx.fillStyle = '#fffa65';
                ctx.font = 'bold 13px sans-serif';
                ctx.textAlign = 'center';
                slots.forEach((text, i) => {
                    const x = i * slotWidth;
                    ctx.strokeRect(x, canvas.height - 60, slotWidth, 60);
                    ctx.fillText(text, x + slotWidth / 2, canvas.height - 25);
                });
                if (ball.active) {
                    ctx.fillStyle = '#dc2626';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#dc2626';
                    ctx.beginPath();
                    ctx.arc(ball.x, ball.y, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    updateBall();
                }
                requestAnimationFrame(draw);
            }

            function updateBall() {
                ball.vy += gravity;
                ball.x += ball.vx;
                ball.y += ball.vy;
                if (ball.x < 8 || ball.x > canvas.width - 8) {
                    ball.vx *= -0.7;
                    ball.x = ball.x < 8 ? 8 : canvas.width - 8;
                }
                pegs.forEach((peg) => {
                    const dx = ball.x - peg.x;
                    const dy = ball.y - peg.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 13) {
                        const angle = Math.atan2(dy, dx);
                        const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
                        ball.vx = Math.cos(angle) * (speed * 0.8 + 1);
                        ball.vy = Math.sin(angle) * (speed * 0.8 + 1);
                        ball.x = peg.x + Math.cos(angle) * 14;
                        ball.y = peg.y + Math.sin(angle) * 14;
                    }
                });
                if (ball.y > canvas.height - 40) {
                    ball.active = false;
                    const finalSlot = Math.floor(ball.x / (canvas.width / slots.length));
                    setTimeout(() => alert('결과: ' + slots[finalSlot]), 100);
                }
            }

            canvas.onclick = function (e) {
                if (ball.active) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                let x = (e.clientX - rect.left) * scaleX;
                ball.x = x;
                ball.y = 30;
                ball.vx = (Math.random() - 0.5) * 3;
                ball.vy = 2;
                ball.active = true;
            };
        </script>
    </body>
</html>

<!doctype html>
<html lang="ko">
<head>
    <script>
        if (window.top !== window.self) {
            window.top.location.href = window.self.location.href;
        }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>테이스트메이트 로그인</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background: #fff; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: rgba(255,255,255,0.92);
            box-shadow: 0 2px 16px rgba(220,38,38,0.1);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .header-logo { font-size: 1.5rem; font-weight: 900; color: #dc2626; text-decoration: none; }
        .menu-toggle-btn {
            background: none; border: none; font-size: 1.8rem;
            cursor: pointer; border-radius: 8px; padding: 4px 10px;
            color: #333; transition: background 0.18s;
        }
        .menu-toggle-btn:hover { background: #ffe5e5; }

        .login-main { max-width: 400px; margin: 80px auto 0 auto; padding: 0 16px 60px; }
        .login-title { font-size: 2rem; font-weight: 900; color: #dc2626; margin-bottom: 32px; letter-spacing: 1px; text-align: center; }
        .login-form { display: flex; flex-direction: column; gap: 18px; }
        .login-form label { font-size: 1.08rem; font-weight: 600; color: #b91c1c; margin-bottom: 6px; display: block; }
        .login-form input { font-size: 1.08rem; padding: 10px 14px; border: 1.5px solid #ffe5e5; border-radius: 6px; background: #fff8f8; width: 100%; }
        .login-btn-main { padding: 16px 0; background: #dc2626; color: #fff; border: none; border-radius: 8px; font-size: 1.25rem; font-weight: 800; cursor: pointer; margin-top: 10px; transition: background 0.2s; font-family: inherit; width: 100%; }
        .login-btn-main:hover { background: #b91c1c; }
        .login-extra { margin-top: 18px; text-align: center; color: #b91c1c; font-size: 1rem; }
        .login-extra a { color: #dc2626; text-decoration: underline; margin-left: 8px; }

        @media (max-width: 600px) {
            .header { padding: 12px 16px; }
            .header-logo { font-size: 1.2rem; }
            .login-main { margin-top: 32px; }
            input { font-size: 1rem !important; }
            .login-btn-main { font-size: 1rem; padding: 13px 0; }
        }

        .mobile-nav { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 2000; }
        .mobile-nav.open { display: block; }
        .mobile-nav-panel { position: absolute; top: 0; left: 0; width: 260px; height: 100%; background: #fff; box-shadow: 4px 0 20px rgba(0,0,0,0.15); display: flex; flex-direction: column; }
        .mobile-nav-header { display: flex; align-items: center; justify-content: space-between; padding: 20px; border-bottom: 1px solid #f1f1f1; }
        .mobile-nav-logo { font-size: 1.4rem; font-weight: 900; color: #dc2626; text-decoration: none; }
        .mobile-nav-close { background: none; border: none; font-size: 1.6rem; cursor: pointer; color: #666; }
        .mobile-nav-links { padding: 16px 0; display: flex; flex-direction: column; flex: 1; overflow-y: auto; }
        .mobile-nav-links a { display: block; padding: 14px 24px; font-size: 1rem; font-weight: 600; color: #333; text-decoration: none; transition: background 0.15s; }
        .mobile-nav-links a:hover { background: #fff1f1; color: #dc2626; }
        .mobile-nav-divider { height: 1px; background: #f1f1f1; margin: 8px 0; }
    </style>
</head>
<body>

<header class="header">
    <div class="header-left">
        <button class="menu-toggle-btn" onclick="openMobileNav()">☰</button>
        <a href="/main" class="header-logo">TasteMate</a>
    </div>
</header>

<main class="login-main">
    <div class="login-title">로그인</div>
    <form id="loginForm" class="login-form">
        <div>
            <label for="email">이메일 (아이디)</label>
            <input type="email" id="email" name="email" placeholder="이메일을 입력하세요" required />
        </div>
        <div>
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required />
        </div>
        <button type="submit" class="login-btn-main">로그인</button>
    </form>
    <div class="login-extra">
        아직 회원이 아니신가요?
        <a href="/signup">회원가입</a>
    </div>
</main>

<div class="mobile-nav" id="mobileNav" onclick="closeMobileNavOutside(event)">
    <div class="mobile-nav-panel">
        <div class="mobile-nav-header">
            <a href="/main" class="mobile-nav-logo">🍽️ TasteMate</a>
            <button class="mobile-nav-close" onclick="closeMobileNav()">✕</button>
        </div>
        <div class="mobile-nav-links">
            <a href="/main">🏠 홈</a>
            <a href="/aichat">🤖 AI 맛집추천</a>
            <a href="/community">🧑‍🤝‍🧑 커뮤니티</a>
            <div class="mobile-nav-divider"></div>
            <a href="/SOLO">🍚 혼밥</a>
            <a href="/DATE">💑 데이트</a>
            <a href="/WORK">🍻 회식</a>
            <a href="/ETC">🧩 기타</a>
            <div class="mobile-nav-divider"></div>
            <a href="/game/pinball">🎯 핀볼</a>
            <a href="/game/ladder">🪜 사다리타기</a>
            <a href="/game/random_amount">🎰 룰렛 게임</a>
            <a href="/game/worldcup">🏆 음식 월드컵</a>
            <a href="/game/calculator">🧮 계산기</a>
            <div class="mobile-nav-divider"></div>
            <a href="/about">ℹ️ 회사소개</a>
        </div>
    </div>
</div>

<script>
    function openMobileNav()  { document.getElementById('mobileNav').classList.add('open'); document.body.style.overflow = 'hidden'; }
    function closeMobileNav() { document.getElementById('mobileNav').classList.remove('open'); document.body.style.overflow = ''; }
    function closeMobileNavOutside(e) { if (e.target === document.getElementById('mobileNav')) closeMobileNav(); }

    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        try {
            const res = await fetch('/api/login', { method: 'POST', body: new FormData(e.target) });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('user_id', data.user_id);
                localStorage.setItem('nickname', data.nickname);
                localStorage.setItem('is_admin', data.is_admin);
                const returnUrl = sessionStorage.getItem('return_url');
                if (returnUrl) {
                    sessionStorage.removeItem('return_url');
                    window.location.href = returnUrl;
                } else {
                    window.location.href = data.redirect;
                }
            } else {
                alert(data.detail || "이메일이나 비밀번호가 일치하지 않습니다.");
            }
        } catch (err) {
            alert("서버 연결에 실패했습니다.");
        }
    };
</script>

</body>
</html>

<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>로그인 - TasteMate</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js" defer></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-left">
                <button class="menu-toggle-btn" onclick="toggleMenu()">☰</button>
                <a href="/main" class="header-logo">TasteMate</a>
            </div>
            <div class="header-right" id="headerRightArea"></div>
        </div>
    </header>

    <main style="padding-top: 120px;">
        <div class="container" style="max-width: 400px;">
            <div class="main-title" style="margin-bottom: 20px;">🔓 로그인</div>
            <form id="loginForm" style="display: flex; flex-direction: column; gap: 15px; background: #fff; padding: 25px; border-radius: 18px; border: 1.5px solid var(--border-red); box-shadow: 0 4px 12px var(--shadow-soft);">
                <input type="email" name="email" placeholder="이메일 주소" required style="padding: 14px; border-radius: 8px; border: 1px solid #ddd;">
                <input type="password" name="password" placeholder="비밀번호" required style="padding: 14px; border-radius: 8px; border: 1px solid #ddd;">
                <button type="submit" class="main-btn" style="padding: 15px;">로그인하기</button>
                <p style="text-align: center; font-size: 0.9rem; color: #666;">계정이 없으신가요? <a href="/signup" style="color: var(--main-red); font-weight: 700;">회원가입</a></p>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/login', { method: 'POST', body: new FormData(e.target) });
            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('nickname', data.nickname);
                localStorage.setItem('is_admin', data.is_admin);
                localStorage.setItem('user_id', data.user_id);
                window.location.href = "/main"; // 🌟 로그인 후 메인 이동
            } else { alert("이메일 또는 비밀번호를 확인해주세요."); }
        };
    </script>
</body>
</html>

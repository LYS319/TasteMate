<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>데이트 커뮤니티</title>
        <style>
            body {
                margin: 0;
                font-family: 'Noto Sans KR', sans-serif;
                background: #fff;
            }
            .header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 16px 32px;
                background: rgba(255, 255, 255, 0.85);
                box-shadow: 0 2px 16px rgba(220, 38, 38, 0.1);
                backdrop-filter: blur(12px);
            }
            .header-left {
                display: flex;
                align-items: center;
                gap: 24px;
            }
            .header-logo {
                display: flex;
                align-items: center;
                gap: 18px;
                font-size: 1.5rem;
                font-weight: bold;
                color: #dc2626;
                text-decoration: none;
            }
            .menu-toggle-btn {
                background: none;
                border: none;
                font-size: 2.1rem;
                margin-left: 8px;
                cursor: pointer;
                border-radius: 8px;
                padding: 4px 12px;
                transition: background 0.18s;
            }
            .menu-toggle-btn:hover {
                background: #ffe5e5;
            }
            #mainNavMenu {
                min-width: 140px;
                animation: fadeInMenu 0.18s;
                position: absolute;
                top: 60px;
                left: 32px;
                background: #fff;
                box-shadow: 0 4px 16px rgba(220, 38, 38, 0.13);
                border-radius: 12px;
                padding: 18px 24px 14px 24px;
                z-index: 1000;
                display: none;
            }
            @keyframes fadeInMenu {
                from {
                    opacity: 0;
                    transform: translateY(-10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .nav-emoji-btn {
                background: none;
                border: none;
                font-size: 1.7rem;
                margin: 0 2px;
                cursor: pointer;
                border-radius: 8px;
                padding: 4px 10px;
                transition: background 0.18s;
            }
            .nav-emoji-btn:hover {
                background: #ffe5e5;
            }
            .header-right {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .current-location {
                font-size: 0.95rem;
                color: #dc2626;
                background: #fff5f5;
                border: 1px solid #ffe5e5;
                border-radius: 6px;
                padding: 8px 14px;
                font-weight: 700;
                cursor: pointer;
                transition: background 0.2s;
            }
            .current-location:hover {
                background: #ffe5e5;
            }
            .login-btn {
                padding: 8px 16px;
                background: #dc2626;
                color: #fff;
                border: none;
                border-radius: 6px;
                font-size: 0.95rem;
                font-weight: bold;
                cursor: pointer;
                transition: background 0.2s;
            }
            .login-btn:hover {
                background: #b91c1c;
            }
            .main-title {
                text-align: center;
                font-size: 2.2rem;
                font-weight: 900;
                color: #dc2626;
                margin: 48px 0 24px 0;
                letter-spacing: 1px;
            }
            .desc {
                text-align: center;
                color: #b91c1c;
                margin-bottom: 32px;
                font-size: 1.1rem;
            }
            .category-btn {
                flex: 1;
                padding: 10px 0;
                border-radius: 8px;
                text-align: center;
                text-decoration: none;
                font-weight: 700;
                border: 1.5px solid #ffe5e5;
            }
        </style>
        <script>
            function toggleMenu() {
                const menu = document.getElementById('mainNavMenu');
                menu.style.display = menu.style.display === 'none' || menu.style.display === '' ? 'block' : 'none';
            }
        </script>
    </head>
    <body>
        <header class="header">
            <div class="header-left">
                <button class="menu-toggle-btn" onclick="toggleMenu()">☰</button>
                <a href="/main" class="header-logo">TasteMate</a>
                <nav class="main-nav" id="mainNavMenu">
                    <button class="nav-emoji-btn" onclick="location.href = '/main'" title="홈">🏠 홈</button><br />
                    <button class="nav-emoji-btn" onclick="location.href = '/aichat'" title="AI추천">🤖 AI추천</button
                    ><br />
                    <button class="nav-emoji-btn" onclick="location.href = '/community'" title="커뮤니티">
                        🧑‍🤝‍🧑 커뮤니티
                    </button>
                </nav>
            </div>
            <div class="header-right" id="headerRightArea">
                <button class="login-btn" onclick="location.href = '/login'">로그인</button>
                <button
                    class="login-btn"
                    style="background: #fff; color: #dc2626; border: 1px solid #dc2626"
                    onclick="location.href = '/signup'"
                >
                    회원가입
                </button>
            </div>
        </header>

        <div style="max-width: 600px; margin: 32px auto 0 auto; display: flex; gap: 12px; justify-content: center">
            <a href="/category/solo" class="category-btn" style="background: #fff5f5; color: #dc2626">혼밥</a>
            <a href="/category/date" class="category-btn" style="background: #dc2626; color: #fff">데이트</a>
            <a href="/category/work" class="category-btn" style="background: #fff5f5; color: #dc2626">회식</a>
            <a href="/category/etc" class="category-btn" style="background: #fff5f5; color: #dc2626">기타</a>
        </div>

        <div class="main-title">💑 데이트 커뮤니티</div>
        <div class="desc">연인과의 특별한 식사, 데이트 맛집과 추억을 공유해보세요!</div>

        <div
            style="
                max-width: 600px;
                margin: 24px auto 0 auto;
                display: flex;
                gap: 8px;
                justify-content: center;
                align-items: center;
            "
        >
            <!-- 검색 input 영역 하나만 남김 -->
        </div>

        <!-- 검색/글쓰기 영역 -->
        <div
            style="
                max-width: 600px;
                margin: 24px auto 0 auto;
                display: flex;
                gap: 8px;
                justify-content: center;
                align-items: center;
            "
        >
            <input
                id="searchInput"
                type="text"
                placeholder="검색어를 입력하세요"
                style="
                    padding: 8px 14px;
                    border-radius: 6px;
                    border: 1.5px solid #ffe5e5;
                    width: 220px;
                    font-size: 1rem;
                "
            />
            <button
                id="searchBtn"
                style="
                    padding: 8px 18px;
                    border-radius: 6px;
                    border: 1.5px solid #dc2626;
                    background: #fff;
                    color: #dc2626;
                    font-weight: 700;
                    cursor: pointer;
                "
            >
                검색
            </button>
            <div id="pagingArea" style="display: flex; gap: 4px; align-items: center; margin-left: 8px"></div>
            <button
                onclick="location.href = '/write'"
                style="
                    padding: 8px 18px;
                    border-radius: 6px;
                    border: 1.5px solid #dc2626;
                    background: #dc2626;
                    color: #fff;
                    font-weight: 700;
                    cursor: pointer;
                    margin-left: 8px;
                "
            >
                ✏️ 글쓰기
            </button>
        </div>

        <div style="text-align: center; margin-bottom: 24px">
            <button
                id="latestBtn"
                style="
                    padding: 8px 18px;
                    border-radius: 6px;
                    border: 1.5px solid #ffe5e5;
                    background: #dc2626;
                    color: #fff;
                    font-weight: 700;
                    cursor: pointer;
                    margin-right: 8px;
                "
            >
                최신순
            </button>
            <button
                id="popularBtn"
                style="
                    padding: 8px 18px;
                    border-radius: 6px;
                    border: 1.5px solid #ffe5e5;
                    background: #fff5f5;
                    color: #dc2626;
                    font-weight: 700;
                    cursor: pointer;
                    margin-right: 8px;
                "
            >
                인기순
            </button>
            <button
                id="commentBtn"
                style="
                    padding: 8px 18px;
                    border-radius: 6px;
                    border: 1.5px solid #ffe5e5;
                    background: #fff5f5;
                    color: #dc2626;
                    font-weight: 700;
                    cursor: pointer;
                "
            >
                댓글순
            </button>
        </div>

        <div id="post-container" style="max-width: 600px; margin: 0 auto 32px auto">
            <div style="text-align: center; color: #888">게시글을 불러오는 중입니다...</div>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const nickname = localStorage.getItem('nickname');
                const isAdmin = localStorage.getItem('is_admin');
                const headerRightArea = document.getElementById('headerRightArea');

                if (nickname && headerRightArea) {
                    let adminButton = '';
                    if (isAdmin === '1') {
                        adminButton = `<button class="login-btn" onclick="location.href='/admin'" style="background: #2c3e50;">⚙️ 관리자 기능</button>`;
                    }
                    headerRightArea.innerHTML = `
                        <span style="font-weight: 700; color: #dc2626; font-size: 1.05rem; margin-right: 5px;">👤 ${nickname}님</span>
                        ${adminButton}
                        <button class="login-btn" onclick="location.href='/mypage'" style="background: #f39c12;">회원정보</button>
                        <button class="login-btn" onclick="logout()" style="background: #666;">로그아웃</button>
                        <span class="current-location" id="gps-location" onclick="getGPSLocation()" title="클릭하여 내 위치 찾기">📍 위치 탐색 (클릭)</span>
                    `;
                    getGPSLocation();
                }
            });

            function getGPSLocation() {
                const locSpan = document.getElementById('gps-location');
                if (!locSpan) return;
                if (navigator.geolocation) {
                    locSpan.innerText = '📍 위치 찾는 중...';
                    navigator.geolocation.getCurrentPosition(
                        async (position) => {
                            const lat = position.coords.latitude;
                            const lon = position.coords.longitude;
                            try {
                                const res = await fetch(
                                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`,
                                );
                                const data = await res.json();
                                let city = data.address.city || data.address.province || data.address.region || '';
                                let borough = data.address.borough || data.address.suburb || data.address.town || '';
                                locSpan.innerText = `📍 ${city} ${borough}`.trim() || '📍 위치 확인됨';
                            } catch (e) {
                                locSpan.innerText = '📍 위치 확인됨';
                            }
                        },
                        () => {
                            locSpan.innerText = '📍 권한 거부됨';
                        },
                    );
                }
            }

            function logout() {
                localStorage.clear();
                alert('안전하게 로그아웃 되었습니다.');
                window.location.href = '/main';
            }

            let currentSort = 'latest';
            document.getElementById('latestBtn').onclick = () => {
                currentSort = 'latest';
                loadPosts();
            };
            document.getElementById('popularBtn').onclick = () => {
                currentSort = 'popular';
                loadPosts();
            };
            document.getElementById('commentBtn').onclick = () => {
                currentSort = 'comment';
                loadPosts();
            };

            async function loadPosts() {
                try {
                    let url = '/api/posts/DATE';
                    if (currentSort === 'latest') url = '/api/posts/DATE/latest';
                    if (currentSort === 'popular') url = '/api/posts/DATE/popular';
                    if (currentSort === 'comment') url = '/api/posts/DATE/comment';
                    const res = await fetch(url);
                    const posts = await res.json();
                    const container = document.getElementById('post-container');

                    if (posts.length === 0) {
                        container.innerHTML =
                            '<div style="color: #b91c1c; text-align: center; padding: 30px; border: 1px solid #ffe5e5; border-radius: 8px;">아직 등록된 글이 없습니다.</div>';
                        return;
                    }

                    const listHTML = posts
                        .map(
                            (post) => `
                        <li style="border: 1.5px solid #ffe5e5; border-radius: 8px; padding: 18px 20px; margin-bottom: 16px; background: #fff8f8; list-style: none;">
                            <div style="font-weight: 700; font-size: 1.15rem; color: #dc2626">
                                <a href="/post/${post.id}" style="color: #dc2626; text-decoration: none">${post.title}</a>
                            </div>
                            <div style="margin-top: 8px; color: #222; white-space: pre-line">${post.content}</div>
                            <div style="margin-top: 10px; font-size: 0.85rem; color: #888; display: flex; justify-content: flex-end; align-items: center; gap: 0.5em;">
                                <span style="color:#b91c1c; font-weight:700;">💬 ${post.comment_count || 0}</span>
                                <span style="color:#dc2626; font-weight:700;">❤️ ${post.like_count || 0}</span>
                                <span style="margin-left:12px; color:#888; font-weight:700;">👤 ${post.nickname || post.author || ''}</span>
                                <span style="margin-left:8px; color:#bbb; font-weight:400; font-size:0.95em;">${post.created_at || post.date || ''}</span>
                            </div>
                        </li>
                    `,
                        )
                        .join('');

                    container.innerHTML = `<ul style="padding: 0; margin: 0;">${listHTML}</ul>`;
                } catch (error) {
                    document.getElementById('post-container').innerHTML =
                        '<div style="color: red; text-align: center">데이터를 불러오는데 실패했습니다.</div>';
                }
            }
            loadPosts();
        </script>
    </body>
</html>

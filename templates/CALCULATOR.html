<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N빵 계산기 - TasteMate</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js" defer></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-left">
                <button class="menu-toggle-btn" onclick="toggleMenu()">☰</button>
                <a href="/main" class="header-logo">TasteMate</a>
            </div>
            <div class="header-right" id="headerRightArea"></div>
        </div>
    </header>

    <main style="padding-top: 100px; padding-bottom: 50px;">
        <div class="container" style="max-width: 450px;">
            <div class="main-title" style="margin-bottom: 20px; font-size: 2rem;">💸 N빵 계산기</div>
            
            <div style="background: #fff; padding: 25px; border-radius: 18px; border: 1.5px solid var(--border-red); box-shadow: 0 4px 12px var(--shadow-soft); display: flex; flex-direction: column; gap: 16px;">
                
                <div>
                    <label style="font-weight: 800; color: var(--main-red); font-size: 1.1rem; display: block; margin-bottom: 8px;">💰 결제할 총 금액</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="number" id="totalAmount" placeholder="예: 45000" style="flex: 1; padding: 14px; border-radius: 8px; border: 1px solid #ddd; font-size: 1.1rem; font-weight: bold; outline: none;">
                        <span style="display: flex; align-items: center; font-size: 1.1rem; font-weight: bold;">원</span>
                    </div>
                    <button type="button" class="login-btn" onclick="fetchRecentOrder()" style="width: 100%; margin-top: 10px; background: #2c3e50; padding: 12px; font-size: 0.95rem;">
                        🔄 최근 앱 주문금액 불러오기
                    </button>
                </div>

                <div style="margin-top: 10px;">
                    <label style="font-weight: 800; color: var(--main-red); font-size: 1.1rem; display: block; margin-bottom: 8px;">👥 나누는 인원 수</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="number" id="peopleCount" placeholder="예: 3" style="flex: 1; padding: 14px; border-radius: 8px; border: 1px solid #ddd; font-size: 1.1rem; font-weight: bold; outline: none;">
                        <span style="display: flex; align-items: center; font-size: 1.1rem; font-weight: bold;">명</span>
                    </div>
                </div>

                <button type="button" class="main-btn" onclick="calculateNbbang()" style="margin-top: 10px; padding: 18px; font-size: 1.3rem;">
                    정산하기
                </button>

                <div id="resultArea" style="display: none; margin-top: 15px; padding: 20px; background: var(--bg-light); border-radius: 12px; border: 1.5px dashed var(--main-red); text-align: center;">
                    <div style="font-size: 1rem; color: #666; margin-bottom: 8px;">사이좋게 나누면</div>
                    <div id="resultText" style="font-size: 1.8rem; font-weight: 900; color: var(--main-red);">
                        </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        // 최근 주문 금액 가져오기 (가상의 백엔드 연동)
        function fetchRecentOrder() {
            const mockOrderAmount = 45000; // 나중에 API로 받아올 값
            document.getElementById('totalAmount').value = mockOrderAmount;
            alert("앱 주문 내역(45,000원)을 성공적으로 불러왔습니다!");
        }

        // N빵 계산 로직
        function calculateNbbang() {
            const totalInput = document.getElementById('totalAmount').value;
            const peopleInput = document.getElementById('peopleCount').value;
            const resultArea = document.getElementById('resultArea');
            const resultText = document.getElementById('resultText');

            const total = parseInt(totalInput);
            const people = parseInt(peopleInput);

            // 유효성 검사
            if (!total || total <= 0) {
                alert("정확한 결제 금액을 입력해주세요.");
                return;
            }
            if (!people || people <= 0) {
                alert("정확한 인원수를 입력해주세요. (1명 이상)");
                return;
            }

            // 10원 단위 절상 (예: 13,333원 -> 13,340원으로 계산해 모자라지 않게 함)
            const rawPerPerson = total / people;
            const perPerson = Math.ceil(rawPerPerson / 10) * 10; 

            // 한국 돈 단위 표기 (천 단위 콤마)
            const formattedAmount = perPerson.toLocaleString('ko-KR');

            // 결과 화면 표시
            resultText.innerHTML = `1인당 <span style="font-size: 2.2rem; color: #b91c1c;">${formattedAmount}</span>원`;
            resultArea.style.display = 'block';

            // 남는 자투리 금액 안내 (선택사항)
            const totalCollected = perPerson * people;
            if (totalCollected > total) {
                const extra = totalCollected - total;
                resultArea.innerHTML += `<div style="margin-top: 10px; font-size: 0.85rem; color: #888;">(총 ${extra}원이 남습니다. 결제자에게 주세요!)</div>`;
            }
        }
    </script>
</body>
</html>

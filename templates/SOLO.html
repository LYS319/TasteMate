<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>혼밥 커뮤니티 - TasteMate</title>
    <link rel="stylesheet" href="/static/style.css" />
    <style>
        .community-main { margin-top: 80px; padding-bottom: 100px; }
        
        /* 🌟 카테고리 네비게이션 스타일 */
        .category-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        .cat-btn {
            padding: 10px 20px;
            background: #f0f0f0;
            border-radius: 8px;
            text-decoration: none;
            color: #444;
            font-weight: bold;
            transition: 0.2s;
        }
        .cat-btn.active {
            background: var(--main-red);
            color: #fff;
        }
        
        /* 🚩 공지사항 강조 디자인 */
        .notice-item {
            background-color: var(--bg-light) !important;
            border: 2px solid var(--main-red) !important;
            box-shadow: 0 4px 15px var(--shadow-soft);
        }
        .notice-badge {
            background-color: var(--main-red);
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-right: 8px;
        }

        .write-float-btn {
            position: fixed; bottom: 30px; right: 20px;
            background: var(--main-red); color: #fff;
            padding: 15px 25px; border-radius: 30px;
            font-weight: bold; text-decoration: none;
            box-shadow: 0 4px 15px var(--shadow-deep);
            z-index: 999;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-left">
                <button class="menu-toggle-btn" onclick="toggleMenu()">☰</button>
                <a href="/main" class="header-logo">TasteMate</a>
                <nav id="mainNavMenu">
                    <button class="nav-emoji-btn" onclick="location.href='/main'">🏠 홈</button>
                    <button class="nav-emoji-btn" onclick="location.href='/community'">🧑‍🤝‍🧑 커뮤니티</button>
                </nav>
            </div>
            <div class="header-right" id="headerRightArea"></div>
        </div>
    </header>

    <main class="container community-main">
        <div class="category-nav">
            <a href="/category/solo" class="cat-btn active">🍱 혼밥</a>
            <a href="/category/date" class="cat-btn">💖 데이트</a>
            <a href="/category/work" class="cat-btn">🍻 회식</a>
            <a href="/category/etc" class="cat-btn">✨ 기타</a>
        </div>

        <h1 class="main-title">🍱 혼밥 커뮤니티</h1>
        
        <div class="community-preview" id="postListContainer">
            <p style="text-align:center; padding:50px; color:#ccc;">게시글을 불러오고 있습니다...</p>
        </div>
    </main>

    <a href="/write" class="write-float-btn">✍️ 글쓰기</a>

    <script src="/static/script.js"></script>
    <script>
        async function fetchPosts() {
            const container = document.getElementById('postListContainer');
            try {
                // 현재 페이지의 카테고리 이름을 추출 (예: solo)
                const category = window.location.pathname.split('/').pop().toUpperCase();
                const response = await fetch(`/api/posts/${category}?sort=latest`);
                const posts = await response.json();

                if (!posts || posts.length === 0) {
                    container.innerHTML = `<p style="text-align:center; padding:50px; color:#999;">작성된 글이 없습니다.</p>`;
                    return;
                }

                container.innerHTML = posts.map(post => {
                    const isNotice = post.is_notice === 1;
                    const cardClass = isNotice ? 'community-card notice-item' : 'community-card';
                    const noticeBadge = isNotice ? '<span class="notice-badge">📢 [공지]</span>' : '';

                    return `
                        <div class="${cardClass}" onclick="location.href='/post/${post.id}'" style="cursor:pointer; margin-bottom:15px; padding:16px; border-radius:12px; border:1px solid #ffe5e5;">
                            <div class="card-title" style="font-size:1.2rem; font-weight:800; margin-bottom:8px;">
                                ${noticeBadge}${post.title}
                            </div>
                            <div class="card-info" style="display:flex; justify-content:space-between; font-size:0.85rem; color:#999;">
                                <span>👤 ${post.author}</span>
                                <span>📅 ${post.date} | ❤️ ${post.like_count}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                container.innerHTML = `<p style="text-align:center; color:red; padding:50px;">데이터 로드 중 오류 발생</p>`;
            }
        }

        document.addEventListener('DOMContentLoaded', fetchPosts);
    </script>
</body>
</html>

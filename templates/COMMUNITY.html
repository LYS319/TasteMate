<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>커뮤니티 - TasteMate</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js" defer></script>
    <style>
        /* 커뮤니티 페이지 전용 스타일 보정 */
        .category-btn-group { 
            display: flex; 
            gap: 10px; 
            overflow-x: auto; 
            padding: 10px 0; 
            scrollbar-width: none; 
            -ms-overflow-style: none;
        }
        .category-btn-group::-webkit-scrollbar { display: none; }

        .category-item {
            flex: 1;
            min-width: 80px;
            background: #fff;
            border: 1.5px solid var(--border-red);
            border-radius: 12px;
            padding: 12px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer !important;
            transition: all 0.2s;
        }
        .category-item:hover {
            background: var(--bg-light);
            transform: translateY(-2px);
            border-color: var(--main-red);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-left">
                <button class="menu-toggle-btn" onclick="toggleMenu()">☰</button>
                <a href="/main" class="header-logo">TasteMate</a>
                <nav id="mainNavMenu">
                    <button class="nav-emoji-btn" onclick="location.href='/main'">🏠 홈</button>
                    <button class="nav-emoji-btn" onclick="location.href='/aichat'">🤖 AI추천</button>
                    <button class="nav-emoji-btn" onclick="location.href='/community'">🧑‍🤝‍🧑 커뮤니티</button>
                </nav>
            </div>
            <div class="header-right" id="headerRightArea">
                </div>
        </div>
    </header>

    <main style="padding-top: 80px; padding-bottom: 80px;">
        <div class="container">
            <div class="main-title" style="text-align: left; margin: 20px 0 10px 0; font-size: 2rem;">🧑‍🤝‍🧑 커뮤니티</div>
            <p style="color: #b91c1c; margin-bottom: 25px; font-size: 0.95rem;">다양한 맛집, 모임 정보를 자유롭게 공유해보세요!</p>
            
            <div class="category-btn-group">
                <div class="category-item" onclick="location.href='/category/solo'">
                    <span style="font-size: 1.5rem;">🍱</span>
                    <span style="font-weight: 800; color: var(--main-red); font-size: 0.85rem; margin-top: 5px;">혼밥</span>
                </div>
                <div class="category-item" onclick="location.href='/category/date'">
                    <span style="font-size: 1.5rem;">💑</span>
                    <span style="font-weight: 800; color: var(--main-red); font-size: 0.85rem; margin-top: 5px;">데이트</span>
                </div>
                <div class="category-item" onclick="location.href='/category/work'">
                    <span style="font-size: 1.5rem;">🍻</span>
                    <span style="font-weight: 800; color: var(--main-red); font-size: 0.85rem; margin-top: 5px;">회식</span>
                </div>
                <div class="category-item" onclick="location.href='/category/etc'">
                    <span style="font-size: 1.5rem;">✨</span>
                    <span style="font-weight: 800; color: var(--main-red); font-size: 0.85rem; margin-top: 5px;">기타</span>
                </div>
            </div>

            <div style="margin-top: 30px; display: flex; flex-direction: column; gap: 16px;">
                <div class="community-card" onclick="location.href='/category/solo'" style="text-align: left; padding: 20px;">
                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                        <span style="font-size: 1.2rem;">🍱</span>
                        <h3 style="color: var(--main-red); font-weight: 900; margin: 0;">혼밥</h3>
                    </div>
                    <p style="font-size: 0.85rem; color: #666; margin-bottom: 12px;">혼자서도 즐거운 식사, 혼밥 맛집과 경험을 공유해보세요!</p>
                    <span class="current-location" style="padding: 3px 10px; font-size: 0.75rem;">#SOLO</span>
                </div>

                <div class="community-card" onclick="location.href='/category/date'" style="text-align: left; padding: 20px;">
                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                        <span style="font-size: 1.2rem;">💑</span>
                        <h3 style="color: var(--main-red); font-weight: 900; margin: 0;">데이트</h3>
                    </div>
                    <p style="font-size: 0.85rem; color: #666; margin-bottom: 12px;">연인과의 특별한 식사, 맛집과 추억을 공유해보세요!</p>
                    <span class="current-location" style="padding: 3px 10px; font-size: 0.75rem;">#DATE</span>
                </div>

                <div class="community-card" onclick="location.href='/category/work'" style="text-align: left; padding: 20px;">
                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                        <span style="font-size: 1.2rem;">🍻</span>
                        <h3 style="color: var(--main-red); font-weight: 900; margin: 0;">회식</h3>
                    </div>
                    <p style="font-size: 0.85rem; color: #666; margin-bottom: 12px;">동료들과의 회식, 맛집과 에피소드를 공유해보세요!</p>
                    <span class="current-location" style="padding: 3px 10px; font-size: 0.75rem;">#WORK</span>
                </div>
            </div>

            <button class="main-btn" onclick="location.href = '/write'" style="position: fixed; bottom: 20px; right: 20px; width: auto; padding: 12px 24px; border-radius: 30px; font-size: 1rem; box-shadow: 0 4px 15px var(--shadow-deep); z-index: 999;">
                ✍️ 글쓰기
            </button>
        </div>
    </main>
</body>
</html>

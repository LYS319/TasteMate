<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>테이스트메이트 - 홈</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js" defer></script>
    <style>
        /* HOT 게시판 전용 리스트 스타일 */
        .hot-post-item {
            padding: 16px 0;
            border-bottom: 1px solid var(--border-red);
            cursor: pointer;
            transition: background 0.2s;
        }
        .hot-post-item:active { background: var(--bg-light); }
        .hot-badge {
            font-size: 0.75rem; color: #666; background: #f0f0f0; 
            padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 8px; font-weight: bold;
        }
        .hot-title {
            font-size: 1.1rem; font-weight: 800; color: #222; margin-bottom: 6px;
        }
        .hot-preview {
            font-size: 0.9rem; color: #888; margin-bottom: 10px;
            /* 2줄 이상 넘어가면 ... 처리 */
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .hot-meta {
            font-size: 0.8rem; color: var(--main-red); font-weight: bold; display: flex; align-items: center; gap: 10px;
        }
        .hot-meta-sub { color: #aaa; font-weight: normal; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-left">
                <button class="menu-toggle-btn" onclick="toggleMenu()">☰</button>
                <a href="/main" class="header-logo">TasteMate</a>
                <nav id="mainNavMenu">
                    <button class="nav-emoji-btn" onclick="location.href='/main'">🏠 홈</button>
                    <button class="nav-emoji-btn" onclick="location.href='/aichat'">🤖 AI추천</button>
                    <button class="nav-emoji-btn" onclick="location.href='/community'">🧑‍🤝‍🧑 커뮤니티</button>
                    <button class="nav-emoji-btn" onclick="location.href='/calculator'">💸 N빵 계산기</button>
                </nav>
            </div>
            <div class="header-right" id="headerRightArea"></div>
        </div>
    </header>

    <main style="padding-top: 90px; padding-bottom: 60px;">
        <div class="container" style="max-width: 600px;">
            
            <div style="display: flex; gap: 10px; margin-bottom: 30px;">
                <button class="main-btn" onclick="location.href='/aichat'" style="flex: 1; padding: 15px; font-size: 1.1rem; border-radius: 12px; display: flex; flex-direction: column; align-items: center; gap: 5px;">
                    <span style="font-size: 1.5rem;">🤖</span> AI 맛집추천
                </button>
                <button class="main-btn" onclick="location.href='/calculator'" style="flex: 1; padding: 15px; font-size: 1.1rem; border-radius: 12px; background: #f39c12; display: flex; flex-direction: column; align-items: center; gap: 5px;">
                    <span style="font-size: 1.5rem;">💸</span> N빵 계산기
                </button>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px;">
                <h2 style="font-size: 1.5rem; color: #222; font-weight: 900; margin: 0;">🔥 HOT 게시판</h2>
                <span onclick="location.href='/community'" style="font-size: 0.85rem; color: var(--main-red); cursor: pointer; font-weight: bold;">더보기 ></span>
            </div>
            
            <div id="hot-posts-container" style="background: #fff; padding: 0 15px; border-radius: 12px; border: 1.5px solid var(--border-red); box-shadow: 0 4px 15px var(--shadow-soft);">
                <p style="text-align: center; color: #999; padding: 40px 0;">뜨거운 게시글을 불러오는 중입니다...</p>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            loadHotPosts();
        });

        // 영어 카테고리를 한글로 예쁘게 변환하는 함수
        function getCategoryName(cat) {
            const map = { "SOLO": "혼밥게시판", "DATE": "데이트게시판", "WORK": "회식게시판", "ETC": "기타게시판" };
            return map[cat.toUpperCase()] || "자유게시판";
        }

        async function loadHotPosts() {
            try {
                // 현재는 전체 게시글 API를 호출합니다. 나중에 /api/posts/hot 등으로 분리하면 좋습니다.
                const res = await fetch('/api/admin/posts');
                const posts = await res.json();
                const container = document.getElementById('hot-posts-container');

                if (!posts || posts.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: #999; padding: 40px 0;">아직 게시글이 없습니다.</p>';
                    return;
                }

                // 최신순으로 5개만 짤라서 HOT 게시판처럼 보여줍니다.
                const hotPosts = posts.slice(0, 5);

                container.innerHTML = hotPosts.map(post => {
                    // 백엔드 구현 전까지 보여줄 가짜 추천수/댓글수 (랜덤)
                    const dummyLikes = Math.floor(Math.random() * 30) + 5; 
                    const dummyComments = Math.floor(Math.random() * 10);
                    const dateOnly = post.date.split(' ')[0].substring(5); // 2026-02-12 -> 02-12

                    return `
                        <div class="hot-post-item" onclick="location.href='/post/${post.id}'">
                            <div class="hot-badge">${getCategoryName(post.category)}</div>
                            <div class="hot-title">${post.title}</div>
                            <div class="hot-preview">해당 게시글의 내용이 이곳에 두 줄 정도 미리보기로 표시됩니다. 궁금하시다면 클릭해서 확인해보세요!</div>
                            <div class="hot-meta">
                                <span>👍 ${dummyLikes}</span>
                                <span>💬 ${dummyComments}</span>
                                <span class="hot-meta-sub">| ${dateOnly} | ${post.author}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                document.getElementById('hot-posts-container').innerHTML = '<p style="text-align: center; color: var(--main-red); padding: 40px 0;">게시글 로딩 실패!</p>';
            }
        }
    </script>
</body>
</html>

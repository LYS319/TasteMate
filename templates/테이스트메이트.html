<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>테이스트메이트</title>
        <style>
            .menu-toggle-btn { background: none; border: none; font-size: 2.1rem; margin-left: 8px; cursor: pointer; border-radius: 8px; padding: 4px 12px; transition: background 0.18s; }
            .menu-toggle-btn:hover { background: #ffe5e5; }
            #mainNavMenu { min-width: 140px; animation: fadeInMenu 0.18s; position: absolute; top: 60px; left: 32px; background: #fff; box-shadow: 0 4px 16px rgba(220,38,38,0.13); border-radius: 12px; padding: 18px 24px 14px 24px; z-index: 1000; display: none; }
            @keyframes fadeInMenu { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
            body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background: #fff; }
            .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 32px; background: rgba(255,255,255,0.85); box-shadow: 0 2px 16px rgba(220, 38, 38, 0.10); backdrop-filter: blur(12px); }
            .header-left { display: flex; align-items: center; gap: 24px; }
            .main-buttons { display: flex; justify-content: center; gap: 24px; margin-bottom: 40px; }
            .main-btn { padding: 32px 72px; font-size: 2.4rem; font-weight: 700; color: #fff; background: #dc2626; border: none; border-radius: 6px; cursor: pointer; transition: background 0.2s; box-shadow: 0 2px 8px rgba(220, 38, 38, 0.08); }
            .main-btn:hover { background: #b91c1c; }
            .community-preview { display: flex; justify-content: center; gap: 32px; margin: 48px 0 0 0; }
            .community-card { background: #fff; border: 1.5px solid #ffe5e5; border-radius: 18px; box-shadow: 0 4px 16px rgba(220,38,38,0.07); padding: 28px 32px 22px 32px; min-width: 240px; max-width: 280px; display: flex; flex-direction: column; align-items: flex-start; gap: 12px; position: relative; }
            .community-card .card-title { font-size: 1.25rem; font-weight: 800; color: #dc2626; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
            .community-card .card-count { font-size: 0.98rem; color: #b91c1c; font-weight: 600; }
            .community-card .card-recent { font-size: 1.05rem; color: #222; font-weight: 500; margin-bottom: 2px; }
            .community-card .card-tag { font-size: 0.93rem; background: #fff5f5; color: #dc2626; border-radius: 12px; padding: 2px 14px; font-weight: 700; border: 1px solid #ffe5e5; }
            .header-logo { display: flex; align-items: center; gap: 18px; font-size: 1.5rem; font-weight: bold; color: #dc2626; text-decoration: none; }
            .main-title { text-align: center; font-size: 3rem; font-weight: 900; color: #dc2626; margin-top: 40px; margin-bottom: 40px; letter-spacing: 2px; text-shadow: 0 4px 16px rgba(220,38,38,0.18), 0 1px 0 #fff; }
            .header-right { display: flex; align-items: center; gap: 10px; }
            .login-btn { padding: 8px 16px; color: #fff; border: none; border-radius: 6px; font-size: 0.95rem; font-weight:bold; cursor: pointer; transition: background 0.2s; background: #dc2626; }
            .nav-emoji-btn { background: none; border: none; font-size: 1.7rem; margin: 0 2px; cursor: pointer; border-radius: 8px; padding: 4px 10px; transition: background 0.18s; }
            .nav-emoji-btn:hover { background: #ffe5e5; }
            .current-location { font-size: 0.95rem; color: #dc2626; background: #fff5f5; border: 1px solid #ffe5e5; border-radius: 6px; padding: 8px 14px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
            .current-location:hover { background: #ffe5e5; }
        </style>
        <script>
            function toggleMenu() {
                const menu = document.getElementById('mainNavMenu');
                menu.style.display = (menu.style.display === 'none' || menu.style.display === '') ? 'block' : 'none';
            }
        </script>
    </head>
    <body>
        <header class="header">
            <div class="header-left">
                <button class="menu-toggle-btn" aria-label="메뉴 열기" onclick="toggleMenu()">☰</button>
                <a href="/main" class="header-logo">TasteMate</a>
                <nav class="main-nav" id="mainNavMenu">
                    <button class="nav-emoji-btn" onclick="location.href = '/main'" title="홈">🏠 홈</button><br />
                    <button class="nav-emoji-btn" onclick="location.href = '/aichat'" title="AI추천">🤖 AI추천</button><br />
                    <button class="nav-emoji-btn" onclick="location.href = '/community'" title="커뮤니티">🧑‍🤝‍🧑 커뮤니티</button>
                </nav>
            </div>
            
            <div class="header-right" id="headerRightArea">
                <button class="login-btn" onclick="location.href = '/login'">로그인</button>
                <button class="login-btn" style="background:#fff; color:#dc2626; border:1px solid #dc2626;" onclick="location.href = '/signup'">회원가입</button>
            </div>
        </header>

        <main style="padding-top: 80px; padding-bottom: 80px; min-height: 60vh">
            <div class="main-title">🍽️ 테이스트메이트</div>
            <div class="main-buttons">
                <button class="main-btn" onclick="location.href = '/aichat'">🤖 AI추천</button>
                <button class="main-btn" onclick="location.href = '/community'">🧑‍🤝‍🧑 커뮤니티</button>
            </div>
            <div class="community-preview">
                <div class="community-card">
                    <div class="card-title">💬 강남 혼밥 맛집 공유</div>
                    <div class="card-count">글 27개</div>
                    <div class="card-recent">최근: "오늘 점심 어디가 좋을까요?"</div>
                    <div class="card-tag">#강남</div>
                </div>
                <div class="community-card">
                    <div class="card-title">🍜 라멘 덕후 모임</div>
                    <div class="card-count">글 14개</div>
                    <div class="card-recent">최근: "신상 라멘집 후기!"</div>
                    <div class="card-tag">#전국</div>
                </div>
            </div>
        </main>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const nickname = localStorage.getItem('nickname');
                const isAdmin = localStorage.getItem('is_admin'); // 관리자 여부 확인
                const headerRightArea = document.getElementById('headerRightArea');
                
                if (nickname && headerRightArea) {
                    // 🚨 관리자라면 '관리자 기능' 버튼을 띄움
                    let adminButton = '';
                    if (isAdmin === '1') {
                        adminButton = `<button class="login-btn" onclick="location.href='/admin'" style="background: #2c3e50;">⚙️ 관리자 기능</button>`;
                    }

                    headerRightArea.innerHTML = `
                        <span style="font-weight: 700; color: #dc2626; font-size: 1.05rem; margin-right: 5px;">👤 ${nickname}님</span>
                        ${adminButton}
                        <button class="login-btn" onclick="location.href='/mypage'" style="background: #f39c12;">회원정보</button>
                        <button class="login-btn" onclick="logout()" style="background: #666;">로그아웃</button>
                        <span class="current-location" id="gps-location" onclick="getGPSLocation()" title="클릭하여 내 위치 찾기">📍 위치 탐색 (클릭)</span>
                    `;
                    
                    // 페이지 로드 시 자동으로 위치 탐색 시작
                    getGPSLocation();
                }
            });

            // 🚨 실제 GPS 연동 로직 (HTML5 + OpenStreetMap API)
            function getGPSLocation() {
                const locSpan = document.getElementById('gps-location');
                if (!locSpan) return;
                
                if (navigator.geolocation) {
                    locSpan.innerText = "📍 위치 찾는 중...";
                    navigator.geolocation.getCurrentPosition(async (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        try {
                            // 무료 오픈소스 지도 API로 위도/경도를 실제 주소로 변환
                            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                            const data = await res.json();
                            
                            // "서울특별시 강남구" 형태 추출
                            let city = data.address.city || data.address.province || data.address.region || "";
                            let borough = data.address.borough || data.address.suburb || data.address.town || "";
                            let shortAddr = `${city} ${borough}`.trim();
                            
                            locSpan.innerText = `📍 ${shortAddr || '위치 확인됨'}`;
                        } catch (e) {
                            locSpan.innerText = "📍 위치 확인됨"; 
                        }
                    }, (error) => {
                        locSpan.innerText = "📍 위치 권한 거부됨";
                    });
                } else {
                    locSpan.innerText = "📍 GPS 지원 안됨";
                }
            }

            function logout() {
                localStorage.clear();
                alert("안전하게 로그아웃 되었습니다.");
                window.location.href = "/main";
            }
        </script>
    </body>
</html>

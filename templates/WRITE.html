<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>테이스트메이트 글쓰기</title>
        <style>
            /* 기존 팀원 스타일 유지 */
            .menu-toggle-btn { background: none; border: none; font-size: 2.1rem; margin-left: 8px; cursor: pointer; border-radius: 8px; padding: 4px 12px; transition: background 0.18s; }
            .menu-toggle-btn:hover { background: #ffe5e5; }
            #mainNavMenu { min-width: 140px; animation: fadeInMenu 0.18s; position: absolute; top: 60px; left: 32px; background: #fff; box-shadow: 0 4px 16px rgba(220, 38, 38, 0.13); border-radius: 12px; padding: 18px 24px 14px 24px; z-index: 1000; display: none; }
            @keyframes fadeInMenu { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
            .nav-emoji-btn { background: none; border: none; font-size: 1.7rem; margin: 0 2px; cursor: pointer; border-radius: 8px; padding: 4px 10px; transition: background 0.18s; }
            body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background: #fff; }
            .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 32px; background: rgba(255, 255, 255, 0.85); box-shadow: 0 2px 16px rgba(220, 38, 38, 0.1); backdrop-filter: blur(12px); }
            .header-logo { display: flex; align-items: center; gap: 18px; font-size: 1.5rem; font-weight: bold; color: #dc2626; text-decoration: none; }
            .login-btn { padding: 8px 16px; background: #dc2626; color: #fff; border: none; border-radius: 6px; font-size: 0.95rem; font-weight: bold; cursor: pointer; transition: background 0.2s; }
            .write-main { max-width: 520px; margin: 60px auto 0 auto; padding: 0 16px; }
            .write-title { font-size: 2rem; font-weight: 900; color: #dc2626; margin-bottom: 24px; letter-spacing: 1px; }
            .write-form { display: flex; flex-direction: column; gap: 18px; }
            .write-form label { font-size: 1.08rem; font-weight: 600; color: #b91c1c; margin-bottom: 6px; }
            .write-form input, .write-form textarea, .write-form select { font-size: 1.08rem; padding: 10px 14px; border: 1.5px solid #ffe5e5; border-radius: 6px; background: #fff8f8; width: 100%; box-sizing: border-box; }
            .write-form textarea { min-height: 120px; resize: none; }
            .submit-btn { padding: 10px 32px; background: #dc2626; color: #fff; border: none; border-radius: 6px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
            .cancel-btn { padding: 10px 24px; background: #fff; color: #dc2626; border: 1.5px solid #dc2626; border-radius: 6px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }

            /* 🌟 공지사항 영역 스타일 추가 */
            #noticeDiv { 
                display: none; 
                margin-top: 5px; 
                padding: 15px; 
                background: #fff0f0; 
                border: 2px dashed #dc2626; 
                border-radius: 10px; 
            }
        </style>
    </head>
    <body>
        <header class="header">
            <div class="header-left">
                <button class="menu-toggle-btn" onclick="toggleMenu()">☰</button>
                <a href="/main" class="header-logo">TasteMate</a>
                <nav id="mainNavMenu">
                    <button class="nav-emoji-btn" onclick="location.href = '/main'">🏠 홈</button><br />
                    <button class="nav-emoji-btn" onclick="location.href = '/aichat'">🤖 AI추천</button><br />
                    <button class="nav-emoji-btn" onclick="location.href = '/community'">🧑‍🤝‍🧑 커뮤니티</button>
                </nav>
            </div>
            <div class="header-right" id="headerRightArea">
                <button class="login-btn" onclick="location.href = '/login'">로그인</button>
            </div>
        </header>

        <main class="write-main">
            <div class="write-title">✍️ 글쓰기</div>
            <form id="writeForm" class="write-form">
                <div>
                    <label for="category">카테고리</label>
                    <select id="category" name="category" required>
                        <option value="">카테고리 선택</option>
                        <option value="SOLO">혼밥</option>
                        <option value="DATE">데이트</option>
                        <option value="WORK">회식</option>
                        <option value="ETC">기타</option>
                    </select>
                </div>
                <div>
                    <label for="title">제목</label>
                    <input type="text" id="title" name="title" placeholder="제목을 입력하세요" required />
                </div>
                <div>
                    <label for="content">내용</label>
                    <textarea id="content" name="content" placeholder="내용을 입력하세요" required></textarea>
                </div>

                <div id="noticeDiv">
                    <label style="display: flex; align-items: center; cursor: pointer; color: #dc2626; margin-bottom: 0;">
                        <input type="checkbox" id="is_notice" name="is_notice" value="1" style="width: 20px; height: 20px; margin-right: 12px;">
                        📢 이 게시글을 상단 공지사항으로 등록합니다
                    </label>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 10px;">
                    <button type="submit" class="submit-btn">등록</button>
                    <button type="button" class="cancel-btn" onclick="history.back()">취소</button>
                </div>
            </form>
        </main>

        <script>
            function toggleMenu() {
                const menu = document.getElementById('mainNavMenu');
                menu.style.display = (menu.style.display === 'none' || menu.style.display === '') ? 'block' : 'none';
            }

            document.addEventListener('DOMContentLoaded', () => {
                const nickname = localStorage.getItem('nickname');
                const isAdmin = localStorage.getItem('is_admin');
                const headerRightArea = document.getElementById('headerRightArea');

                // 1. 로그인 상태 헤더 처리
                if (nickname && headerRightArea) {
                    headerRightArea.innerHTML = `
                        <span style="font-weight: 700; color: #dc2626; margin-right: 10px;">👤 ${nickname}님</span>
                        <button class="login-btn" onclick="localStorage.clear(); location.href='/main';" style="background: #666;">로그아웃</button>
                    `;
                }

                // 2. 관리자일 때만 공지글 옵션 노출
                if (isAdmin === '1') {
                    document.getElementById('noticeDiv').style.display = 'block';
                }
            });

            // 3. 글 등록 로직
            document.getElementById('writeForm').onsubmit = async (e) => {
                e.preventDefault();
                const userId = localStorage.getItem('user_id');
                if (!userId) {
                    alert('로그인이 필요한 서비스입니다.');
                    window.location.href = '/login';
                    return;
                }

                const formData = new FormData(e.target);
                formData.append('user_id', userId);
                
                // 체크박스가 해제되어 있으면 0으로 전송
                if (!document.getElementById('is_notice').checked) {
                    formData.set('is_notice', '0');
                }

                try {
                    const res = await fetch('/api/posts', { method: 'POST', body: formData });
                    const data = await res.json();
                    if (res.ok) {
                        alert('게시글이 성공적으로 등록되었습니다!');
                        window.location.href = data.redirect;
                    } else {
                        alert(data.detail || '글 등록에 실패했습니다.');
                    }
                } catch (err) {
                    alert('서버 연결에 실패했습니다.');
                }
            };
        </script>
    </body>
</html>

<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>테이스트메이트 - 자동 배분 룰렛</title>
    <style>
        /* --- TasteMate 공식 상단바 및 공통 스타일 --- */
        body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background: #fff; overflow-x: hidden; }
        .header {
            display: flex; justify-content: space-between; align-items: center; padding: 16px 32px;
            background: rgba(255, 255, 255, 0.85); box-shadow: 0 2px 16px rgba(220, 38, 38, 0.1);
            backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 2000; box-sizing: border-box; width: 100%;
        }
        .header-left { display: flex; align-items: center; gap: 24px; }
        .header-logo { display: flex; align-items: center; gap: 18px; font-size: 1.5rem; font-weight: bold; color: #dc2626; text-decoration: none; }
        
        .menu-bar { display: flex; gap: 18px; align-items: center; margin-left: 24px; }
        .menu-item { font-size: 1.15rem; font-weight: 700; color: #dc2626; text-decoration: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; transition: background 0.18s; }
        .menu-item:hover { background: #fff5f5; }
        
        .game-dropdown { position: relative; }
        .dropdown-content {
            display: none; position: absolute; top: 36px; left: 0; background: #fff; min-width: 140px;
            box-shadow: 0 4px 16px rgba(220, 38, 38, 0.13); border-radius: 12px; padding: 12px 0; z-index: 1000; flex-direction: column;
        }
        .game-dropdown:hover .dropdown-content { display: flex; }
        .dropdown-content a { color: #dc2626; padding: 10px 24px; text-decoration: none; font-size: 1.08rem; font-weight: 600; border-radius: 8px; transition: background 0.18s; }
        .dropdown-content a:hover { background: #ffe5e5; }

        .header-right { display: flex; align-items: center; gap: 10px; }
        .login-btn { padding: 8px 16px; color: #fff; border: none; border-radius: 6px; font-size: 0.95rem; font-weight: bold; cursor: pointer; background: #dc2626; transition: background 0.2s; }

        /* --- 룰렛 게임 컨텐츠 스타일 --- */
        .game-main { padding: 40px 20px 80px; background: linear-gradient(135deg, #fff5f5 0%, #f0f2f5 100%); min-height: calc(100vh - 80px); }
        .container { background: #fff; border-radius: 32px; padding: 40px; margin: 0 auto; max-width: 700px; border: 2px solid #dc2626; box-shadow: 0 16px 64px rgba(220, 38, 38, 0.15); text-align: center; }
        
        .setup-section { background: #fff5f5; padding: 25px; border-radius: 20px; margin-bottom: 30px; }
        .setup-section h2 { color: #dc2626; margin-top: 0; font-weight: 900; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin: 5px; width: 160px; font-size: 1rem; text-align: center; }
        input:focus { border-color: #dc2626; outline: none; }
        
        .start-btn { padding: 15px 50px; background: #dc2626; color: white; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 1.2rem; transition: 0.2s; margin: 10px; }
        .start-btn:hover { background: #b91c1c; transform: translateY(-2px); }
        .start-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        .wheel-outer { margin: 40px auto; position: relative; width: 350px; height: 350px; }
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 8px solid #333; transition: transform 3s cubic-bezier(0.1, 0.8, 0.2, 1); position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .pointer { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); z-index: 10; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 40px solid #dc2626; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2)); }
        
        .winner-banner { font-size: 22px; font-weight: bold; color: #dc2626; min-height: 40px; margin: 20px 0; }
        table { margin: 20px auto; border-collapse: collapse; width: 100%; background: white; border-radius: 12px; overflow: hidden; border: 1px solid #eee; }
        th, td { border: 1px solid #eee; padding: 15px; }
        th { background: #dc2626; color: white; font-weight: 900; }
        .current-row { background: #fff5f5; font-weight: bold; color: #dc2626; outline: 2px solid #dc2626; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <a href="/main" class="header-logo">TasteMate</a>
            <nav class="menu-bar">
                <a class="menu-item" href="/aichat">AI추천</a>
                <a class="menu-item" href="/community">커뮤니티</a>
                <div class="menu-item game-dropdown">
                    <span>게임 ▾</span>
                    <div class="dropdown-content">
                        <a href="/game/pinball">핀볼</a>
                        <a href="/game/ladder">사다리타기</a>
                        <a href="/game/random_amount">룰렛 게임</a>
                        <a href="/game/worldcup">음식 월드컵</a>
                        <a href="/game/calculator">계산기</a>
                    </div>
                </div>
            </nav>
        </div>
        <div class="header-right">
            <button class="login-btn">로그인</button>
        </div>
    </header>

    <main class="game-main">
        <div class="container">
            <div id="inputView">
                <div class="setup-section">
                    <h2>🎯 배분 룰렛</h2>
                    <input type="number" id="totalAmount" placeholder="총 금액 (백원 단위)" step="100" />
                    <input type="number" id="peopleCount" placeholder="참여 인원 (명)" />
                </div>
                <button class="start-btn" onclick="setupGame()">설정 완료</button>
            </div>

            <div id="gameView" style="display:none;">
                <div class="winner-banner" id="winnerBanner">버튼을 눌러 게임을 시작하세요!</div>
                
                <div class="wheel-outer">
                    <div class="pointer"></div>
                    <div id="wheel" class="wheel"></div>
                    <div id="nameLabels" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;"></div>
                </div>

                <button class="start-btn" id="btnSpin" onclick="startAutoGame()">🏁 게임 시작</button>
                
                <table id="resultTable" style="margin-top:30px;">
                    <thead><tr><th>순위</th><th>이름</th><th>지불액</th></tr></thead>
                    <tbody id="resultBody"></tbody>
                </table>
                <button class="start-btn" onclick="location.reload()" style="background:#666; font-size:0.9rem; padding:10px 30px;">처음부터 다시</button>
            </div>
        </div>
    </main>

<script>
    let remainingNames = [];
    let winnersOrder = [];
    let calculatedPrizes = [];
    let totalAngle = 0;
    const colorPalette = ['#FF6B6B','#4ECDC4','#45B7D1','#FFA07A','#98D8C8','#F7DC6F','#BB8FCE','#82E0AA'];

    function calculateAutoPrizes(total, people) {
        let step = Math.floor((total / (people * people)) / 100) * 100;
        if (step < 100) step = 100;
        let prizes = [];
        let currentSum = 0;
        let firstPrize = (total - (people * (people - 1) / 2 * step)) / people;
        firstPrize = Math.floor(firstPrize / 100) * 100;
        if (firstPrize < 0) {
            firstPrize = 0;
            step = Math.floor((total / (people * (people - 1) / 2)) / 100) * 100;
        }
        for (let i = 0; i < people; i++) {
            let p = firstPrize + (i * step);
            prizes.push(p);
            currentSum += p;
        }
        let diff = total - currentSum;
        prizes[prizes.length - 1] += diff;
        return prizes;
    }

    function setupGame() {
        const total = parseInt(document.getElementById('totalAmount').value);
        const count = parseInt(document.getElementById('peopleCount').value);
        if (!total || !count || count < 2) return alert("금액과 인원수를 입력하세요.");
        
        calculatedPrizes = calculateAutoPrizes(total, count);
        remainingNames = [];
        for(let i=0; i<count; i++) {
            let n = prompt(`${i+1}번째 사람 이름`);
            remainingNames.push(n || `${i+1}번`);
        }

        document.getElementById('inputView').style.display = 'none';
        document.getElementById('gameView').style.display = 'block';
        
        drawWheel();
    }

    function drawWheel() {
        const wheel = document.getElementById('wheel');
        const labelDiv = document.getElementById('nameLabels');
        const n = remainingNames.length;
        if (n === 0) return;
        
        const slice = 360 / n;
        let conic = '';
        labelDiv.innerHTML = '';
        
        for(let i=0; i<n; i++) {
            conic += `${colorPalette[i % colorPalette.length]} ${i*slice}deg ${(i+1)*slice}deg,`;
            
            const lbl = document.createElement("div");
            lbl.innerText = remainingNames[i];
            lbl.style.position = "absolute";
            lbl.style.left = "50%"; lbl.style.top = "50%";
            lbl.style.width = "100px";
            lbl.style.textAlign = "center";
            
            const angle = (i * slice) + (slice / 2);
            
            // 텍스트 위치 rotate 후, 다시 반대 방향으로 rotate 시켜서 글자를 똑바로 세움
            lbl.style.transform = `translate(-50%, -50%) rotate(${angle}deg) translateY(-110px) rotate(${-angle}deg)`;
            
            lbl.style.fontWeight = "bold";
            lbl.style.color = "#000";
            lbl.style.fontSize = "14px";
            labelDiv.appendChild(lbl);
        }
        wheel.style.background = `conic-gradient(${conic.slice(0,-1)})`;
    }

    function startAutoGame() {
        document.getElementById('btnSpin').style.display = 'none';
        nextTurn();
    }

    function nextTurn() {
        if (remainingNames.length === 1) {
            const lastOne = remainingNames[0];
            winnersOrder.push(lastOne);
            remainingNames = [];
            updateResult();
            document.getElementById('winnerBanner').innerHTML = "🎊 모든 추첨이 완료되었습니다!";
            return;
        }

        drawWheel();

        const n = remainingNames.length;
        const slice = 360 / n;
        const winIdx = Math.floor(Math.random() * n);
        const targetAngle = 360 - (winIdx * slice + slice / 2);
        
        totalAngle += 1440 + targetAngle - (totalAngle % 360);
        
        const wheel = document.getElementById('wheel');
        const labelDiv = document.getElementById('nameLabels');
        wheel.style.transition = "transform 3s cubic-bezier(0.1, 0.8, 0.2, 1)";
        labelDiv.style.transition = "transform 3s cubic-bezier(0.1, 0.8, 0.2, 1)";
        wheel.style.transform = `rotate(${totalAngle}deg)`;
        labelDiv.style.transform = `rotate(${totalAngle}deg)`;

        document.getElementById('winnerBanner').innerHTML = `🎡 ${winnersOrder.length + 1}등 추첨 중...`;

        setTimeout(() => {
            const winner = remainingNames[winIdx];
            winnersOrder.push(winner);
            remainingNames.splice(winIdx, 1);
            
            updateResult();
            document.getElementById('winnerBanner').innerHTML = `📢 <strong>${winner}</strong>님 당첨! (${winnersOrder.length}등)`;
            
            setTimeout(() => {
                if (remainingNames.length > 0) {
                    nextTurn();
                }
            }, 1500);
        }, 3200);
    }

    function updateResult() {
        const tbody = document.getElementById('resultBody');
        let html = '';
        for(let i=0; i < winnersOrder.length; i++) {
            html += `<tr class="${i === winnersOrder.length - 1 ? 'current-row' : ''}">
                <td>${i+1}등</td>
                <td>${winnersOrder[i]}</td>
                <td>${calculatedPrizes[i].toLocaleString()}원</td>
            </tr>`;
        }
        tbody.innerHTML = html;
    }
</script>
</body>
</html>

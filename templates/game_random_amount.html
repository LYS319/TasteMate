<!doctype html>
<html lang="ko">
    <head>
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                const dropdown = document.querySelector('.game-dropdown');
                const content = dropdown?.querySelector('.dropdown-content');
                let dropdownTimer = null;
                if (dropdown && content) {
                    dropdown.addEventListener('mouseenter', () => {
                        clearTimeout(dropdownTimer);
                        content.style.display = 'block';
                    });
                    dropdown.addEventListener('mouseleave', () => {
                        dropdownTimer = setTimeout(() => {
                            content.style.display = 'none';
                        }, 120);
                    });
                    content.addEventListener('mouseenter', () => {
                        clearTimeout(dropdownTimer);
                        content.style.display = 'block';
                    });
                    content.addEventListener('mouseleave', () => {
                        dropdownTimer = setTimeout(() => {
                            content.style.display = 'none';
                        }, 120);
                    });
                }
            });
        </script>
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                var overlay = document.getElementById('panelOverlay');
                if (overlay) {
                    overlay.addEventListener('click', function () {
                        if (typeof togglePanel === 'function') togglePanel();
                    });
                }
            });
            if (window.top !== window.self) {
                window.top.location.href = window.self.location.href;
            }
        </script>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>테이스트메이트 - 자동 배분 룰렛 Pro</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="/static/css/header.css" />
        <style>
            :root {
                --primary-color: #dc2626;
                --primary-hover: #b91c1c;
                --bg-gradient: linear-gradient(135deg, #fdfdfd 0%, #f1f1f1 100%);
            }
            body {
                margin: 0;
                font-family: 'Noto Sans KR', sans-serif;
                background: var(--bg-gradient);
                color: #333;
                min-height: 100vh;
            }

            .game-main {
                padding: 160px 10px 40px;
            }
            .main-layout-container {
                display: flex;
                justify-content: center;
                align-items: flex-start;
                gap: 20px;
                max-width: 1200px;
                margin: 0 auto;
            }
            .game-container {
                flex: 1;
                max-width: 700px;
                text-align: center;
                background: white;
                padding: 40px;
                border-radius: 32px;
                border: 2px solid var(--primary-color);
                box-shadow: 0 16px 64px rgba(220, 38, 38, 0.15);
            }
            .setup-title {
                font-weight: 900;
                font-size: 2rem;
                color: var(--primary-color);
                margin-top: 0;
                margin-bottom: 10px;
            }
            .setup-desc {
                color: #666;
                margin-bottom: 25px;
                font-size: 1rem;
            }
            input {
                padding: 12px;
                border-radius: 10px;
                border: 1px solid #ddd;
                margin: 5px;
                text-align: center;
                font-family: inherit;
            }
            input:focus {
                border-color: var(--primary-color);
                outline: none;
            }
            .action-btn {
                background: var(--primary-color);
                color: white;
                border: none;
                padding: 14px 40px;
                border-radius: 12px;
                font-size: 1.1rem;
                font-weight: 900;
                cursor: pointer;
                transition: 0.2s;
                margin-top: 10px;
            }
            .action-btn:hover {
                transform: scale(1.05);
                background: var(--primary-hover);
            }

            .wheel-outer {
                margin: 30px auto;
                position: relative;
                width: 340px;
                height: 340px;
            }
            .wheel {
                width: 100%;
                height: 100%;
                border-radius: 50%;
                border: 8px solid #2d2d3a;
                transition: transform 3s cubic-bezier(0.1, 0.8, 0.2, 1);
                overflow: hidden;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            }
            .pointer {
                position: absolute;
                top: -20px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 10;
                border-left: 15px solid transparent;
                border-right: 15px solid transparent;
                border-top: 30px solid var(--primary-color);
            }
            .winner-banner {
                background: var(--primary-color);
                color: white;
                padding: 8px 20px;
                border-radius: 12px;
                font-size: 1.2rem;
                font-weight: 900;
                display: inline-block;
                margin-bottom: 15px;
            }
            table {
                margin-top: 25px;
                width: 100%;
                border-collapse: separate;
                border-spacing: 0;
                border-radius: 15px;
                overflow: hidden;
                border: 1px solid #eee;
            }
            th {
                background: var(--primary-color);
                color: white;
                padding: 15px;
                font-weight: 800;
            }
            td {
                padding: 12px;
                border-bottom: 1px solid #eee;
                background: #fff;
                text-align: center;
            }
            .current-row {
                background: #fff5f5 !important;
                font-weight: bold;
                color: var(--primary-color);
            }
            @media (max-width: 900px) {
                .game-main {
                    padding-top: 80px !important;
                }
            }

            .side-ad {
                position: fixed;
                top: 150px;
                width: 160px;
                height: 600px;
                background: #f4f4f4;
                border: 1px solid #ddd;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #999;
                font-weight: bold;
                z-index: 100;
                border-radius: 10px;
                font-size: 0.85rem;
                text-align: center;
                padding: 8px;
                box-sizing: border-box;
            }
            .ad-left {
                left: 20px;
            }
            .ad-right {
                right: 20px;
            }
            .mobile-top-ad {
                display: none;
                position: fixed;
                top: 100px;
                left: 0;
                right: 0;
                height: 55px;
                background: #f4f4f4;
                border-bottom: 1px solid #ddd;
                align-items: center;
                justify-content: center;
                color: #999;
                font-weight: bold;
                font-size: 0.9rem;
                z-index: 100;
                pointer-events: none;
            }
            @media (max-width: 1200px) {
                .side-ad {
                    display: none;
                }
            }
            @media (max-width: 900px) {
                .mobile-top-ad {
                    display: flex;
                }
            }
        </style>
    </head>

                <nav class="menu-bar">
                    <a class="menu-item" href="/about">회사소개</a>
                    <a class="menu-item" href="/aichat">AI추천</a>
                    <a class="menu-item" href="/community">커뮤니티</a>
                    <div class="menu-item game-dropdown">
                        <span>게임 ▾</span>
                        <div class="dropdown-content">
                            <a href="/game/pinball">핀볼</a>
                            <a href="/game/ladder">사다리타기</a>
                            <a href="/game/random_amount">룰렛 게임</a>
                            <a href="/game/worldcup">음식 월드컵</a>
                            <a href="/game/calculator">계산기</a>
                        </div>
                    </div>
                </nav>
            </div>
            <div class="header-center"></div>
            <div class="header-right" id="headerRightArea">
                <button class="login-btn" onclick="location.href = '/login'">로그인</button>
                <button

                >
                    회원가입
                </button>
            </div>

        <main class="game-main">
            <div class="side-ad ad-left">광고 영역 (좌)</div>
            <div class="side-ad ad-right">광고 영역 (우)</div>
            <div class="mobile-top-ad">📢 광고 영역 (모바일)</div>
            <div class="main-layout-container">
                <div class="game-container">
                    <div id="inputView">
                        <h2 class="setup-title">🎯 배분 룰렛</h2>
                        <p class="setup-desc">총 금액을 입력하면 자동으로 차등 배분합니다.</p>
                        <div style="margin-bottom: 20px">
                            <input type="number" id="totalAmount" placeholder="총 금액 (원)" style="width: 160px" />
                            <input type="number" id="peopleCount" placeholder="인원 (명)" style="width: 80px" />
                        </div>
                        <button class="action-btn" onclick="setupGame()">설정 완료</button>
                    </div>

                    <div id="gameView" style="display: none">
                        <div class="winner-banner" id="winnerBanner">🏁 게임 준비 완료!</div>
                        <div class="wheel-outer">
                            <div class="pointer"></div>
                            <div id="wheel" class="wheel"></div>
                            <div
                                id="nameLabels"
                                style="
                                    position: absolute;
                                    width: 100%;
                                    height: 100%;
                                    top: 0;
                                    left: 0;
                                    pointer-events: none;
                                "
                            ></div>
                        </div>
                        <button class="action-btn" id="btnSpin" onclick="startAutoGame()">🏁 게임 시작</button>
                        <table>
                            <thead>
                                <tr>
                                    <th>순위</th>
                                    <th>이름</th>
                                    <th>지불액</th>
                                </tr>
                            </thead>
                            <tbody id="resultBody"></tbody>
                        </table>
                        <button
                            class="action-btn"
                            style="background: #666; font-size: 0.9rem; margin-top: 20px"
                            onclick="location.reload()"
                        >
                            처음부터 다시
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <script>
            function logout() {
                localStorage.clear();
                alert('안전하게 로그아웃 되었습니다.');
                window.location.href = '/main';
            }
            function getGPSLocation() {
                const locSpan = document.getElementById('gps-location');
                if (!locSpan) return;
                if (navigator.geolocation) {
                    locSpan.innerText = '📍 위치 찾는 중...';
                    navigator.geolocation.getCurrentPosition(
                        async (pos) => {
                            try {
                                const res = await fetch(
                                    `/api/reverse-geocode?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`,
                                );
                                const data = await res.json();
                                locSpan.innerText = `📍 ${data.address.city || data.address.province || '위치 확인됨'}`;
                            } catch (e) {
                                locSpan.innerText = '📍 위치 확인됨';
                            }
                        },
                        () => {
                            locSpan.innerText = '📍 위치 거부됨';
                        },
                    );
                }
            }

            let calculatedPrizes = [],
                remainingNames = [],
                winnersOrder = [],
                totalAngle = 0;
            const colorPalette = [
                '#FF6B6B',
                '#4ECDC4',
                '#45B7D1',
                '#FFA07A',
                '#98D8C8',
                '#F06292',
                '#AED581',
                '#FFD54F',
            ];

            function calculateAutoPrizes(total, people) {
                let step = Math.floor(total / (people * people) / 100) * 100;
                if (step < 100) step = 100;
                let prizes = [],
                    sum = 0;
                let first = Math.floor((total - ((people * (people - 1)) / 2) * step) / people / 100) * 100;
                for (let i = 0; i < people; i++) {
                    let p = first + i * step;
                    prizes.push(p);
                    sum += p;
                }
                prizes[prizes.length - 1] += total - sum;
                return prizes;
            }

            function setupGame() {
                const total = parseInt(document.getElementById('totalAmount').value);
                const count = parseInt(document.getElementById('peopleCount').value);
                if (!total || !count || count < 2) return alert('금액과 2명 이상의 인원을 입력하세요.');
                calculatedPrizes = calculateAutoPrizes(total, count);
                remainingNames = [];
                for (let i = 0; i < count; i++) {
                    let n = prompt(`${i + 1}번째 사람 이름`);
                    remainingNames.push(n || `${i + 1}번`);
                }
                document.getElementById('inputView').style.display = 'none';
                document.getElementById('gameView').style.display = 'block';
                drawWheel();
            }

            function drawWheel() {
                const wheel = document.getElementById('wheel');
                const labelDiv = document.getElementById('nameLabels');
                const n = remainingNames.length;
                if (n === 0) return;
                const slice = 360 / n;
                let conic = '';
                labelDiv.innerHTML = '';
                for (let i = 0; i < n; i++) {
                    conic += `${colorPalette[i % colorPalette.length]} ${i * slice}deg ${(i + 1) * slice}deg,`;
                    const lbl = document.createElement('div');
                    lbl.innerText = remainingNames[i];
                    lbl.style.cssText =
                        'position:absolute;left:50%;top:50%;font-weight:900;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,0.5);';
                    const angle = i * slice + slice / 2;
                    lbl.style.transform = `translate(-50%,-50%) rotate(${angle}deg) translateY(-110px) rotate(${-angle}deg)`;
                    labelDiv.appendChild(lbl);
                }
                wheel.style.background = `conic-gradient(${conic.slice(0, -1)})`;
            }

            function startAutoGame() {
                document.getElementById('btnSpin').style.display = 'none';
                nextTurn();
            }

            function nextTurn() {
                const winnerBanner = document.getElementById('winnerBanner');
                const wheel = document.getElementById('wheel');
                const nameLabels = document.getElementById('nameLabels');
                if (remainingNames.length === 1) {
                    winnersOrder.push(remainingNames[0]);
                    updateResult();
                    winnerBanner.innerHTML = '🎊 모든 추첨 완료!';
                    return;
                }
                drawWheel();
                const n = remainingNames.length,
                    slice = 360 / n;
                const winIdx = Math.floor(Math.random() * n);
                const target = 360 - (winIdx * slice + slice / 2);
                totalAngle += 1440 + target - (totalAngle % 360);
                wheel.style.transform = `rotate(${totalAngle}deg)`;
                nameLabels.style.transform = `rotate(${totalAngle}deg)`;
                winnerBanner.innerHTML = `🎡 ${winnersOrder.length + 1}등 추첨 중...`;
                setTimeout(() => {
                    const winner = remainingNames[winIdx];
                    winnersOrder.push(winner);
                    remainingNames.splice(winIdx, 1);
                    updateResult();
                    winnerBanner.innerHTML = `📢 ${winner}님 당첨! (${winnersOrder.length}등)`;
                    setTimeout(() => {
                        if (remainingNames.length > 0) nextTurn();
                    }, 1500);
                }, 3200);
            }

            function updateResult() {
                let html = '';
                for (let i = 0; i < winnersOrder.length; i++) {
                    html += `<tr class="${i === winnersOrder.length - 1 ? 'current-row' : ''}"><td>${i + 1}등</td><td>${winnersOrder[i]}</td><td>${calculatedPrizes[i].toLocaleString()}원</td></tr>`;
                }
                document.getElementById('resultBody').innerHTML = html;
            }

            document.addEventListener('DOMContentLoaded', () => {
                const nickname = localStorage.getItem('nickname');
                const isAdmin = localStorage.getItem('is_admin');
                const headerRightArea = document.getElementById('headerRightArea');
                if (nickname && headerRightArea) {
                    let adminButton =
                        isAdmin == '1'
                            ? `<button class="login-btn" onclick="location.href='/admin'" style="background: #2c3e50; margin-left:8px;">⚙️ 관리자</button>`
                            : '';
                    headerRightArea.innerHTML = `<span class="nickname-avatar" id="nicknameAvatar" onclick="location.href='/mypage'">${nickname.slice(0, 2)}</span>${adminButton}<button class="login-btn" onclick="logout()" style="background: #666; margin-left:8px;">로그아웃</button><span class="current-location" id="gps-location" onclick="getGPSLocation()">📍 내 위치</span>`;
                    getGPSLocation && getGPSLocation();
                } else if (headerRightArea) {
                    headerRightArea.innerHTML = `<button class="login-btn" onclick="location.href='/login'">로그인</button><button class="login-btn" style="background:#fff;color:#dc2626;border:1px solid #dc2626" onclick="location.href='/signup'">회원가입</button>`;
                }
            });
        </script>

                    <div class="mobile-nav-divider"></div>
                    <a href="/game/pinball">🎯 핀볼</a><a href="/game/ladder">🪜 사다리타기</a
                    ><a href="/game/random_amount">🎰 룰렛 게임</a><a href="/game/worldcup">🏆 음식 월드컵</a
                    ><a href="/game/calculator">🧮 계산기</a>
                    <div class="mobile-nav-divider"></div>
                    <a href="/about">ℹ️ 회사소개</a>
                </div>
            </div>
        </div>
        <script>
            function openMobileNav() {
                document.getElementById('mobileNav').classList.add('open');
                document.body.style.overflow = 'hidden';
            }
            function closeMobileNav() {
                document.getElementById('mobileNav').classList.remove('open');
                document.body.style.overflow = '';
            }
            function closeMobileNavOutside(e) {
                if (e.target === document.getElementById('mobileNav')) closeMobileNav();
            }
        </script>
        <script src="/static/js/avatar-sync.js"></script>
        <script src="/static/js/avatar-sync.js"></script>

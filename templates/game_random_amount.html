<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>테이스트메이트 - 룰렛 게임</title>

<style>
/* ================= 공통 ================= */
body {
    margin: 0;
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(135deg, #fff5f5 0%, #f0f2f5 100%);
    text-align: center;
}

/* ================= 헤더 (사다리타기와 동일) ================= */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 32px;
    background: rgba(255, 255, 255, 0.85);
    box-shadow: 0 2px 16px rgba(220, 38, 38, 0.1);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 2000;
}

.header-left {
    display: flex;
    align-items: center;
    gap: 24px;
}

.header-logo {
    display: flex;
    align-items: center;
    gap: 18px;
    font-size: 1.5rem;
    font-weight: bold;
    color: #dc2626;
    text-decoration: none;
}

.menu-toggle-btn {
    background: none;
    border: none;
    font-size: 2.1rem;
    margin-left: 8px;
    cursor: pointer;
    border-radius: 8px;
    padding: 4px 12px;
    transition: background 0.18s;
}

.menu-toggle-btn:hover {
    background: #ffe5e5;
}

/* 게임 버튼 그룹 (간격 8px → 사다리타기 동일) */
.game-menu-group {
    display: flex;
    gap: 8px;
    align-items: center;
}

.game-btn {
    padding: 6px 18px;
    background: #fff5f5;
    color: #dc2626;
    border: 1.5px solid #dc2626;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
}

.game-btn:hover {
    background: #ffe5e5;
}

#mainNavMenu {
    min-width: 140px;
    animation: fadeInMenu 0.18s;
    position: absolute;
    top: 60px;
    left: 32px;
    background: #fff;
    box-shadow: 0 4px 16px rgba(220, 38, 38, 0.13);
    border-radius: 12px;
    padding: 18px 24px 14px 24px;
    z-index: 1000;
    display: none;
}

@keyframes fadeInMenu {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}

.nav-emoji-btn {
    background: none;
    border: none;
    font-size: 1.7rem;
    margin: 0 2px;
    cursor: pointer;
    border-radius: 8px;
    padding: 4px 10px;
    transition: background 0.18s;
    text-align: left;
    width: 100%;
}

.nav-emoji-btn:hover {
    background: #ffe5e5;
}

.header-right {
    display: flex;
    align-items: center;
    gap: 10px;
}

.login-btn {
    padding: 8px 16px;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 0.95rem;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
    background: #dc2626;
}

.signup-btn {
    background: #fff;
    color: #dc2626;
    border: 1px solid #dc2626;
}

/* ================= 룰렛 ================= */
.container {
    background: linear-gradient(135deg, #fff 60%, #ffe5e5 100%);
    border-radius: 32px;
    padding: 50px;
    margin: 40px auto;
    max-width: 750px;
    border: 2px solid #dc2626;
    box-shadow: 0 16px 60px rgba(220, 38, 38, 0.2);
}

input {
    padding: 10px;
    border: 2px solid #ddd;
    border-radius: 8px;
    margin: 5px;
}

.start-btn {
    padding: 12px 30px;
    background: #dc2626;
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

.wheel-container {
    margin: 20px auto;
    position: relative;
    width: 420px;
    height: 420px;
}

.wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 12px solid #333;
    transition: transform 3s cubic-bezier(0.17, 0.67, 0.12, 0.99);
}

.pointer {
    position: absolute;
    top: -25px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 25px solid transparent;
    border-right: 25px solid transparent;
    border-top: 45px solid #dc2626;
}

.winner-banner {
    margin-top: 20px;
    font-size: 26px;
    font-weight: 800;
    color: #dc2626;
}
</style>
</head>

<body>

<header class="header">
    <div class="header-left">
        <button class="menu-toggle-btn" onclick="toggleMenu()">☰</button>
        <a href="/main" class="header-logo">TasteMate</a>

        <div class="game-menu-group">
            <button class="game-btn" onclick="location.href='/game/ideal'">메뉴 월드컵</button>
            <button class="game-btn" onclick="location.href='/game/pinball'">핀볼</button>
            <button class="game-btn" onclick="location.href='/game/ladder'">사다리타기</button>
            <button class="game-btn" onclick="location.href='/game/random_amount'">룰렛게임</button>
        </div>

        <nav id="mainNavMenu">
            <button class="nav-emoji-btn" onclick="location.href='/main'">🏠 홈</button>
        </nav>
    </div>

    <div class="header-right">
        <button class="login-btn" onclick="location.href='/login'">로그인</button>
        <button class="login-btn signup-btn" onclick="location.href='/signup'">회원가입</button>
    </div>
</header>

<div class="container">
    <h1>🎯 룰렛 게임</h1>
    <input type="number" id="totalAmount" placeholder="총 금액" />
    <input type="number" id="people" placeholder="인원 수 (2~12)" />
    <button class="start-btn" onclick="start()">시작</button>

    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="wheel" id="wheel"></div>
    </div>

    <div class="winner-banner" id="winnerBanner"></div>
</div>

<script>
function toggleMenu() {
    const menu = document.getElementById('mainNavMenu');
    menu.style.display =
        menu.style.display === 'none' || menu.style.display === ''
            ? 'block'
            : 'none';
}

const colors = ['#FF6B6B','#4ECDC4','#45B7D1','#FFA07A','#98D8C8','#F7DC6F'];

function start() {
    const total = parseInt(document.getElementById('totalAmount').value);
    const people = parseInt(document.getElementById('people').value);
    if (!total || !people) return alert('입력하세요');

    const names = [];
    for (let i = 0; i < people; i++) {
        names.push(prompt(`${i + 1}번 이름`));
    }

    const wheel = document.getElementById('wheel');
    const banner = document.getElementById('winnerBanner');
    banner.innerHTML = '';

    const angle = 360 / people;
    let gradient = '';
    for (let i = 0; i < people; i++) {
        gradient += `${colors[i % colors.length]} ${i * angle}deg ${(i + 1) * angle}deg,`;
    }
    wheel.style.background = `conic-gradient(${gradient.slice(0, -1)})`;

    const winner = Math.floor(Math.random() * people);
    const spins = 6;
    const target = 360 - winner * angle - angle / 2;
    wheel.style.transform = `rotate(${spins * 360 + target}deg)`;

    setTimeout(() => {
        banner.innerHTML = `🏆 ${names[winner]} 님 1등!`;
    }, 3000);
}
</script>

</body>
</html>

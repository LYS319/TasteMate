<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Taste Mate - 마스터 관리자 센터</title>
    <style>
        :root { --primary: #3498db; --secondary: #2c3e50; --bg: #f4f7f6; --danger: #e74c3c; --success: #2ecc71; --warning: #f39c12; }
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; display: flex; background: var(--bg); color: #333; }
        .sidebar { width: 250px; background: var(--secondary); color: white; height: 100vh; position: fixed; }
        .sidebar h2 { text-align: center; border-bottom: 1px solid #3e4f5f; padding: 20px; }
        .menu-item { padding: 15px 25px; cursor: pointer; transition: 0.3s; }
        .menu-item.active { background: var(--primary); font-weight: bold; border-left: 5px solid white; }
        .main-content { margin-left: 250px; padding: 40px; width: calc(100% - 250px); }
        .content-section { display: none; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .content-section.active { display: block; animation: fadeIn 0.4s; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #fafafa; font-size: 13px; color: #666; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .status-normal { background: #e8f5e9; color: var(--success); }
        .status-banned { background: #ffebee; color: var(--danger); }
        .btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; color: white; font-size: 12px; font-weight: bold; margin-right: 4px; }
        select { padding: 6px; border-radius: 4px; border: 1px solid #ddd; outline: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Taste Mate</h2>
        <div class="menu-item active" onclick="switchSection('user-mgmt', this)">👤 회원 관리</div>
        <div class="menu-item" onclick="switchSection('post-mgmt', this)">📝 게시글 관리</div>
    </div>
    <div class="main-content">
        <h1 id="page-title">전체 회원 관리 (마스터 모드)</h1>
        
        <section id="user-mgmt" class="content-section active">
            <table>
                <thead><tr><th>ID</th><th>사용자 정보</th><th>권한 설정</th><th>현재 상태</th><th>마스터 액션</th></tr></thead>
                <tbody id="user-list"></tbody>
            </table>
        </section>

        <section id="post-mgmt" class="content-section">
            <table>
                <thead><tr><th>ID</th><th>카테고리</th><th>제목</th><th>작성일시</th><th>관리</th></tr></thead>
                <tbody id="post-list"></tbody>
            </table>
        </section>
    </div>

    <script>
        function switchSection(id, el) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            document.getElementById('page-title').innerText = id === 'user-mgmt' ? '전체 회원 관리 (마스터 모드)' : '전체 게시글 관리';
            id === 'user-mgmt' ? loadUsers() : loadPosts();
        }

        async function loadUsers() {
            try {
                const res = await fetch('/api/admin/users');
                const users = await res.json();
                const list = document.getElementById('user-list');
                list.innerHTML = users.map(u => {
                    const stat = u.status || "정상";
                    return `
                    <tr>
                        <td>${u.id}</td>
                        <td><strong>${u.nickname}</strong><br><small style="color:#888;">${u.email}</small></td>
                        <td>
                            <select onchange="updateRole(${u.id}, this.value)">
                                <option value="0" ${u.is_admin === 0 ? 'selected' : ''}>일반 사용자</option>
                                <option value="1" ${u.is_admin === 1 ? 'selected' : ''}>부관리자</option>
                            </select>
                        </td>
                        <td><span class="status-badge ${stat === '차단' ? 'status-banned' : 'status-normal'}">${stat}</span></td>
                        <td>
                            <button class="btn" style="background:var(--warning)" onclick="updateStatus(${u.id}, '${stat === '정상' ? '차단' : '정상'}')">
                                ${stat === '정상' ? '활동금지' : '금지해제'}
                            </button>
                            <button class="btn" style="background:var(--danger)" onclick="kickUser(${u.id})">추방</button>
                        </td>
                    </tr>`;
                }).join('');
            } catch (error) {
                console.error("데이터 로드 실패:", error);
            }
        }

        async function updateRole(id, val) {
            const fd = new FormData(); fd.append('is_admin', val);
            const res = await fetch('/api/admin/users/' + id + '/role', { method: 'PATCH', body: fd });
            if(res.ok) { alert('권한이 변경되었습니다.'); loadUsers(); }
            else { alert('권한 변경에 실패했습니다.'); }
        }

        async function updateStatus(id, stat) {
            const msg = stat === '차단' ? '활동을 금지하시겠습니까?' : '금지를 해제하시겠습니까?';
            if(!confirm(msg)) return;

            const fd = new FormData(); fd.append('status', stat);
            const res = await fetch('/api/admin/users/' + id + '/status', { method: 'PATCH', body: fd });
            if(res.ok) { loadUsers(); }
            else { alert('상태 변경에 실패했습니다.'); }
        }

        async function kickUser(id) {
            if(confirm('사용자를 영구 추방하시겠습니까? 데이터가 완전히 삭제됩니다.')) {
                const res = await fetch('/api/admin/users/' + id, { method: 'DELETE' });
                if(res.ok) { alert('추방되었습니다.'); loadUsers(); }
                else { alert('추방에 실패했습니다.'); }
            }
        }

        async function loadPosts() {
            try {
                const res = await fetch('/api/admin/posts');
                const posts = await res.json();
                const list = document.getElementById('post-list');
                
                if (posts.length === 0) {
                    list.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px; color:#999;">등록된 게시글이 없습니다.</td></tr>';
                    return;
                }

                list.innerHTML = posts.map(p => `
                    <tr>
                        <td>${p.id}</td>
                        <td><strong style="color:var(--primary)">[${p.category}]</strong></td>
                        <td>${p.title}</td>
                        <td style="font-size:12px; color:#666;">${new Date(p.created_at).toLocaleString()}</td>
                        <td><button class="btn" style="background:var(--danger)" onclick="deletePost(${p.id})">삭제</button></td>
                    </tr>`).join('');
            } catch (error) {
                console.error("데이터 로드 실패:", error);
            }
        }

        async function deletePost(id) {
            if(confirm('이 게시글을 삭제하시겠습니까?')) {
                const res = await fetch('/api/admin/posts/' + id, { method: 'DELETE' });
                if(res.ok) { loadPosts(); }
            }
        }

        loadUsers();
    </script>
</body>
</html>
